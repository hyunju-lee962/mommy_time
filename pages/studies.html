<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>스터디 목록 — 엄마시간</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;600&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/css/main.css">
<style>
.page-header{padding:110px 40px 48px;text-align:center;background:linear-gradient(160deg,#FFF8F0,var(--cream));}
.page-title{font-family:'Noto Serif KR',serif;font-size:36px;font-weight:300;margin-bottom:10px;}
.page-sub{font-size:16px;color:var(--brown);}
.content{max-width:960px;margin:0 auto;padding:48px 40px 80px;}
.series-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:24px;}
.series-card{background:var(--white);border:1px solid var(--soft);border-radius:24px;overflow:hidden;transition:transform .2s,box-shadow .2s;text-decoration:none;color:var(--dark);}
.series-card:hover{transform:translateY(-5px);box-shadow:0 12px 32px rgba(44,31,20,.12);}
.series-card.coming{opacity:.6;pointer-events:none;}
.series-thumb{height:160px;display:flex;align-items:center;justify-content:center;font-size:64px;}
.series-thumb.msb{background:linear-gradient(135deg,#FFF0E0,#FFE4C4);}
.series-thumb.ort{background:linear-gradient(135deg,#E0F0FF,#C4DCFF);}
.series-thumb.mth{background:linear-gradient(135deg,#E8FFE0,#C4F0C4);}
.series-thumb.hm{background:linear-gradient(135deg,#FFE8F0,#FFC4DC);}
.series-body{padding:20px;}
.series-status-active{font-size:11px;color:var(--green);font-weight:500;margin-bottom:4px;}
.series-status-soon{font-size:11px;color:var(--brown);margin-bottom:4px;}
.series-name{font-size:18px;font-weight:500;margin-bottom:6px;}
.series-desc{font-size:13px;color:var(--brown);line-height:1.6;margin-bottom:12px;}
.series-tags{display:flex;gap:6px;flex-wrap:wrap;}
.series-tag{font-size:11px;background:var(--warm);color:var(--brown);padding:3px 10px;border-radius:12px;}
@media(max-width:768px){.content{padding:32px 24px 60px;}.page-header{padding:100px 24px 40px;}}
</style>
</head>
<body>
<nav class="nav">
  <a href="../index.html" class="nav-logo">엄마<span>시간</span></a>
  <a href="../index.html" class="nav-back">← 홈으로</a>
</nav>
<div class="page-header">
  <h1 class="page-title">📚 함께 읽을 책들</h1>
  <p class="page-sub">아이와 함께 읽고 싶은 시리즈를 골라봐요</p>
</div>
<div class="content">
  <div class="series-grid">
    <a href="../studies/magic-school-bus/index.html" class="series-card">
      <div class="series-thumb msb">🚌</div>
      <div class="series-body">
        <p class="series-status-active">● 지금 시작 가능</p>
        <p class="series-name">매직스쿨버스</p>
        <p class="series-desc">프리즐 선생님의 버스를 타고 과학의 세계로! 매주 한 권씩 영어로 읽어요.</p>
        <div class="series-tags"><span class="series-tag">6~10세</span><span class="series-tag">과학</span><span class="series-tag">영어</span></div>
      </div>
    </a>
    <div class="series-card coming">
      <div class="series-thumb ort">📗</div>
      <div class="series-body">
        <p class="series-status-soon">준비중</p>
        <p class="series-name">ORT</p>
        <p class="series-desc">영국 국민 영어 교재! 파닉스부터 차근차근 영어를 읽어요.</p>
        <div class="series-tags"><span class="series-tag">5~9세</span><span class="series-tag">파닉스</span></div>
      </div>
    </div>
    <div class="series-card coming">
      <div class="series-thumb mth">🌳</div>
      <div class="series-body">
        <p class="series-status-soon">준비중</p>
        <p class="series-name">매직트리하우스</p>
        <p class="series-desc">시간여행으로 역사와 모험을 영어로 배워요.</p>
        <div class="series-tags"><span class="series-tag">7~12세</span><span class="series-tag">역사</span></div>
      </div>
    </div>
    <div class="series-card coming">
      <div class="series-thumb hm">🐶</div>
      <div class="series-body">
        <p class="series-status-soon">준비중</p>
        <p class="series-name">헨리앤머지</p>
        <p class="series-desc">헨리와 강아지 머지의 일상 영어 이야기.</p>
        <div class="series-tags"><span class="series-tag">6~9세</span><span class="series-tag">리더스</span></div>
      </div>
    </div>
  </div>
</div>
<script src="../assets/js/main.js"></script>
</body>
</html>
