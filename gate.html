<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>수강 코드 입력 — Mommy Time</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<script src="/assets/js/auth.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  min-height:100vh;
  background: linear-gradient(160deg, #FFF8F0 0%, #F0FDF8 50%, #F5F0FF 100%);
  font-family: 'Nunito', sans-serif;
  display:flex; align-items:center; justify-content:center;
  padding:20px;
}

.card {
  background:#fff;
  border-radius:28px;
  padding:44px 40px;
  width:100%; max-width:420px;
  box-shadow: 0 8px 40px rgba(0,0,0,.10);
  text-align:center;
  animation: fadeUp .5s ease;
}
@keyframes fadeUp {
  from { opacity:0; transform:translateY(20px); }
  to   { opacity:1; transform:translateY(0); }
}

.logo-wrap { margin-bottom:28px; }
.logo-emoji { font-size:52px; display:block; margin-bottom:8px; }
.logo-text  { font-size:22px; font-weight:900; color:#2C2016; }
.logo-text span { color:#F4845F; }
.logo-sub   { font-size:13px; color:#8B6F5E; margin-top:4px; font-weight:600; }

h1 {
  font-size:17px; font-weight:800; color:#2C2016;
  margin-bottom:6px;
}
.desc {
  font-size:13px; color:#8B6F5E; line-height:1.7;
  margin-bottom:28px;
}

.input-wrap { position:relative; margin-bottom:14px; }
.code-input {
  width:100%;
  padding:16px 50px 16px 18px;
  border:2.5px solid #EAE0D5;
  border-radius:14px;
  font-family:'Nunito',sans-serif;
  font-size:18px; font-weight:800;
  letter-spacing:.12em;
  text-align:center;
  text-transform:uppercase;
  outline:none;
  transition:border-color .2s;
  color:#2C2016;
}
.code-input:focus { border-color:#F4845F; }
.code-input::placeholder { font-size:14px; letter-spacing:0; font-weight:600; color:#C0B0A0; text-transform:none; }

.toggle-pw {
  position:absolute; right:14px; top:50%;
  transform:translateY(-50%);
  background:none; border:none; cursor:pointer;
  font-size:18px; color:#8B6F5E;
}

.submit-btn {
  width:100%; padding:16px;
  background:#F4845F; color:#fff;
  border:none; border-radius:14px;
  font-family:'Nunito',sans-serif;
  font-size:15px; font-weight:800;
  cursor:pointer; transition:all .2s;
  margin-bottom:12px;
}
.submit-btn:hover:not(:disabled) { background:#E07040; transform:translateY(-1px); }
.submit-btn:disabled { background:#D0C0B0; cursor:not-allowed; }

.error-msg {
  display:none;
  background:#FFF0F0; border:1.5px solid #F4A0A0;
  border-radius:12px; padding:12px 16px;
  font-size:13px; font-weight:700; color:#C03030;
  margin-bottom:12px; text-align:left;
  animation: shake .3s ease;
}
.error-msg.show { display:block; }
@keyframes shake {
  0%,100%{transform:translateX(0)}
  20%,60%{transform:translateX(-6px)}
  40%,80%{transform:translateX(6px)}
}

.loading {
  display:none;
  font-size:13px; font-weight:700; color:#8B6F5E;
  margin-bottom:12px;
}
.loading.show { display:block; }

.success-wrap {
  display:none;
  animation: fadeUp .4s ease;
}
.success-wrap.show { display:block; }
.success-emoji { font-size:52px; margin-bottom:12px; display:block; }
.success-name  { font-size:18px; font-weight:800; color:#2C2016; margin-bottom:6px; }
.success-sub   { font-size:13px; color:#8B6F5E; margin-bottom:20px; }
.success-btn {
  display:inline-block; padding:14px 32px;
  background:#52B788; color:#fff;
  border-radius:14px; font-family:'Nunito',sans-serif;
  font-size:14px; font-weight:800;
  text-decoration:none; transition:all .2s;
}
.success-btn:hover { background:#3E9A72; transform:translateY(-1px); }

.contact {
  font-size:12px; color:#B0A090; margin-top:20px;
  line-height:1.7;
}

/* 접근 불가 에러 배너 */
.access-error {
  display:none;
  background:#FFF8E0; border:1.5px solid #F9C74F;
  border-radius:12px; padding:12px 16px;
  font-size:13px; font-weight:700; color:#8B6000;
  margin-bottom:16px;
}
.access-error.show { display:block; }

@media(max-width:480px){
  .card { padding:36px 28px; }
}
</style>
</head>
<body>

<div class="card">

  <!-- 로고 -->
  <div class="logo-wrap">
    <span class="logo-emoji">📚</span>
    <div class="logo-text">Mommy<span>Time</span></div>
    <div class="logo-sub">엄마와 아이가 함께하는 영어 학습</div>
  </div>

  <!-- 접근 제한 에러 (그룹 초과 접근) -->
  <div class="access-error" id="accessError">
    ⚠️ 현재 수강 플랜으로는 접근할 수 없는 콘텐츠예요.<br>
    업그레이드가 필요하면 선생님께 문의해주세요.
  </div>

  <!-- 로그인 폼 -->
  <div id="formWrap">
    <h1>수강 코드를 입력해주세요</h1>
    <p class="desc">
      선생님께 받은 수강 코드를 입력하면<br>
      학습 페이지에 입장할 수 있어요 🎉
    </p>

    <div class="input-wrap">
      <input
        type="password"
        id="codeInput"
        class="code-input"
        placeholder="수강 코드 입력"
        maxlength="20"
        autocomplete="off"
        spellcheck="false"
      >
      <button class="toggle-pw" id="togglePw" type="button" title="보기/숨기기">👁</button>
    </div>

    <div class="error-msg" id="errorMsg"></div>
    <div class="loading" id="loadingMsg">🔍 코드 확인 중...</div>

    <button class="submit-btn" id="submitBtn" onclick="doLogin()">
      입장하기 →
    </button>

    <p class="contact">
      코드가 없으신가요?<br>
      카카오톡 채널 <strong>@엄마시간</strong> 으로 문의해주세요.
    </p>
  </div>

  <!-- 성공 화면 -->
  <div class="success-wrap" id="successWrap">
    <span class="success-emoji">🎉</span>
    <div class="success-name" id="successName">안녕하세요!</div>
    <div class="success-sub">학습 페이지로 이동합니다...</div>
    <a href="/" class="success-btn" id="successBtn">학습 시작하기 →</a>
  </div>

</div>

<script>
// ── URL 파라미터 파싱 ──
var params = new URLSearchParams(window.location.search);
var redirectTo = params.get('redirect') || '/';
var errorType  = params.get('error');

// 접근 오류 배너
if (errorType === 'access') {
  document.getElementById('accessError').classList.add('show');
}

// 이미 로그인된 경우 바로 이동
var session = MommyAuth.getSession();
if (session && errorType !== 'access') {
  window.location.replace(redirectTo);
}

// 보이기/숨기기 토글
document.getElementById('togglePw').addEventListener('click', function () {
  var inp = document.getElementById('codeInput');
  if (inp.type === 'password') {
    inp.type = 'text'; this.textContent = '🙈';
  } else {
    inp.type = 'password'; this.textContent = '👁';
  }
});

// Enter 키 지원
document.getElementById('codeInput').addEventListener('keydown', function (e) {
  if (e.key === 'Enter') doLogin();
});

function doLogin() {
  var code = document.getElementById('codeInput').value.trim();
  var errEl = document.getElementById('errorMsg');
  var loadEl = document.getElementById('loadingMsg');
  var btn = document.getElementById('submitBtn');

  // 초기화
  errEl.classList.remove('show');
  errEl.textContent = '';

  if (!code) {
    errEl.textContent = '코드를 입력해주세요.';
    errEl.classList.add('show');
    return;
  }

  // 로딩
  btn.disabled = true;
  loadEl.classList.add('show');

  MommyAuth.verifyCode(code, function (err, student) {
    btn.disabled = false;
    loadEl.classList.remove('show');

    if (err) {
      errEl.textContent = '⚠️ ' + err;
      errEl.classList.add('show');
      return;
    }

    // 성공 — 세션 저장
    MommyAuth.saveSession(student);

    // 성공 화면 표시
    document.getElementById('formWrap').style.display = 'none';
    var sw = document.getElementById('successWrap');
    sw.classList.add('show');
    document.getElementById('successName').textContent =
      (student.name || '수강생') + '님, 환영해요! 🎉';

    // redirect 처리
    var dest = (redirectTo && redirectTo !== '/') ? redirectTo : '/';
    document.getElementById('successBtn').href = dest;

    // 1.5초 후 자동 이동
    setTimeout(function () {
      window.location.replace(dest);
    }, 1500);
  });
}
</script>
</body>
</html>
