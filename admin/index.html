<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>대시보드 — Mommy Time Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/css/admin.css">
<script src="/assets/js/admin.js"></script>
</head>
<body>

<!-- 사이드바 -->
<nav class="sidebar">
  <div class="sb-logo">
    <div class="sb-logo-text">Mommy<span>Time</span></div>
    <div class="sb-sub">⚙️ 관리자 패널</div>
  </div>
  <div class="sb-section">메뉴</div>
  <a href="/admin/index.html"    class="sb-link active"><span class="icon">📊</span>대시보드</a>
  <a href="/admin/students.html" class="sb-link"><span class="icon">👩‍👧</span>수강생 관리</a>
  <a href="/admin/content.html"  class="sb-link"><span class="icon">📚</span>콘텐츠 잠금</a>
  <a href="/admin/stats.html"    class="sb-link"><span class="icon">📈</span>학습 현황</a>
  <a href="/admin/settings.html" class="sb-link"><span class="icon">⚙️</span>사이트 설정</a>
  <div class="sb-bottom">
    <button class="sb-logout" onclick="doLogout()">🚪 로그아웃</button>
  </div>
</nav>

<!-- 메인 -->
<main class="main">
  <div class="page-header">
    <div class="page-title">📊 대시보드</div>
    <div class="page-sub" id="lastRefresh">데이터 불러오는 중...</div>
  </div>

  <!-- 스탯 카드 -->
  <div class="stats">
    <div class="stat-card">
      <div class="stat-num" id="statTotal" style="color:#5BA4CF">—</div>
      <div class="stat-label">전체 수강생</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" id="statActive" style="color:#52B788">—</div>
      <div class="stat-label">활성 수강생</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" id="statExpired" style="color:#E24B4A">—</div>
      <div class="stat-label">만료된 코드</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" id="statLocked" style="color:#F9C74F">—</div>
      <div class="stat-label">잠긴 콘텐츠</div>
    </div>
  </div>

  <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;">

    <!-- 최근 수강생 -->
    <div class="card">
      <div class="card-title">👩‍👧 최근 등록 수강생</div>
      <div class="tbl-wrap">
        <table>
          <thead><tr><th>이름</th><th>코드</th><th>만료일</th><th>상태</th></tr></thead>
          <tbody id="recentStudents">
            <tr><td colspan="4" style="text-align:center;color:var(--sub);padding:24px">불러오는 중...</td></tr>
          </tbody>
        </table>
      </div>
      <div style="margin-top:14px">
        <a href="/admin/students.html" class="btn btn-ghost btn-sm">전체 보기 →</a>
      </div>
    </div>

    <!-- 콘텐츠 현황 -->
    <div class="card">
      <div class="card-title">📚 콘텐츠 공개 현황</div>
      <div id="contentStatus" style="color:var(--sub);font-size:13px;padding:12px 0">불러오는 중...</div>
      <div style="margin-top:14px">
        <a href="/admin/content.html" class="btn btn-ghost btn-sm">잠금 관리 →</a>
      </div>
    </div>

  </div>

  <!-- 빠른 작업 -->
  <div class="card">
    <div class="card-title">⚡ 빠른 작업</div>
    <div style="display:flex;gap:12px;flex-wrap:wrap;">
      <a href="/admin/students.html#new" class="btn btn-primary">➕ 수강생 추가</a>
      <a href="/admin/content.html" class="btn btn-info">🔓 콘텐츠 공개/잠금</a>
      <a href="/admin/stats.html" class="btn btn-success">📈 학습 현황 보기</a>
      <a href="/gate.html" target="_blank" class="btn btn-ghost">🔗 게이트 페이지 열기</a>
      <button class="btn btn-ghost" onclick="refreshAll()">🔄 새로고침</button>
    </div>
  </div>

</main>

<!-- 로딩 오버레이 -->
<div id="adminLoading">
  <div class="al-spinner"></div>
  <div class="al-msg">불러오는 중...</div>
</div>

<script>
AdminAuth.guard();

function doLogout(){ AdminAuth.logout(); window.location.replace('/admin.html'); }

var today = new Date().toISOString().slice(0,10);

function refreshAll(){
  AdminUtil.showLoading('데이터 불러오는 중...');
  var loaded = 0;
  function check(){ if(++loaded >= 2) AdminUtil.hideLoading(); }

  // 수강생 데이터
  SheetsRead.getStudents(function(err, students){
    check();
    if(err){ AdminUtil.toast('수강생 데이터 오류: '+err, 'error'); return; }

    document.getElementById('statTotal').textContent = students.length;
    var active  = students.filter(function(s){ return s.active && s.expires >= today; });
    var expired = students.filter(function(s){ return s.expires < today || !s.active; });
    document.getElementById('statActive').textContent  = active.length;
    document.getElementById('statExpired').textContent = expired.length;

    // 최근 5명
    var recent = students.slice(-5).reverse();
    var tbody = document.getElementById('recentStudents');
    if(!recent.length){
      tbody.innerHTML='<tr><td colspan="4" style="text-align:center;color:var(--sub);padding:20px">등록된 수강생이 없어요</td></tr>';
      return;
    }
    tbody.innerHTML = recent.map(function(s){
      var isActive = s.active && s.expires >= today;
      var badge = isActive
        ? '<span class="badge green">활성</span>'
        : '<span class="badge red">비활성</span>';
      return '<tr><td>'+s.name+'</td><td style="font-family:monospace;font-size:12px">'+s.code+'</td><td>'+s.expires+'</td><td>'+badge+'</td></tr>';
    }).join('');
  });

  // 콘텐츠 데이터
  SheetsRead.getContent(function(err, content){
    check();
    if(err){ document.getElementById('contentStatus').textContent = 'Google Sheets 미연결 상태예요.'; return; }

    var locked   = content.filter(function(c){ return c.locked; });
    var unlocked = content.filter(function(c){ return !c.locked; });
    document.getElementById('statLocked').textContent = locked.length;

    var groups = ['G1','G2','G3','G4','G5','G6','G7'];
    var html = groups.map(function(g){
      var gc = content.find(function(c){ return c.id === g && c.type === 'group'; });
      var isLocked = gc ? gc.locked : false;
      var badge = isLocked
        ? '<span class="badge red">🔒 잠김</span>'
        : '<span class="badge green">🔓 공개</span>';
      return '<div style="display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border)">'+
             '<span style="font-size:13px;font-weight:700">Group '+g.slice(1)+'</span>'+badge+'</div>';
    }).join('');
    document.getElementById('contentStatus').innerHTML = html;
  });

  document.getElementById('lastRefresh').textContent =
    '마지막 업데이트: ' + new Date().toLocaleTimeString('ko-KR');
}

refreshAll();
</script>
</body>
</html>
