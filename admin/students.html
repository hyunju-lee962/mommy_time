<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>수강생 관리 — Mommy Time Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/css/admin.css">
<script src="/assets/js/admin.js"></script>
</head>
<body>

<nav class="sidebar">
  <div class="sb-logo"><div class="sb-logo-text">Mommy<span>Time</span></div><div class="sb-sub">⚙️ 관리자 패널</div></div>
  <div class="sb-section">메뉴</div>
  <a href="/admin/index.html"    class="sb-link"><span class="icon">📊</span>대시보드</a>
  <a href="/admin/students.html" class="sb-link active"><span class="icon">👩‍👧</span>수강생 관리</a>
  <a href="/admin/content.html"  class="sb-link"><span class="icon">📚</span>콘텐츠 잠금</a>
  <a href="/admin/stats.html"    class="sb-link"><span class="icon">📈</span>학습 현황</a>
  <a href="/admin/settings.html" class="sb-link"><span class="icon">⚙️</span>사이트 설정</a>
  <div class="sb-bottom"><button class="sb-logout" onclick="doLogout()">🚪 로그아웃</button></div>
</nav>

<main class="main">
  <div class="page-header">
    <div class="page-title">👩‍👧 수강생 관리</div>
    <div class="page-sub">코드 발급 · 활성화/비활성화 · 만료일 관리</div>
  </div>

  <!-- 스탯 -->
  <div class="stats">
    <div class="stat-card"><div class="stat-num" id="sTotal" style="color:#5BA4CF">—</div><div class="stat-label">전체</div></div>
    <div class="stat-card"><div class="stat-num" id="sActive" style="color:#52B788">—</div><div class="stat-label">활성</div></div>
    <div class="stat-card"><div class="stat-num" id="sExpired" style="color:#E24B4A">—</div><div class="stat-label">만료</div></div>
    <div class="stat-card"><div class="stat-num" id="sInactive" style="color:#8a9ab0">—</div><div class="stat-label">비활성</div></div>
  </div>

  <!-- 검색 + 추가 버튼 -->
  <div class="search-bar">
    <input class="search-input" id="searchInput" placeholder="🔍 이름 또는 코드로 검색..." oninput="filterTable()">
    <select class="form-select" id="filterStatus" onchange="filterTable()" style="width:130px">
      <option value="">전체 상태</option>
      <option value="active">활성</option>
      <option value="expired">만료</option>
      <option value="inactive">비활성</option>
    </select>
    <button class="btn btn-primary" onclick="openAddModal()">➕ 수강생 추가</button>
    <button class="btn btn-ghost" onclick="loadStudents()">🔄</button>
  </div>

  <!-- 테이블 -->
  <div class="card">
    <div class="tbl-wrap">
      <table>
        <thead>
          <tr>
            <th>이름</th>
            <th>수강 코드</th>
            <th>접근 그룹</th>
            <th>만료일</th>
            <th>상태</th>
            <th>메모</th>
            <th>관리</th>
          </tr>
        </thead>
        <tbody id="studentsTbody">
          <tr><td colspan="7" style="text-align:center;color:var(--sub);padding:32px">불러오는 중...</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</main>

<!-- 수강생 추가/수정 모달 -->
<div class="modal-overlay" id="studentModal">
  <div class="modal">
    <div class="modal-title" id="modalTitle">➕ 수강생 추가</div>
    <input type="hidden" id="editOrigCode">

    <div class="form-row">
      <div class="form-group">
        <label class="form-label">이름 *</label>
        <input class="form-input" id="fName" placeholder="김민지엄마">
      </div>
      <div class="form-group">
        <label class="form-label">수강 코드 *</label>
        <div style="display:flex;gap:8px">
          <input class="form-input" id="fCode" placeholder="자동생성 또는 직접입력" style="flex:1">
          <button class="btn btn-ghost btn-sm" onclick="genCode()" style="white-space:nowrap">🎲 생성</button>
        </div>
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label class="form-label">만료일 *</label>
        <div style="display:flex;gap:6px;flex-wrap:wrap">
          <input class="form-input" id="fExpires" type="date" style="flex:1">
          <button class="btn btn-ghost btn-sm" onclick="setExpiry(3)">3개월</button>
          <button class="btn btn-ghost btn-sm" onclick="setExpiry(6)">6개월</button>
          <button class="btn btn-ghost btn-sm" onclick="setExpiry(12)">1년</button>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">접근 그룹</label>
        <select class="form-select" id="fGroups">
          <option value="ALL">ALL (전체)</option>
          <option value="G1">G1만</option>
          <option value="G1,G2">G1~G2</option>
          <option value="G1,G2,G3">G1~G3</option>
          <option value="G1,G2,G3,G4">G1~G4</option>
          <option value="G1,G2,G3,G4,G5">G1~G5</option>
          <option value="G1,G2,G3,G4,G5,G6">G1~G6</option>
        </select>
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label class="form-label">활성화</label>
        <label style="display:flex;align-items:center;gap:10px;margin-top:6px;cursor:pointer">
          <label class="toggle-switch">
            <input type="checkbox" id="fActive" checked>
            <span class="toggle-slider"></span>
          </label>
          <span id="fActiveLabel" style="font-size:13px;font-weight:700;color:#52B788">활성화됨</span>
        </label>
      </div>
      <div class="form-group">
        <label class="form-label">메모</label>
        <input class="form-input" id="fMemo" placeholder="예: 1기 수강생, 체험판">
      </div>
    </div>

    <!-- 코드 미리보기 -->
    <div id="codePreview" style="background:rgba(244,132,95,.1);border:1.5px dashed #F4845F;border-radius:10px;padding:12px 16px;margin-top:4px;display:none">
      <div style="font-size:11px;color:#F4845F;font-weight:700;margin-bottom:4px">발급될 코드</div>
      <div id="codePreviewVal" style="font-size:22px;font-weight:900;letter-spacing:.15em;color:#fff;font-family:monospace"></div>
    </div>

    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('studentModal')">취소</button>
      <button class="btn btn-primary" id="saveStudentBtn" onclick="saveStudent()">저장하기</button>
    </div>
  </div>
</div>

<!-- 삭제 확인 모달 -->
<div class="modal-overlay" id="deleteModal">
  <div class="modal" style="max-width:360px;text-align:center">
    <div style="font-size:42px;margin-bottom:12px">⚠️</div>
    <div class="modal-title" style="justify-content:center">정말 삭제할까요?</div>
    <div style="font-size:14px;color:var(--sub);margin-bottom:4px">삭제하면 복구가 불가능해요.</div>
    <div id="deleteTargetName" style="font-size:16px;font-weight:800;color:#fff;margin:12px 0"></div>
    <div class="modal-footer" style="justify-content:center">
      <button class="btn btn-ghost" onclick="closeModal('deleteModal')">취소</button>
      <button class="btn btn-danger" id="confirmDeleteBtn">삭제하기</button>
    </div>
  </div>
</div>

<div id="adminLoading"><div class="al-spinner"></div><div class="al-msg">처리 중...</div></div>

<script>
AdminAuth.guard();
function doLogout(){ AdminAuth.logout(); window.location.replace('/admin.html'); }

var allStudents = [];
var today = new Date().toISOString().slice(0,10);
var deleteTarget = null;

function getStatus(s){
  if(!s.active) return 'inactive';
  if(s.expires < today) return 'expired';
  return 'active';
}

function loadStudents(){
  AdminUtil.showLoading('수강생 불러오는 중...');
  SheetsRead.getStudents(function(err, students){
    AdminUtil.hideLoading();
    if(err){ AdminUtil.toast('오류: '+err, 'error'); return; }
    allStudents = students;
    updateStats(students);
    renderTable(students);
  });
}

function updateStats(students){
  document.getElementById('sTotal').textContent   = students.length;
  document.getElementById('sActive').textContent  = students.filter(function(s){return getStatus(s)==='active';}).length;
  document.getElementById('sExpired').textContent = students.filter(function(s){return getStatus(s)==='expired';}).length;
  document.getElementById('sInactive').textContent= students.filter(function(s){return getStatus(s)==='inactive';}).length;
}

function renderTable(students){
  var tbody = document.getElementById('studentsTbody');
  if(!students.length){
    tbody.innerHTML='<tr><td colspan="7" style="text-align:center;color:var(--sub);padding:32px">수강생이 없어요. 추가해보세요!</td></tr>';
    return;
  }
  tbody.innerHTML = students.map(function(s){
    var st = getStatus(s);
    var badge = st==='active'  ? '<span class="badge green">✅ 활성</span>'
               :st==='expired' ? '<span class="badge red">⏰ 만료</span>'
               :                 '<span class="badge gray">❌ 비활성</span>';
    var expiryStyle = s.expires < today ? 'color:#E24B4A' : '';
    return '<tr>'+
      '<td><strong>'+s.name+'</strong></td>'+
      '<td><code style="font-family:monospace;font-size:12px;background:rgba(255,255,255,.08);padding:3px 8px;border-radius:6px">'+s.code+'</code></td>'+
      '<td><span class="badge blue">'+s.groups+'</span></td>'+
      '<td style="'+expiryStyle+'">'+s.expires+'</td>'+
      '<td>'+badge+'</td>'+
      '<td style="color:var(--sub);font-size:12px">'+s.memo+'</td>'+
      '<td><div style="display:flex;gap:6px">'+
        '<button class="btn btn-ghost btn-sm" onclick="openEditModal(\''+s.code+'\')">✏️ 수정</button>'+
        '<button class="btn btn-danger btn-sm" onclick="openDeleteModal(\''+s.code+'\',\''+s.name+'\')">🗑</button>'+
      '</div></td>'+
    '</tr>';
  }).join('');
}

function filterTable(){
  var q = document.getElementById('searchInput').value.toLowerCase();
  var f = document.getElementById('filterStatus').value;
  var filtered = allStudents.filter(function(s){
    var matchQ = !q || s.name.toLowerCase().includes(q) || s.code.toLowerCase().includes(q);
    var matchF = !f || getStatus(s) === f;
    return matchQ && matchF;
  });
  renderTable(filtered);
}

// ── 모달 ──
function openAddModal(){
  document.getElementById('modalTitle').textContent = '➕ 수강생 추가';
  document.getElementById('editOrigCode').value = '';
  document.getElementById('fName').value    = '';
  document.getElementById('fCode').value    = '';
  document.getElementById('fExpires').value = AdminUtil.addMonths(3);
  document.getElementById('fGroups').value  = 'ALL';
  document.getElementById('fActive').checked = true;
  document.getElementById('fMemo').value    = '';
  document.getElementById('fActiveLabel').textContent = '활성화됨';
  document.getElementById('fActiveLabel').style.color = '#52B788';
  document.getElementById('codePreview').style.display = 'none';
  document.getElementById('saveStudentBtn').textContent = '저장하기';
  document.getElementById('studentModal').classList.add('show');
}

function openEditModal(code){
  var s = allStudents.find(function(s){ return s.code === code; });
  if(!s) return;
  document.getElementById('modalTitle').textContent = '✏️ 수강생 수정';
  document.getElementById('editOrigCode').value = s.code;
  document.getElementById('fName').value    = s.name;
  document.getElementById('fCode').value    = s.code;
  document.getElementById('fExpires').value = s.expires;
  document.getElementById('fGroups').value  = s.groups;
  document.getElementById('fActive').checked = s.active;
  document.getElementById('fMemo').value    = s.memo;
  updateActiveLabel();
  document.getElementById('codePreview').style.display = 'none';
  document.getElementById('saveStudentBtn').textContent = '수정하기';
  document.getElementById('studentModal').classList.add('show');
}

function openDeleteModal(code, name){
  deleteTarget = code;
  document.getElementById('deleteTargetName').textContent = name + ' (' + code + ')';
  document.getElementById('deleteModal').classList.add('show');
}

document.getElementById('confirmDeleteBtn').onclick = function(){
  if(!deleteTarget) return;
  AdminUtil.showLoading('삭제 중...');
  SheetsWrite.deleteStudent({ code: deleteTarget }, function(err){
    AdminUtil.hideLoading();
    closeModal('deleteModal');
    if(err){ AdminUtil.toast('삭제 오류: '+err, 'error'); return; }
    AdminUtil.toast('삭제됐어요!', 'success');
    loadStudents();
  });
};

function closeModal(id){ document.getElementById(id).classList.remove('show'); }

function genCode(){
  var code = AdminUtil.genCode();
  document.getElementById('fCode').value = code;
  document.getElementById('codePreviewVal').textContent = code;
  document.getElementById('codePreview').style.display = 'block';
}

function setExpiry(months){
  document.getElementById('fExpires').value = AdminUtil.addMonths(months);
}

document.getElementById('fActive').addEventListener('change', updateActiveLabel);
function updateActiveLabel(){
  var active = document.getElementById('fActive').checked;
  document.getElementById('fActiveLabel').textContent = active ? '활성화됨' : '비활성화됨';
  document.getElementById('fActiveLabel').style.color = active ? '#52B788' : '#8a9ab0';
}

document.getElementById('fCode').addEventListener('input', function(){
  var v = this.value.trim().toUpperCase();
  if(v){ document.getElementById('codePreviewVal').textContent = v; document.getElementById('codePreview').style.display='block'; }
  else { document.getElementById('codePreview').style.display='none'; }
});

function saveStudent(){
  var isEdit = !!document.getElementById('editOrigCode').value;
  var data = {
    origCode: document.getElementById('editOrigCode').value,
    code:     document.getElementById('fCode').value.trim().toUpperCase(),
    name:     document.getElementById('fName').value.trim(),
    expires:  document.getElementById('fExpires').value,
    groups:   document.getElementById('fGroups').value,
    active:   document.getElementById('fActive').checked ? 'TRUE' : 'FALSE',
    memo:     document.getElementById('fMemo').value.trim(),
  };
  if(!data.name){ AdminUtil.toast('이름을 입력해주세요.', 'error'); return; }
  if(!data.code){ AdminUtil.toast('코드를 입력하거나 생성해주세요.', 'error'); return; }
  if(!data.expires){ AdminUtil.toast('만료일을 입력해주세요.', 'error'); return; }

  AdminUtil.showLoading(isEdit ? '수정 중...' : '추가 중...');
  var fn = isEdit ? SheetsWrite.updateStudent : SheetsWrite.addStudent;
  fn(data, function(err){
    AdminUtil.hideLoading();
    closeModal('studentModal');
    if(err){ AdminUtil.toast('오류: '+err, 'error'); return; }
    AdminUtil.toast(isEdit ? '수정됐어요! ✅' : '추가됐어요! 🎉', 'success');
    loadStudents();
  });
}

// 페이지 로드 시 해시로 직접 추가 모달 열기
loadStudents();
if(window.location.hash === '#new') openAddModal();
</script>
</body>
</html>
