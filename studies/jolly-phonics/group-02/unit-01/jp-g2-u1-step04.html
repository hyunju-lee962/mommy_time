<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Step 4: Word Cards — Group 2 | Mommy Time</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--g:#52B788;--gl:#E8F8EF;--y:#F9C74F;--yl:#FFFBEC;--o:#F4845F;--ol:#FFF0EB;--b:#5BA4CF;--bl:#EBF4FF;--p:#9B72CF;--pl:#F3EEFF;--teal:#38B2AC;--teal-l:#E6FFFA;--cream:#FFFDF8;--warm:#F5EDE0;--dark:#2C2016;--br:#8B6F5E;--soft:#EAE0D5;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--cream);color:var(--dark);font-family:'Nunito',sans-serif;}
nav{position:fixed;top:0;width:100%;z-index:100;padding:13px 36px;display:flex;align-items:center;justify-content:space-between;background:rgba(255,253,248,.95);backdrop-filter:blur(14px);border-bottom:2px solid var(--soft);}
.logo{font-size:16px;font-weight:800;color:var(--dark);text-decoration:none;}.logo span{color:var(--o);}
.back{font-size:13px;color:var(--br);text-decoration:none;font-weight:700;padding:6px 14px;border:1.5px solid var(--soft);border-radius:10px;background:#fff;}
.wrap{max-width:720px;margin:0 auto;padding:82px 36px 80px;}
.step-badge{display:inline-flex;align-items:center;gap:6px;background:var(--teal-l);color:var(--teal);border:1.5px solid #B2E8E0;border-radius:20px;padding:6px 16px;font-size:13px;font-weight:700;margin-bottom:14px;}
h1{font-size:24px;font-weight:800;margin-bottom:8px;}
.sub{font-size:14px;color:var(--br);margin-bottom:24px;line-height:1.7;}
/* 섹션 카드 */
.card{background:#fff;border:2px solid #C8E8E0;border-radius:20px;padding:22px;margin-bottom:18px;box-shadow:0 2px 8px rgba(56,178,172,.07);}
.card-title{font-size:15px;font-weight:800;color:var(--teal);margin-bottom:12px;display:flex;align-items:center;gap:6px;padding-bottom:10px;border-bottom:1.5px solid #D0F0EC;}
/* Rule highlight */
.rule-highlight{background:linear-gradient(135deg,#1a6a64,#2D9E98);color:#fff;border-radius:14px;padding:16px 20px;margin-bottom:16px;}
.rh-title{font-size:12px;font-weight:700;opacity:.8;letter-spacing:.08em;text-transform:uppercase;margin-bottom:6px;}
.rh-rule{font-size:18px;font-weight:800;line-height:1.5;}
.rh-rule em{background:rgba(255,255,255,.2);border-radius:6px;padding:1px 8px;font-style:normal;color:#FFE066;}
/* 완료 버튼 */
.done-btn{width:100%;padding:15px;border-radius:16px;background:var(--teal);color:#fff;border:none;font-family:'Nunito',sans-serif;font-size:15px;font-weight:700;cursor:pointer;margin-top:4px;transition:all .2s;}
.done-btn:hover{background:#2D9E98;}
.done-msg{display:none;background:var(--teal-l);border:1.5px solid #B2E8E0;border-radius:14px;padding:14px;text-align:center;margin-top:10px;font-size:14px;font-weight:700;color:#1a6a64;}
.done-msg.show{display:block;}
.nav-btns{display:flex;gap:10px;margin-top:14px;padding-top:14px;border-top:1.5px solid var(--soft);}
.nav-btn{flex:1;padding:11px;border-radius:12px;font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;cursor:pointer;text-align:center;text-decoration:none;}
.nav-btn.sec{border:1.5px solid var(--soft);background:#fff;color:var(--br);}
.nav-btn.pri{background:var(--teal);color:#fff;border:none;}
@media(max-width:680px){.wrap{padding-left:20px;padding-right:20px;}}
</style>
</head>

MommyAuth.checkLock('G2-U1-S04');</script>

  <div style="display:flex;gap:8px;margin-bottom:20px;">

    <button class="mtab" id="tab-match" onclick="setMode('match',this)" style="flex:1;padding:10px;border-radius:12px;border:2px solid #C8E8E0;background:#fff;color:var(--br);font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;cursor:pointer;">🎯 Match</button>

<script>
function markDone(){
  var done=new Set(JSON.parse(localStorage.getItem('jp_g2_u1_done')||'[]'));
  done.add(4);localStorage.setItem('jp_g2_u1_done',JSON.stringify([...done]));
  MommyAuth.logProgress('G2-U1-S04');
  document.getElementById('doneMsg').classList.add('show');
  document.querySelector('.done-btn').disabled=true;document.querySelector('.done-btn').style.opacity='.6';
}
var d=new Set(JSON.parse(localStorage.getItem('jp_g2_u1_done')||'[]'));
if(d.has(4)){document.getElementById('doneMsg').classList.add('show');document.querySelector('.done-btn').disabled=true;document.querySelector('.done-btn').style.opacity='.6';}

<script>// ══════════════════════════════════════════
//  Unit LNB (Left Navigation Bar)
//  모든 Step 파일에서 공통으로 사용
// ══════════════════════════════════════════

const LNB_STEPS = [
  { num:1,  icon:'🔊', title:'Sound Intro',       short:'소리 만나기' },
  { num:2,  icon:'✍️', title:'Letter Formation',  short:'글자 쓰기' },
  { num:3,  icon:'👂', title:'Sound Discrimination', short:'소리 구별' },
  { num:4,  icon:'📖', title:'Word Cards',         short:'단어 카드' },
  { num:5,  icon:'🔤', title:'Blending',           short:'소리 합치기' },
  { num:6,  icon:'📚', title:'Decodable Story',    short:'스토리 읽기' },
  { num:7,  icon:'⭐', title:'Tricky Words',       short:'트리키 워드' },
  { num:8,  icon:'🎮', title:'Games',              short:'게임' },
  { num:9,  icon:'💬', title:'Talk Together',      short:'함께 대화' },
  { num:10, icon:'📔', title:'My Journal',         short:'나의 저널' },
];

const DONE_KEY = 'jp_g2_u1_done';

function getLNBDone() {
  return new Set(JSON.parse(localStorage.getItem(DONE_KEY) || '[]'));
}

// 현재 step 번호 파악
function getCurrentStep() {
  const path = window.location.pathname;
  const match = path.match(/step-(\d+)\.html/);
  return match ? parseInt(match[1]) : 0;
}

// LNB CSS 주입
function injectLNBStyle() {
  const style = document.createElement('style');
  style.textContent = `
    /* ── LNB 레이아웃 ── */
    body { overflow-x: hidden; }

    /* 기존 nav 조정 */
    nav { left: 0; z-index: 200; }

    /* LNB 사이드바 */
    #unitLNB {
      position: fixed;
      top: 56px; /* nav 높이 */
      left: 0;
      width: 220px;
      height: calc(100vh - 56px);
      background: #FEFCFF;
      border-right: 2px solid #B2E8E0;
      overflow-y: auto;
      z-index: 150;
      padding: 16px 0 32px;
      transition: transform .3s ease;
    }

    /* LNB 헤더 */
    .lnb-header {
      padding: 0 16px 12px;
      border-bottom: 1px solid var(--soft);
      margin-bottom: 8px;
    }
    .lnb-unit-label {
      font-size: 10px; font-weight: 700; color: var(--br);
      text-transform: uppercase; letter-spacing: .08em; margin-bottom: 4px;
    }
    .lnb-unit-title {
      font-size: 16px; font-weight: 800; color: #1a8a84;
    }
    .lnb-progress {
      margin-top: 8px;
    }
    .lnb-prog-track {
      background: #E0D0FF; border-radius: 6px; height: 6px; overflow: hidden;
    }
    .lnb-prog-fill {
      height: 100%; background: #1a8a84; border-radius: 6px; transition: width .4s;
    }
    .lnb-prog-txt {
      font-size: 10px; color: var(--br); font-weight: 700; margin-top: 3px;
    }

    /* LNB 아이템 */
    .lnb-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 16px; cursor: pointer;
      text-decoration: none; color: var(--dark);
      border-left: 3px solid transparent;
      transition: all .15s;
      font-size: 13px; font-weight: 600;
      position: relative;
    }
    .lnb-item:hover {
      background: #F0FFFD; border-left-color: #80D0C8;
    }
    .lnb-item.active {
      background: #D0F5F0;
      border-left-color: #1a8a84;
      color: #1a8a84;
      font-weight: 800;
    }
    .lnb-item.done {
      color: var(--g);
    }
    .lnb-item.done .lnb-check {
      display: flex;
    }
    .lnb-num {
      width: 26px; height: 26px; border-radius: 8px;
      background: #D0F5F0; color: #1a8a84;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 800; flex-shrink: 0;
      transition: all .15s;
    }
    .lnb-item.active .lnb-num {
      background: #1a8a84; color: #fff;
    }
    .lnb-item.done .lnb-num {
      background: #2D9E68; color: #fff;
    }
    .lnb-icon { font-size: 14px; flex-shrink: 0; }
    .lnb-text { flex: 1; }
    .lnb-title { display: block; font-size: 12px; font-weight: 700; line-height: 1.2; }
    .lnb-short { display: block; font-size: 10px; opacity: .65; margin-top: 1px; }
    .lnb-check {
      display: none; width: 18px; height: 18px; border-radius: 50%;
      background: var(--g); color: #fff;
      align-items: center; justify-content: center; font-size: 10px; flex-shrink: 0;
    }

    /* 콘텐츠 영역 밀기 */
    #lnbContentShift {
      margin-left: 220px;
      transition: margin-left .3s;
    }

    /* 모바일 토글 버튼 */
    #lnbToggle {
      display: none;
      position: fixed;
      bottom: 20px; right: 20px;
      width: 52px; height: 52px;
      border-radius: 50%;
      background: #38B2AC; color: #fff;
      border: none; font-size: 20px;
      cursor: pointer; z-index: 300;
      box-shadow: 0 4px 16px rgba(155,114,207,.4);
    }

    /* 모바일 오버레이 */
    #lnbOverlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,.3);
      z-index: 140;
    }
    #lnbOverlay.show { display: block; }

    /* 모바일 */
    @media (max-width: 768px) {
      #unitLNB {
        transform: translateX(-100%);
        top: 0; height: 100vh;
        padding-top: 72px;
        box-shadow: 4px 0 24px rgba(0,0,0,.12);
      }
      #unitLNB.open { transform: translateX(0); }
      #lnbContentShift { margin-left: 0 !important; }
      #lnbToggle { display: flex; align-items: center; justify-content: center; }
    }
  `;
  document.head.appendChild(style);
}

// LNB HTML 생성
function buildLNB() {
  const currentStep = getCurrentStep();
  const done = getLNBDone();

  // LNB 사이드바
  const lnb = document.createElement('div');
  lnb.id = 'unitLNB';

  // 헤더
  const pct = Math.round(done.size / LNB_STEPS.length * 100);
  lnb.innerHTML = `
    <div class="lnb-header">
      <div class="lnb-unit-label">Group 2 · Unit 1</div>
      <div class="lnb-unit-title">Floss Rule</div>
      <div class="lnb-progress">
        <div class="lnb-prog-track">
          <div class="lnb-prog-fill" style="width:${pct}%"></div>
        </div>
        <div class="lnb-prog-txt">${done.size} / ${LNB_STEPS.length} 완료</div>
      </div>
    </div>`;

  // Step 목록
  LNB_STEPS.forEach(s => {
    const isDone = done.has(s.num);
    const isActive = s.num === currentStep;
    const a = document.createElement('a');
    a.href = `step-${String(s.num).padStart(2,'0')}.html`;
    a.className = 'lnb-item' + (isActive ? ' active' : '') + (isDone ? ' done' : '');
    a.innerHTML = `
      <div class="lnb-num">${isDone ? '✓' : s.num}</div>
      <span class="lnb-icon">${s.icon}</span>
      <span class="lnb-text">
        <span class="lnb-title">${s.title}</span>
        <span class="lnb-short">${s.short}</span>
      </span>
      <div class="lnb-check">✓</div>`;
    lnb.appendChild(a);
  });

  document.body.appendChild(lnb);

  // 오버레이 (모바일)
  const overlay = document.createElement('div');
  overlay.id = 'lnbOverlay';
  overlay.onclick = closeLNB;
  document.body.appendChild(overlay);

  // 토글 버튼 (모바일)
  const toggle = document.createElement('button');
  toggle.id = 'lnbToggle';
  toggle.innerHTML = '☰';
  toggle.onclick = toggleLNB;
  document.body.appendChild(toggle);
}

// 기존 콘텐츠에 margin-left 적용
function shiftContent() {
  // nav는 이미 fixed라 영향 없음
  // wrap 또는 body의 직접 자식 div들에 margin 적용
  const wrap = document.querySelector('.wrap') || document.querySelector('main');
  if (wrap) {
    wrap.id = wrap.id || 'lnbContentShift';
    wrap.style.marginLeft = '220px';
    wrap.style.transition = 'margin-left .3s';
  }

  // 모바일에서는 margin 제거
  function applyMobile() {
    if (window.innerWidth <= 768) {
      if (wrap) wrap.style.marginLeft = '0';
    } else {
      if (wrap) wrap.style.marginLeft = '220px';
    }
  }
  applyMobile();
  window.addEventListener('resize', applyMobile);
}

function toggleLNB() {
  const lnb = document.getElementById('unitLNB');
  const overlay = document.getElementById('lnbOverlay');
  const toggle = document.getElementById('lnbToggle');
  const isOpen = lnb.classList.contains('open');
  lnb.classList.toggle('open', !isOpen);
  overlay.classList.toggle('show', !isOpen);
  toggle.innerHTML = isOpen ? '☰' : '✕';
}

function closeLNB() {
  document.getElementById('unitLNB')?.classList.remove('open');
  document.getElementById('lnbOverlay')?.classList.remove('show');
  document.getElementById('lnbToggle').innerHTML = '☰';
}

// 초기화
function initLNB() {
  injectLNBStyle();
  buildLNB();
  shiftContent();
}

// DOM 준비 후 실행
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', initLNB);
} else {
  initLNB();
}
</script>
</body></html>
<script>
var WORDS=[
  {word:'off',hl:'ff',ko:'끄다/벗어나',emoji:'🔴',phonics:'아-프'},
  {word:'huff',hl:'ff',ko:'헐떡이다',emoji:'😤',phonics:'하-프'},
  {word:'puff',hl:'ff',ko:'훅 불다',emoji:'💨',phonics:'퍼-프'},
  {word:'hill',hl:'ll',ko:'언덕',emoji:'⛰️',phonics:'히-을'},
  {word:'bell',hl:'ll',ko:'종/벨',emoji:'🔔',phonics:'베-을'},
  {word:'pull',hl:'ll',ko:'당기다',emoji:'🏋️',phonics:'풀'},
  {word:'miss',hl:'ss',ko:'그리워하다',emoji:'💭',phonics:'미-스'},
  {word:'boss',hl:'ss',ko:'상사/사장',emoji:'👔',phonics:'보-스'},
  {word:'buzz',hl:'zz',ko:'윙윙/버즈',emoji:'🐝',phonics:'버-즈'},
  {word:'fizz',hl:'zz',ko:'거품/탄산',emoji:'🥤',phonics:'피-즈'},
  {word:'back',hl:'ck',ko:'뒤/등',emoji:'🔙',phonics:'배-크'},
  {word:'duck',hl:'ck',ko:'오리',emoji:'🦆',phonics:'더-크'},
];
function hlW(w,hl){var i=w.lastIndexOf(hl);if(i<0)return w;return w.slice(0,i)+'<span style="color:var(--o);font-weight:800">'+hl+'</span>'+w.slice(i+hl.length);}
function speak(t){window.speechSynthesis.cancel();var u=new SpeechSynthesisUtterance(t);u.lang='en-GB';u.rate=0.8;var vs=window.speechSynthesis.getVoices();var v=vs.find(function(v){return v.lang==='en-GB';})||vs.find(function(v){return v.lang.startsWith('en');})||null;if(v)u.voice=v;window.speechSynthesis.speak(u);}
// Study 모드
function buildStudy(){
  var g=document.getElementById('mStudy');g.innerHTML='';
  var grid=document.createElement('div');grid.style.cssText='display:grid;grid-template-columns:repeat(2,1fr);gap:12px;';
  WORDS.forEach(function(w,i){
    var c=document.createElement('div');
    c.style.cssText='background:#fff;border:2px solid #C8E8E0;border-radius:16px;padding:16px;text-align:center;box-shadow:0 2px 6px rgba(56,178,172,.07);';
    c.innerHTML='<div style="font-size:44px;margin-bottom:8px">'+w.emoji+'</div>'+
      '<div style="font-size:22px;font-weight:800;margin-bottom:4px">'+hlW(w.word,w.hl)+'</div>'+
      '<div style="font-size:12px;color:var(--br);margin-bottom:4px">'+w.ko+'</div>'+
      '<div style="font-size:11px;color:var(--teal);font-weight:700;background:var(--teal-l);padding:2px 10px;border-radius:8px;display:inline-block;margin-bottom:8px">('+w.phonics+')</div><br>'+
      '<button onclick="speak(w.word)" style="background:var(--teal);color:#fff;border:none;border-radius:10px;padding:6px 16px;font-family:Nunito,sans-serif;font-size:12px;font-weight:700;cursor:pointer;">🔊 듣기</button>';
    grid.appendChild(c);
  });
  g.appendChild(grid);
}
// Flashcard 모드
var fIdx=0;
function buildFlash(){fIdx=0;showFlash();}
function showFlash(){
  var w=WORDS[fIdx];
  var g=document.getElementById('mFlash');
  g.innerHTML='<div style="background:#fff;border:2px solid #C8E8E0;border-radius:20px;padding:36px;text-align:center;min-height:220px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 4px 16px rgba(56,178,172,.12);" onclick="flipFlash()">'+
    '<div style="font-size:72px;margin-bottom:12px">'+w.emoji+'</div>'+
    '<div id="flashWord" style="display:none;font-size:36px;font-weight:800;margin-bottom:6px">'+hlW(w.word,w.hl)+'</div>'+
    '<div id="flashKo" style="display:none;font-size:15px;color:var(--br)">'+w.ko+' ('+w.phonics+')</div>'+
    '<div id="flashHint" style="font-size:13px;color:var(--br)">탭해서 단어 확인!</div>'+
    '</div>'+
    '<div style="display:flex;gap:10px;margin-top:12px;justify-content:center;">'+
    '<button onclick="prevFlash()" style="padding:10px 24px;border-radius:12px;background:var(--warm);color:var(--br);border:none;font-family:Nunito,sans-serif;font-size:13px;font-weight:700;cursor:pointer;">← 이전</button>'+
    '<span style="align-self:center;font-size:13px;font-weight:700;color:var(--br)">'+(fIdx+1)+' / '+WORDS.length+'</span>'+
    '<button onclick="nextFlash()" style="padding:10px 24px;border-radius:12px;background:var(--teal);color:#fff;border:none;font-family:Nunito,sans-serif;font-size:13px;font-weight:700;cursor:pointer;">다음 →</button>'+
    '</div>';
  speak(w.word);
}
function flipFlash(){document.getElementById('flashWord').style.display='block';document.getElementById('flashKo').style.display='block';document.getElementById('flashHint').style.display='none';}
function nextFlash(){fIdx=(fIdx+1)%WORDS.length;showFlash();}
function prevFlash(){fIdx=(fIdx-1+WORDS.length)%WORDS.length;showFlash();}

// Match 모드 — SVG 선 연결
var MW=WORDS.slice(0,6),mSel=null,mDone=0;
function buildMatch(){
  mSel=null;mDone=0;
  var g=document.getElementById('mMatch');
  g.innerHTML='<div style="font-size:13px;font-weight:700;color:var(--teal);margin-bottom:12px;text-align:center" id="mScore">단어와 뜻을 연결해요!</div>'+
    '<div style="display:grid;grid-template-columns:1fr 40px 1fr;gap:0;align-items:start;">'+
    '<div><div style="font-size:11px;font-weight:700;color:var(--br);text-align:center;margin-bottom:8px;text-transform:uppercase;letter-spacing:.06em">단어</div><div id="mWords"></div></div>'+
    '<div style="position:relative;"><svg id="mSvg" style="position:relative;width:40px;overflow:visible;" height="350"></svg></div>'+
    '<div><div style="font-size:11px;font-weight:700;color:var(--br);text-align:center;margin-bottom:8px;text-transform:uppercase;letter-spacing:.06em">뜻</div><div id="mMeans"></div></div>'+
    '</div>'+
    '<button onclick="buildMatch()" style="display:block;margin:12px auto 0;padding:8px 22px;border-radius:12px;background:var(--warm);color:var(--br);border:none;font-family:Nunito,sans-serif;font-size:12px;font-weight:700;cursor:pointer;">🔄 다시하기</button>';
  var shuffled=[...MW].sort(function(){return Math.random()-.5;});
  var wc=document.getElementById('mWords'),mc=document.getElementById('mMeans');
  MW.forEach(function(w,i){
    var d=document.createElement('div');
    d.style.cssText='padding:11px 10px;border-radius:12px;border:2.5px solid #C8E8E0;background:#fff;text-align:center;cursor:pointer;font-weight:700;font-size:14px;margin-bottom:10px;transition:all .2s;';
    d.dataset.id=String(i);d.dataset.side='left';d.textContent=w.word;
    d.onclick=function(){mClick(d);};wc.appendChild(d);
  });
  shuffled.forEach(function(w){
    var i=MW.indexOf(w);
    var d=document.createElement('div');
    d.style.cssText='padding:11px 10px;border-radius:12px;border:2.5px solid #C8E8E0;background:#fff;text-align:center;cursor:pointer;font-weight:700;font-size:13px;margin-bottom:10px;transition:all .2s;';
    d.dataset.id=String(i);d.dataset.side='right';d.innerHTML=w.emoji+' '+w.ko;
    d.onclick=function(){mClick(d);};mc.appendChild(d);
  });
}
function getCenter(el){
  var wrap=document.getElementById('mMatch');
  var wr=wrap.getBoundingClientRect();
  var er=el.getBoundingClientRect();
  return{x:el.dataset.side==='left'?38:2,y:(er.top-wr.top)+er.height/2};
}
function drawLine(a,b,color){
  var svg=document.getElementById('mSvg');
  var p1=getCenter(a),p2=getCenter(b);
  var line=document.createElementNS('http://www.w3.org/2000/svg','line');
  line.setAttribute('x1',p1.x);line.setAttribute('y1',p1.y);
  line.setAttribute('x2',p2.x);line.setAttribute('y2',p2.y);
  line.setAttribute('stroke',color);line.setAttribute('stroke-width','3');
  line.setAttribute('stroke-linecap','round');
  svg.appendChild(line);return line;
}
function mClick(el){
  if(el.style.background.includes('E8F8')||el.style.background.includes('E6FF'))return;
  if(mSel){
    if(mSel===el){mSel.style.background='#fff';mSel.style.borderColor='#C8E8E0';mSel=null;return;}
    if(mSel.dataset.side===el.dataset.side){mSel.style.background='#fff';mSel.style.borderColor='#C8E8E0';mSel=el;el.style.background='var(--teal-l)';el.style.borderColor='var(--teal)';return;}
    if(mSel.dataset.id===el.dataset.id){
      mSel.style.background='var(--gl)';mSel.style.borderColor='var(--g)';mSel.style.pointerEvents='none';
      el.style.background='var(--gl)';el.style.borderColor='var(--g)';el.style.pointerEvents='none';
      drawLine(mSel,el,'#52B788');mDone++;
      document.getElementById('mScore').textContent=mDone===MW.length?'🎉 모두 연결!':mDone+' / '+MW.length+' 연결됨!';
      mSel=null;
    } else {
      mSel.style.background='#fff';mSel.style.borderColor='#C8E8E0';
      el.style.background='#FCEBEB';el.style.borderColor='#E24B4A';
      var l=drawLine(mSel,el,'#E24B4A');
      setTimeout(function(){el.style.background='#fff';el.style.borderColor='#C8E8E0';l.remove();},600);
      mSel=null;
    }
  } else {
    if(mSel)mSel.style.background='#fff';
    mSel=el;el.style.background='var(--teal-l)';el.style.borderColor='var(--teal)';
  }
}
function setMode(m,btn){
  document.querySelectorAll('.mtab').forEach(function(b){b.style.background='#fff';b.style.color='var(--br)';b.style.borderColor='#C8E8E0';});
  btn.style.background='var(--teal)';btn.style.color='#fff';btn.style.borderColor='var(--teal)';
  document.getElementById('mStudy').style.display=m==='study'?'block':'none';
  document.getElementById('mFlash').style.display=m==='flash'?'block':'none';
  document.getElementById('mMatch').style.display=m==='match'?'block':'none';
  if(m==='flash')buildFlash();
  if(m==='match')buildMatch();
}
buildStudy();
window.speechSynthesis.onvoiceschanged=function(){window.speechSynthesis.getVoices();};
</script>
