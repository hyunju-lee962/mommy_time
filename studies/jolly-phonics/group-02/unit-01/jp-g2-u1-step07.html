<script>// ══════════════════════════════════════════
//  Unit LNB (Left Navigation Bar)
//  모든 Step 파일에서 공통으로 사용
// ══════════════════════════════════════════

const LNB_STEPS = [
  { num:1,  icon:'🔊', title:'Sound Intro',       short:'소리 만나기' },
  { num:2,  icon:'✍️', title:'Letter Formation',  short:'글자 쓰기' },
  { num:3,  icon:'👂', title:'Sound Discrimination', short:'소리 구별' },
  { num:4,  icon:'📖', title:'Word Cards',         short:'단어 카드' },
  { num:5,  icon:'🔤', title:'Blending',           short:'소리 합치기' },
  { num:6,  icon:'📚', title:'Decodable Story',    short:'스토리 읽기' },
  { num:7,  icon:'⭐', title:'Tricky Words',       short:'트리키 워드' },
  { num:8,  icon:'🎮', title:'Games',              short:'게임' },
  { num:9,  icon:'💬', title:'Talk Together',      short:'함께 대화' },
  { num:10, icon:'📔', title:'My Journal',         short:'나의 저널' },
];

const DONE_KEY = 'jp_g2_u1_done';

function getLNBDone() {
  return new Set(JSON.parse(localStorage.getItem(DONE_KEY) || '[]'));
}

// 현재 step 번호 파악
function getCurrentStep() {
  const path = window.location.pathname;
  const match = path.match(/step-(\d+)\.html/);
  return match ? parseInt(match[1]) : 0;
}

// LNB CSS 주입
function injectLNBStyle() {
  const style = document.createElement('style');
  style.textContent = `
    /* ── LNB 레이아웃 ── */
    body { overflow-x: hidden; }

    /* 기존 nav 조정 */
    nav { left: 0; z-index: 200; }

    /* LNB 사이드바 */
    #unitLNB {
      position: fixed;
      top: 56px; /* nav 높이 */
      left: 0;
      width: 220px;
      height: calc(100vh - 56px);
      background: #FEFCFF;
      border-right: 2px solid #B2E8E0;
      overflow-y: auto;
      z-index: 150;
      padding: 16px 0 32px;
      transition: transform .3s ease;
    }

    /* LNB 헤더 */
    .lnb-header {
      padding: 0 16px 12px;
      border-bottom: 1px solid var(--soft);
      margin-bottom: 8px;
    }
    .lnb-unit-label {
      font-size: 10px; font-weight: 700; color: var(--br);
      text-transform: uppercase; letter-spacing: .08em; margin-bottom: 4px;
    }
    .lnb-unit-title {
      font-size: 16px; font-weight: 800; color: #1a8a84;
    }
    .lnb-progress {
      margin-top: 8px;
    }
    .lnb-prog-track {
      background: #E0D0FF; border-radius: 6px; height: 6px; overflow: hidden;
    }
    .lnb-prog-fill {
      height: 100%; background: #1a8a84; border-radius: 6px; transition: width .4s;
    }
    .lnb-prog-txt {
      font-size: 10px; color: var(--br); font-weight: 700; margin-top: 3px;
    }

    /* LNB 아이템 */
    .lnb-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 16px; cursor: pointer;
      text-decoration: none; color: var(--dark);
      border-left: 3px solid transparent;
      transition: all .15s;
      font-size: 13px; font-weight: 600;
      position: relative;
    }
    .lnb-item:hover {
      background: #F0FFFD; border-left-color: #80D0C8;
    }
    .lnb-item.active {
      background: #D0F5F0;
      border-left-color: #1a8a84;
      color: #1a8a84;
      font-weight: 800;
    }
    .lnb-item.done {
      color: var(--g);
    }
    .lnb-item.done .lnb-check {
      display: flex;
    }
    .lnb-num {
      width: 26px; height: 26px; border-radius: 8px;
      background: #D0F5F0; color: #1a8a84;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 800; flex-shrink: 0;
      transition: all .15s;
    }
    .lnb-item.active .lnb-num {
      background: #1a8a84; color: #fff;
    }
    .lnb-item.done .lnb-num {
      background: #2D9E68; color: #fff;
    }
    .lnb-icon { font-size: 14px; flex-shrink: 0; }
    .lnb-text { flex: 1; }
    .lnb-title { display: block; font-size: 12px; font-weight: 700; line-height: 1.2; }
    .lnb-short { display: block; font-size: 10px; opacity: .65; margin-top: 1px; }
    .lnb-check {
      display: none; width: 18px; height: 18px; border-radius: 50%;
      background: var(--g); color: #fff;
      align-items: center; justify-content: center; font-size: 10px; flex-shrink: 0;
    }

    /* 콘텐츠 영역 밀기 */
    #lnbContentShift {
      margin-left: 220px;
      transition: margin-left .3s;
    }

    /* 모바일 토글 버튼 */
    #lnbToggle {
      display: none;
      position: fixed;
      bottom: 20px; right: 20px;
      width: 52px; height: 52px;
      border-radius: 50%;
      background: #38B2AC; color: #fff;
      border: none; font-size: 20px;
      cursor: pointer; z-index: 300;
      box-shadow: 0 4px 16px rgba(155,114,207,.4);
    }

    /* 모바일 오버레이 */
    #lnbOverlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,.3);
      z-index: 140;
    }
    #lnbOverlay.show { display: block; }

    /* 모바일 */
    @media (max-width: 768px) {
      #unitLNB {
        transform: translateX(-100%);
        top: 0; height: 100vh;
        padding-top: 72px;
        box-shadow: 4px 0 24px rgba(0,0,0,.12);
      }
      #unitLNB.open { transform: translateX(0); }
      #lnbContentShift { margin-left: 0 !important; }
      #lnbToggle { display: flex; align-items: center; justify-content: center; }
    }
  `;
  document.head.appendChild(style);
}

// LNB HTML 생성
function buildLNB() {
  const currentStep = getCurrentStep();
  const done = getLNBDone();

  // LNB 사이드바
  const lnb = document.createElement('div');
  lnb.id = 'unitLNB';

  // 헤더
  const pct = Math.round(done.size / LNB_STEPS.length * 100);
  lnb.innerHTML = `
    <div class="lnb-header">
      <div class="lnb-unit-label">Group 2 · Unit 1</div>
      <div class="lnb-unit-title">Floss Rule</div>
      <div class="lnb-progress">
        <div class="lnb-prog-track">
          <div class="lnb-prog-fill" style="width:${pct}%"></div>
        </div>
        <div class="lnb-prog-txt">${done.size} / ${LNB_STEPS.length} 완료</div>
      </div>
    </div>`;

  // Step 목록
  LNB_STEPS.forEach(s => {
    const isDone = done.has(s.num);
    const isActive = s.num === currentStep;
    const a = document.createElement('a');
    a.href = `step-${String(s.num).padStart(2,'0')}.html`;
    a.className = 'lnb-item' + (isActive ? ' active' : '') + (isDone ? ' done' : '');
    a.innerHTML = `
      <div class="lnb-num">${isDone ? '✓' : s.num}</div>
      <span class="lnb-icon">${s.icon}</span>
      <span class="lnb-text">
        <span class="lnb-title">${s.title}</span>
        <span class="lnb-short">${s.short}</span>
      </span>
      <div class="lnb-check">✓</div>`;
    lnb.appendChild(a);
  });

  document.body.appendChild(lnb);

  // 오버레이 (모바일)
  const overlay = document.createElement('div');
  overlay.id = 'lnbOverlay';
  overlay.onclick = closeLNB;
  document.body.appendChild(overlay);

  // 토글 버튼 (모바일)
  const toggle = document.createElement('button');
  toggle.id = 'lnbToggle';
  toggle.innerHTML = '☰';
  toggle.onclick = toggleLNB;
  document.body.appendChild(toggle);
}

// 기존 콘텐츠에 margin-left 적용
function shiftContent() {
  // nav는 이미 fixed라 영향 없음
  // wrap 또는 body의 직접 자식 div들에 margin 적용
  const wrap = document.querySelector('.wrap') || document.querySelector('main');
  if (wrap) {
    wrap.id = wrap.id || 'lnbContentShift';
    wrap.style.marginLeft = '220px';
    wrap.style.transition = 'margin-left .3s';
  }

  // 모바일에서는 margin 제거
  function applyMobile() {
    if (window.innerWidth <= 768) {
      if (wrap) wrap.style.marginLeft = '0';
    } else {
      if (wrap) wrap.style.marginLeft = '220px';
    }
  }
  applyMobile();
  window.addEventListener('resize', applyMobile);
}

function toggleLNB() {
  const lnb = document.getElementById('unitLNB');
  const overlay = document.getElementById('lnbOverlay');
  const toggle = document.getElementById('lnbToggle');
  const isOpen = lnb.classList.contains('open');
  lnb.classList.toggle('open', !isOpen);
  overlay.classList.toggle('show', !isOpen);
  toggle.innerHTML = isOpen ? '☰' : '✕';
}

function closeLNB() {
  document.getElementById('unitLNB')?.classList.remove('open');
  document.getElementById('lnbOverlay')?.classList.remove('show');
  document.getElementById('lnbToggle').innerHTML = '☰';
}

// 초기화
function initLNB() {
  injectLNBStyle();
  buildLNB();
  shiftContent();
}

// DOM 준비 후 실행
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', initLNB);
} else {
  initLNB();
}
</script>
</body></html>
<script>
var TRICKY7=[
  {word:'he',ko:'그 (남자)',sentence:'He ran back to the hill.',exp:'h+e → 히+이 → "히" 아니고 "히~" 길게!'},
  {word:'she',ko:'그녀 (여자)',sentence:'She had a duck.',exp:'sh+e → "쉬~" 길게!'},
  {word:'we',ko:'우리',sentence:'We sat on the hill.',exp:'w+e → "위~" 길게!'},
  {word:'me',ko:'나 (목적격)',sentence:'He gave it to me.',exp:'m+e → "미~" 길게!'},
  {word:'be',ko:'이다/있다',sentence:'I will be back.',exp:'b+e → "비~" 길게!'},
  {word:'was',ko:'~였다 (과거)',sentence:'She was on the hill.',exp:'w+a+s → "워즈" 특별 발음!'},
  {word:"little",ko:"작은",sentence:"A little duck ran.",exp:"little → 리틀! tt+le 패턴"},
  {word:"please",ko:"부탁/제발",sentence:"Please come here.",exp:"please → 플리즈!"},
  {word:"these",ko:"이것들",sentence:"These are my ducks.",exp:"these → 디즈!"},
  {word:"house",ko:"집",sentence:"The duck ran to the house.",exp:"house → 하우스!"}];
function buildLSCWC7(){
  var c=document.getElementById('mLSCWC7');c.innerHTML=``;
  TRICKY7.forEach(function(tw,i){
    var card=document.createElement('div');
    card.style.cssText='background:#fff;border:2px solid #C8E8E0;border-radius:18px;padding:20px;margin-bottom:12px;box-shadow:0 2px 6px rgba(56,178,172,.07);';
    var hl=tw.sentence.replace(new RegExp('\\b'+tw.word+'\\b','gi'),'<span style="color:var(--teal);text-decoration:underline;font-weight:800">'+tw.word+'</span>');
    card.innerHTML=
      '<div style="display:flex;align-items:center;gap:12px;margin-bottom:12px;">'+
        '<div id="tw7-'+i+'" style="font-size:44px;font-weight:800;color:var(--teal);transition:opacity .3s;">'+tw.word+'</div>'+
        '<div><div style="font-size:15px;font-weight:700;color:var(--br);">'+tw.ko+'</div>'+
        '<div style="font-size:12px;color:var(--p);font-weight:600;margin-top:2px;">'+tw.exp+'</div></div>'+
      '</div>'+
      '<div style="background:var(--warm);border-radius:10px;padding:10px 14px;margin-bottom:12px;font-size:14px;font-weight:700;line-height:1.6;">예문: '+hl+'</div>'+
      '<div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;">'+
        '<button onclick="doLook7('+i+')" style="padding:9px 16px;border-radius:10px;background:var(--bl);color:var(--b);border:none;font-family:Nunito,sans-serif;font-size:13px;font-weight:700;cursor:pointer;">👁 Look (보기)</button>'+
        '<button onclick="doSay7(tw.word)" style="padding:9px 16px;border-radius:10px;background:var(--gl);color:var(--g);border:none;font-family:Nunito,sans-serif;font-size:13px;font-weight:700;cursor:pointer;">🔊 Say (소리내기)</button>'+
        '<button onclick="doCover7('+i+')" style="padding:9px 16px;border-radius:10px;background:var(--yl);color:#8B6F00;border:none;font-family:Nunito,sans-serif;font-size:13px;font-weight:700;cursor:pointer;">🙈 Cover (가리기)</button>'+
        '<input id="tw7-in-'+i+'" placeholder="써봐요..." autocomplete="off" spellcheck="false" style="border:2px solid var(--teal);border-radius:10px;padding:9px 14px;font-family:Nunito,sans-serif;font-size:16px;font-weight:700;width:130px;outline:none;">'+
        '<button onclick="doCheck7('+i+','+tw.word+')" style="padding:9px 16px;border-radius:10px;background:var(--teal);color:#fff;border:none;font-family:Nunito,sans-serif;font-size:13px;font-weight:700;cursor:pointer;">✅ Check</button>'+
      '</div>'+
      '<div id="tw7-res-'+i+'" style="font-size:13px;font-weight:700;margin-top:8px;min-height:18px;"></div>';
    c.appendChild(card);
  });
}
function doLook7(i){document.getElementById('tw7-'+i).style.opacity='1';}
function doSay7(w){window.speechSynthesis.cancel();var u=new SpeechSynthesisUtterance(w);u.lang='en-GB';u.rate=0.8;var vs=window.speechSynthesis.getVoices();var v=vs.find(function(v){return v.lang==='en-GB';})||vs.find(function(v){return v.lang.startsWith('en');})||null;if(v)u.voice=v;window.speechSynthesis.speak(u);}
function doCover7(i){document.getElementById('tw7-'+i).style.opacity='0';document.getElementById('tw7-in-'+i).focus();}
function doCheck7(i,word){
  var inp=document.getElementById('tw7-in-'+i);
  var res=document.getElementById('tw7-res-'+i);
  if(inp.value.trim().toLowerCase()===word.toLowerCase()){res.textContent='🎉 완벽해요!';res.style.color='var(--teal)';}
  else{res.textContent='🤔 다시! 정답: '+word;res.style.color='#E24B4A';}
  document.getElementById('tw7-'+i).style.opacity='1';inp.value='';
}
function buildHunt7(){
  var c=document.getElementById('mHunt7');c.innerHTML=``;
  var sentences=[
    {text:'He was back on the hill with the duck.',targets:['He','was','back']},
    {text:'She said we are not off the hill yet.',targets:['She','we']},
    {text:'Be good and she will be happy.',targets:['Be','she','be']},
    {text:'Was he with me at the bell pond?',targets:['Was','he','me']},
  ];
  sentences.forEach(function(s){
    var card=document.createElement('div');
    card.style.cssText='background:#fff;border:2px solid #C8E8E0;border-radius:16px;padding:16px 18px;margin-bottom:12px;';
    var tgt=s.targets.map(function(t){return '<strong style="color:var(--teal)">'+t+'</strong>';}).join(', ');
    card.innerHTML=`<div style="font-size:12px;color:var(--br);margin-bottom:8px;font-weight:600;">찾을 단어: `+tgt+'</div>';
    var sentDiv=document.createElement('div');sentDiv.style.cssText='font-size:17px;font-weight:700;line-height:2.2;';
    s.text.split(' ').forEach(function(w){
      var clean=w.replace(/[.,!?]/g,'');var punct=w.replace(/[a-zA-Z]/g,'');
      var isTgt=s.targets.includes(clean);
      var span=document.createElement('span');
      span.style.cssText='cursor:pointer;padding:1px 4px;border-radius:5px;transition:all .2s;';
      span.textContent=clean+(punct||'');
      if(isTgt){span.style.borderBottom='2px dashed #B2E8E0';span.onclick=function(){if(!span.dataset.found){span.dataset.found='1';span.style.background='var(--teal)';span.style.color='#fff';span.style.borderBottom='none';}};}
      else{span.onclick=function(){span.style.background='#FCEBEB';setTimeout(function(){span.style.background='';},400);};}
      sentDiv.appendChild(span);sentDiv.appendChild(document.createTextNode(' '));
    });
    card.appendChild(sentDiv);c.appendChild(card);
  });
}
