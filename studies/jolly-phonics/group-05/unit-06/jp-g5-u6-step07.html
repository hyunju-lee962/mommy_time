<!DOCTYPE html>
<html lang="en">
<head>
<script src="../../../../assets/js/auth.js"></script>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tricky Words — Review — Group 5 | G5 U6 | Mommy Time</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--g:#52B788;--gl:#E8F8EF;--y:#F9C74F;--yl:#FFFBEC;--o:#F4845F;--ol:#FFF0EB;--b:#5BA4CF;--bl:#EBF4FF;--p:#9B72CF;--pl:#F3EEFF;--cream:#FFFDF8;--warm:#F5EDE0;--dark:#2C2016;--br:#8B6F5E;--soft:#EAE0D5;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--cream);color:var(--dark);font-family:'Nunito',sans-serif;}
nav{position:fixed;top:0;width:100%;z-index:100;padding:13px 36px;display:flex;align-items:center;justify-content:space-between;background:rgba(255,253,248,.95);backdrop-filter:blur(14px);border-bottom:2px solid var(--soft);}
.logo{font-size:16px;font-weight:800;color:var(--dark);text-decoration:none;}.logo span{color:var(--o);}
.back{font-size:13px;color:var(--br);text-decoration:none;font-weight:700;padding:6px 14px;border:1.5px solid var(--soft);border-radius:10px;background:#fff;}
.wrap{max-width:720px;margin:0 auto;padding:82px 36px 80px;}
.card{background:#fff;border:2px solid #52B78844;border-radius:20px;padding:22px;margin-bottom:18px;box-shadow:0 2px 8px rgba(0,0,0,.05);}
.card-title{font-size:15px;font-weight:800;color:#52B788;margin-bottom:12px;display:flex;align-items:center;gap:6px;padding-bottom:10px;border-bottom:1.5px solid var(--soft);}
.done-btn{width:100%;padding:15px;border-radius:16px;color:#fff;border:none;font-family:'Nunito',sans-serif;font-size:15px;font-weight:700;cursor:pointer;margin-top:4px;background:#52B788;}
.done-msg{display:none;background:#E8F8EF;border:1.5px solid #52B78888;border-radius:14px;padding:14px;text-align:center;margin-top:10px;font-size:14px;font-weight:700;}
.done-msg.show{display:block;}
.nav-btns{display:flex;gap:10px;margin-top:14px;padding-top:14px;border-top:1.5px solid var(--soft);}
.nav-btn{flex:1;padding:11px;border-radius:12px;font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;cursor:pointer;text-align:center;text-decoration:none;}
.nav-btn.sec{border:1.5px solid var(--soft);background:#fff;color:var(--br);}
.nav-btn.pri{color:#fff;border:none;background:#52B788;}
@media(max-width:680px){.wrap{padding-left:20px;padding-right:20px;}}</style>
</head>
<body>
<script>MommyAuth.guard('G5');
MommyAuth.checkLock('G5-U6-S07');</script>
<nav><a href="../../../../index.html" class="logo">Mommy<span>Time</span></a>
<a href="jp-g5-u6-index.html" class="back">← Unit 6</a></nav>
<div class="wrap">
  <div style="display:inline-flex;align-items:center;gap:6px;background:#E8F8EF;color:#52B788;border:1.5px solid #52B78888;border-radius:20px;padding:6px 16px;font-size:13px;font-weight:700;margin-bottom:14px;">⭐ Step 7 / 10</div>
  <h1 style="font-size:24px;font-weight:800;margin-bottom:8px;">Tricky Words</h1>
  <p style="font-size:14px;color:var(--br);margin-bottom:22px;line-height:1.7;">Group 5 변형 모음 & 묵음 전체 복습!</p>

  <div style="background:linear-gradient(135deg,var(--yl),var(--ol));border:2px solid var(--y);border-radius:14px;padding:14px 16px;margin-bottom:18px;">
    <div style="font-size:13px;font-weight:800;color:#8B4A00;margin-bottom:6px;">⭐ Tricky Words란?</div>
    <div style="font-size:13px;color:#7a5a00;line-height:1.7;">파닉스 규칙을 따르지 않는 단어들이에요.<br>
    <strong>👁 Look → 🔊 Say → 🙈 Cover → ✍️ Write → ✅ Check!</strong></div>
  </div>
  <div style="display:flex;gap:8px;margin-bottom:18px;">
    <button id="tw7a" onclick="sTW7('l')" style="flex:1;padding:10px;border-radius:12px;border:2px solid #52B788;background:#52B788;color:#fff;font-family:Nunito,sans-serif;font-size:13px;font-weight:700;cursor:pointer;">👁 Look·Say·Cover·Write·Check</button>
    <button id="tw7b" onclick="sTW7('h')" style="flex:1;padding:10px;border-radius:12px;border:2px solid var(--soft);background:#fff;color:var(--br);font-family:Nunito,sans-serif;font-size:13px;font-weight:700;cursor:pointer;">🔍 문장 속 찾기</button>
  </div>
  <div id="mTWL"></div><div id="mTWH" style="display:none"></div>
  <button class="done-btn" onclick="markDone()">✅ Step 7 완료!</button>
  <div class="done-msg" id="doneMsg" style="color:#1a5c3a;">🎉 완료! 다음 스텝으로!</div>
  <div class="nav-btns">
    <a href="jp-g5-u6-step06.html" class="nav-btn sec">← 📚 Decodable Story</a>
    <a href="jp-g5-u6-step08.html" class="nav-btn pri">🎮 Games →</a>
  </div>
</div>
<script>
function markDone(){
  var done=new Set(JSON.parse(localStorage.getItem('jp_g5_u6_done')||'[]'));
  done.add(7);localStorage.setItem('jp_g5_u6_done',JSON.stringify([...done]));
  MommyAuth.logProgress('G5-U6-S07');
  document.getElementById('doneMsg').classList.add('show');
  document.querySelector('.done-btn').disabled=true;document.querySelector('.done-btn').style.opacity='.6';
}
var _d=new Set(JSON.parse(localStorage.getItem('jp_g5_u6_done')||'[]'));
if(_d.has(7)){document.getElementById('doneMsg').classList.add('show');document.querySelector('.done-btn').disabled=true;document.querySelector('.done-btn').style.opacity='.6';}

var TW7=[{word:"once",ko:"한번",sentence:"I went there once.",exp:"o+nce — 원스!"},{word:"friend",ko:"친구",sentence:"My friend can write.",exp:"fr+iend — 프렌드!"},{word:"know",ko:"know",sentence:"The know is here.",exp:"know — 외워요!"},{word:"special",ko:"특별한",sentence:"The station is special.",exp:"spe+cial — 스페셜!"},{word:"large",ko:"큰",sentence:"The giant is large.",exp:"l+arge — 라지!"}];
function bLSCWC(){var c=document.getElementById('mTWL');c.innerHTML='';TW7.forEach(function(tw,i){var card=document.createElement('div');card.style.cssText='background:#fff;border:2px solid #52B78844;border-radius:16px;padding:18px;margin-bottom:12px;box-shadow:0 2px 6px rgba(0,0,0,.05);';card.innerHTML=`<div style="display:flex;align-items:center;gap:12px;margin-bottom:10px;"><div id="twd-`+i+'" style="font-size:40px;font-weight:800;color:#52B788;transition:opacity .3s;">'+tw.word+'</div><div><div style="font-size:14px;font-weight:700;color:var(--br)">'+tw.ko+'</div><div style="font-size:12px;color:#1a5c3a;font-weight:600;margin-top:2px">'+tw.exp+'</div></div></div><div style="background:var(--warm);border-radius:10px;padding:10px 12px;margin-bottom:12px;font-size:14px;font-weight:700;line-height:1.6;">'+tw.sentence+'</div><div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;"><button onclick="twL('+i+')" style="padding:9px 14px;border-radius:10px;background:var(--bl);color:var(--b);border:none;font-family:Nunito,sans-serif;font-size:13px;font-weight:700;cursor:pointer;">👁 Look (보기)</button><button onclick="twS(tw.word)" style="padding:9px 14px;border-radius:10px;background:var(--gl);color:var(--g);border:none;font-family:Nunito,sans-serif;font-size:13px;font-weight:700;cursor:pointer;">🔊 Say (소리내기)</button><button onclick="twC('+i+')" style="padding:9px 14px;border-radius:10px;background:var(--yl);color:#8B6F00;border:none;font-family:Nunito,sans-serif;font-size:13px;font-weight:700;cursor:pointer;">🙈 Cover (가리기)</button><input id="twi-'+i+'" placeholder="써봐요..." autocomplete="off" spellcheck="false" style="border:2px solid #52B788;border-radius:10px;padding:8px 12px;font-family:Nunito,sans-serif;font-size:16px;font-weight:700;width:120px;outline:none;"><button onclick="twCk('+i+','+tw.word+')" style="padding:9px 14px;border-radius:10px;background:#52B788;color:#fff;border:none;font-family:Nunito,sans-serif;font-size:13px;font-weight:700;cursor:pointer;">✅ Check</button></div><div id="twr-'+i+'" style="font-size:13px;font-weight:700;margin-top:6px;min-height:18px;"></div>';c.appendChild(card);});}
function twL(i){document.getElementById('twd-'+i).style.opacity='1';}
function twS(w){window.speechSynthesis.cancel();var u=new SpeechSynthesisUtterance(w);u.lang='en-GB';u.rate=0.8;var vs=window.speechSynthesis.getVoices();var v=vs.find(function(v){return v.lang==='en-GB';})||vs.find(function(v){return v.lang.startsWith('en');})||null;if(v)u.voice=v;window.speechSynthesis.speak(u);}
function twC(i){document.getElementById('twd-'+i).style.opacity='0';document.getElementById('twi-'+i).focus();}
function twCk(i,word){var inp=document.getElementById('twi-'+i);var res=document.getElementById('twr-'+i);if(inp.value.trim().toLowerCase()===word.toLowerCase()){res.textContent='🎉 완벽해요!';res.style.color='#52B788';}else{res.textContent='🤔 다시! 정답: '+word;res.style.color='#E24B4A';}document.getElementById('twd-'+i).style.opacity='1';inp.value='';}
function sTW7(m){document.getElementById('tw7a').style.background=m==='l'?'#52B788':'#fff';document.getElementById('tw7a').style.color=m==='l'?'#fff':'var(--br)';document.getElementById('tw7b').style.background=m==='h'?'#52B788':'#fff';document.getElementById('tw7b').style.color=m==='h'?'#fff':'var(--br)';document.getElementById('mTWL').style.display=m==='l'?'block':'none';document.getElementById('mTWH').style.display=m==='h'?'block':'none';if(m==='h')bHunt7();}
function bHunt7(){var c=document.getElementById('mTWH');c.innerHTML='';TW7.forEach(function(tw){var card=document.createElement('div');card.style.cssText='background:#fff;border:2px solid #52B78844;border-radius:14px;padding:14px;margin-bottom:10px;';card.innerHTML=`<div style="font-size:12px;color:var(--br);margin-bottom:8px;font-weight:600">찾을 단어: <strong style="color:#52B788">`+tw.word+'</strong></div>';var sd=document.createElement('div');sd.style.cssText='font-size:17px;font-weight:700;line-height:2.2;';tw.sentence.split(' ').forEach(function(w){var clean=w.replace(/[.,'!?]/g,'');var span=document.createElement('span');span.style.cssText='cursor:pointer;padding:1px 4px;border-radius:4px;transition:all .2s;';span.textContent=w;if(clean.toLowerCase()===tw.word.toLowerCase()){span.style.borderBottom='2px dashed #52B78888';span.onclick=function(){if(!span.dataset.f){span.dataset.f='1';span.style.background='#52B788';span.style.color='#fff';span.style.borderBottom='none';}};}else{span.onclick=function(){span.style.background='#FCEBEB';setTimeout(function(){span.style.background='';},350);};}sd.appendChild(span);sd.appendChild(document.createTextNode(' '));});card.appendChild(sd);c.appendChild(card);});}
bLSCWC();window.speechSynthesis.onvoiceschanged=function(){window.speechSynthesis.getVoices();};
</script>
<script>// ══════════════════════════════════════════
//  Unit LNB (Left Navigation Bar)
//  모든 Step 파일에서 공통으로 사용
// ══════════════════════════════════════════

const LNB_STEPS = [
  { num:1,  icon:'🔊', title:'Sound Intro',       short:'소리 만나기' },
  { num:2,  icon:'✍️', title:'Letter Formation',  short:'글자 쓰기' },
  { num:3,  icon:'👂', title:'Sound Discrimination', short:'소리 구별' },
  { num:4,  icon:'📖', title:'Word Cards',         short:'단어 카드' },
  { num:5,  icon:'🔤', title:'Blending',           short:'소리 합치기' },
  { num:6,  icon:'📚', title:'Decodable Story',    short:'스토리 읽기' },
  { num:7,  icon:'⭐', title:'Tricky Words',       short:'트리키 워드' },
  { num:8,  icon:'🎮', title:'Games',              short:'게임' },
  { num:9,  icon:'💬', title:'Talk Together',      short:'함께 대화' },
  { num:10, icon:'📔', title:'My Journal',         short:'나의 저널' },
];

const DONE_KEY = 'jp_g5_u6_done';

function getLNBDone() {
  return new Set(JSON.parse(localStorage.getItem(DONE_KEY) || '[]'));
}

// 현재 step 번호 파악
function getCurrentStep() {
  const path = window.location.pathname;
  const match = path.match(/step-(\d+)\.html/);
  return match ? parseInt(match[1]) : 0;
}

// LNB CSS 주입
function injectLNBStyle() {
  const style = document.createElement('style');
  style.textContent = `
    /* ── LNB 레이아웃 ── */
    body { overflow-x: hidden; }

    /* 기존 nav 조정 */
    nav { left: 0; z-index: 200; }

    /* LNB 사이드바 */
    #unitLNB {
      position: fixed;
      top: 56px; /* nav 높이 */
      left: 0;
      width: 220px;
      height: calc(100vh - 56px);
      background: #FEFCFF;
      border-right: 2px solid #52B78866;
      overflow-y: auto;
      z-index: 150;
      padding: 16px 0 32px;
      transition: transform .3s ease;
    }

    /* LNB 헤더 */
    .lnb-header {
      padding: 0 16px 12px;
      border-bottom: 1px solid var(--soft);
      margin-bottom: 8px;
    }
    .lnb-unit-label {
      font-size: 10px; font-weight: 700; color: var(--br);
      text-transform: uppercase; letter-spacing: .08em; margin-bottom: 4px;
    }
    .lnb-unit-title {
      font-size: 16px; font-weight: 800; color: #1a5c3a;
    }
    .lnb-progress {
      margin-top: 8px;
    }
    .lnb-prog-track {
      background: #E0D0FF; border-radius: 6px; height: 6px; overflow: hidden;
    }
    .lnb-prog-fill {
      height: 100%; background: #1a5c3a; border-radius: 6px; transition: width .4s;
    }
    .lnb-prog-txt {
      font-size: 10px; color: var(--br); font-weight: 700; margin-top: 3px;
    }

    /* LNB 아이템 */
    .lnb-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 16px; cursor: pointer;
      text-decoration: none; color: var(--dark);
      border-left: 3px solid transparent;
      transition: all .15s;
      font-size: 13px; font-weight: 600;
      position: relative;
    }
    .lnb-item:hover {
      background: #E8F8EFdd; border-left-color: #52B78888;
    }
    .lnb-item.active {
      background: #E8F8EF;
      border-left-color: #1a5c3a;
      color: #1a5c3a;
      font-weight: 800;
    }
    .lnb-item.done {
      color: var(--g);
    }
    .lnb-item.done .lnb-check {
      display: flex;
    }
    .lnb-num {
      width: 26px; height: 26px; border-radius: 8px;
      background: #E8F8EF; color: #1a5c3a;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 800; flex-shrink: 0;
      transition: all .15s;
    }
    .lnb-item.active .lnb-num {
      background: #1a5c3a; color: #fff;
    }
    .lnb-item.done .lnb-num {
      background: #2D9E68; color: #fff;
    }
    .lnb-icon { font-size: 14px; flex-shrink: 0; }
    .lnb-text { flex: 1; }
    .lnb-title { display: block; font-size: 12px; font-weight: 700; line-height: 1.2; }
    .lnb-short { display: block; font-size: 10px; opacity: .65; margin-top: 1px; }
    .lnb-check {
      display: none; width: 18px; height: 18px; border-radius: 50%;
      background: var(--g); color: #fff;
      align-items: center; justify-content: center; font-size: 10px; flex-shrink: 0;
    }

    /* 콘텐츠 영역 밀기 */
    #lnbContentShift {
      margin-left: 220px;
      transition: margin-left .3s;
    }

    /* 모바일 토글 버튼 */
    #lnbToggle {
      display: none;
      position: fixed;
      bottom: 20px; right: 20px;
      width: 52px; height: 52px;
      border-radius: 50%;
      background: var(--p); color: #fff;
      border: none; font-size: 20px;
      cursor: pointer; z-index: 300;
      box-shadow: 0 4px 16px rgba(155,114,207,.4);
    }

    /* 모바일 오버레이 */
    #lnbOverlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,.3);
      z-index: 140;
    }
    #lnbOverlay.show { display: block; }

    /* 모바일 */
    @media (max-width: 768px) {
      #unitLNB {
        transform: translateX(-100%);
        top: 0; height: 100vh;
        padding-top: 72px;
        box-shadow: 4px 0 24px rgba(0,0,0,.12);
      }
      #unitLNB.open { transform: translateX(0); }
      #lnbContentShift { margin-left: 0 !important; }
      #lnbToggle { display: flex; align-items: center; justify-content: center; }
    }
  `;
  document.head.appendChild(style);
}

// LNB HTML 생성
function buildLNB() {
  const currentStep = getCurrentStep();
  const done = getLNBDone();

  // LNB 사이드바
  const lnb = document.createElement('div');
  lnb.id = 'unitLNB';

  // 헤더
  const pct = Math.round(done.size / LNB_STEPS.length * 100);
  lnb.innerHTML = `
    <div class="lnb-header">
      <div class="lnb-unit-label">Group 5 · Unit 6</div>
      <div class="lnb-unit-title">Review — Group 5</div>
      <div class="lnb-progress">
        <div class="lnb-prog-track">
          <div class="lnb-prog-fill" style="width:${pct}%"></div>
        </div>
        <div class="lnb-prog-txt">${done.size} / ${LNB_STEPS.length} 완료</div>
      </div>
    </div>`;

  // Step 목록
  LNB_STEPS.forEach(s => {
    const isDone = done.has(s.num);
    const isActive = s.num === currentStep;
    const a = document.createElement('a');
    a.href = `step-${String(s.num).padStart(2,'0')}.html`;
    a.className = 'lnb-item' + (isActive ? ' active' : '') + (isDone ? ' done' : '');
    a.innerHTML = `
      <div class="lnb-num">${isDone ? '✓' : s.num}</div>
      <span class="lnb-icon">${s.icon}</span>
      <span class="lnb-text">
        <span class="lnb-title">${s.title}</span>
        <span class="lnb-short">${s.short}</span>
      </span>
      <div class="lnb-check">✓</div>`;
    lnb.appendChild(a);
  });

  document.body.appendChild(lnb);

  // 오버레이 (모바일)
  const overlay = document.createElement('div');
  overlay.id = 'lnbOverlay';
  overlay.onclick = closeLNB;
  document.body.appendChild(overlay);

  // 토글 버튼 (모바일)
  const toggle = document.createElement('button');
  toggle.id = 'lnbToggle';
  toggle.innerHTML = '☰';
  toggle.onclick = toggleLNB;
  document.body.appendChild(toggle);
}

// 기존 콘텐츠에 margin-left 적용
function shiftContent() {
  // nav는 이미 fixed라 영향 없음
  // wrap 또는 body의 직접 자식 div들에 margin 적용
  const wrap = document.querySelector('.wrap') || document.querySelector('main');
  if (wrap) {
    wrap.id = wrap.id || 'lnbContentShift';
    wrap.style.marginLeft = '220px';
    wrap.style.transition = 'margin-left .3s';
  }

  // 모바일에서는 margin 제거
  function applyMobile() {
    if (window.innerWidth <= 768) {
      if (wrap) wrap.style.marginLeft = '0';
    } else {
      if (wrap) wrap.style.marginLeft = '220px';
    }
  }
  applyMobile();
  window.addEventListener('resize', applyMobile);
}

function toggleLNB() {
  const lnb = document.getElementById('unitLNB');
  const overlay = document.getElementById('lnbOverlay');
  const toggle = document.getElementById('lnbToggle');
  const isOpen = lnb.classList.contains('open');
  lnb.classList.toggle('open', !isOpen);
  overlay.classList.toggle('show', !isOpen);
  toggle.innerHTML = isOpen ? '☰' : '✕';
}

function closeLNB() {
  document.getElementById('unitLNB')?.classList.remove('open');
  document.getElementById('lnbOverlay')?.classList.remove('show');
  document.getElementById('lnbToggle').innerHTML = '☰';
}

// 초기화
function initLNB() {
  injectLNBStyle();
  buildLNB();
  shiftContent();
}

// DOM 준비 후 실행
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', initLNB);
} else {
  initLNB();
}
</script>
</body></html>
