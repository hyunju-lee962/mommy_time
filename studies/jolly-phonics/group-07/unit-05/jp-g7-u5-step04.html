*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--cream);color:var(--dark);font-family:'Nunito',sans-serif;}
nav{position:fixed;top:0;width:100%;z-index:100;padding:13px 36px;display:flex;align-items:center;justify-content:space-between;background:rgba(255,253,248,.95);backdrop-filter:blur(14px);border-bottom:2px solid var(--soft);}

    <button id="tab4M" onclick="sMode4('m',this)" style="flex:1;padding:10px;border-radius:12px;border:2px solid var(--soft);background:#fff;color:var(--br);font-family:Nunito,sans-serif;font-size:13px;font-weight:700;cursor:pointer;">🎯 Match</button>

<script>
function markDone(){
  var done=new Set(JSON.parse(localStorage.getItem('jp_g7_u5_done')||'[]'));
  done.add(4);localStorage.setItem('jp_g7_u5_done',JSON.stringify([...done]));
  MommyAuth.logProgress('G7-U5-S04');
  document.getElementById('doneMsg').classList.add('show');
  document.querySelector('.done-btn').disabled=true;document.querySelector('.done-btn').style.opacity='.6';
}
var _d=new Set(JSON.parse(localStorage.getItem('jp_g7_u5_done')||'[]'));
if(_d.has(4)){document.getElementById('doneMsg').classList.add('show');document.querySelector('.done-btn').disabled=true;document.querySelector('.done-btn').style.opacity='.6';}

var W4=[{word:"context",emoji:"📝",phonics:"c-o-n-t-e-x-t"},{word:"prefix",emoji:"📝",phonics:"p-r-e-f-i-x"},{word:"suffix",emoji:"📝",phonics:"s-u-f-f-i-x"},{word:"syllable",emoji:"📝",phonics:"s-y-l-l-a-b-l-e"},{word:"vowel",emoji:"📝",phonics:"v-o-w-e-l"},{word:"consonant",emoji:"📝",phonics:"c-o-n-s-o-n-a-n-t"},{word:"blend",emoji:"📝",phonics:"b-l-e-n-d"},{word:"digraph",emoji:"📝",phonics:"d-i-g-r-a-p-h"},{word:"phoneme",emoji:"📝",phonics:"p-h-o-n-e-m-e"},{word:"morpheme",emoji:"📝",phonics:"m-o-r-p-h-e-m-e"}];
function spk4(t){window.speechSynthesis.cancel();var u=new SpeechSynthesisUtterance(t);u.lang='en-GB';u.rate=0.8;var vs=window.speechSynthesis.getVoices();var v=vs.find(function(v){return v.lang==='en-GB';})||vs.find(function(v){return v.lang.startsWith('en');})||null;if(v)u.voice=v;window.speechSynthesis.speak(u);}
function bStudy4(){var g=document.getElementById('mS4');g.innerHTML='<div style="display:grid;grid-template-columns:repeat(2,1fr);gap:12px;">'+W4.map(function(w,i){return '<div style="background:#fff;border:2px solid #E8737A44;border-radius:14px;padding:14px;text-align:center;box-shadow:0 2px 6px rgba(0,0,0,.05);"><div style="font-size:38px;margin-bottom:6px">'+w.emoji+'</div><div style="font-size:19px;font-weight:800;margin-bottom:3px">'+w.word+'</div><div style="font-size:11px;color:#E8737A;font-weight:700;background:#FFF0F0;padding:2px 8px;border-radius:6px;display:inline-block;margin-bottom:6px">('+w.phonics+')</div><br><button onclick="spk4('+w.word+')" style="background:#E8737A;color:#fff;border:none;border-radius:8px;padding:5px 14px;font-family:Nunito,sans-serif;font-size:12px;font-weight:700;cursor:pointer;">🔊 듣기</button></div>';}).join('')+'</div>';}
var fI=0;
function bFlash4(){fI=0;sFlash4();}
function sFlash4(){var w=W4[fI];document.getElementById('mF4').innerHTML='<div style="background:#fff;border:2px solid #E8737A44;border-radius:18px;padding:30px;text-align:center;min-height:190px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 4px 12px rgba(0,0,0,.08);" onclick="flipF4()"><div style="font-size:60px;margin-bottom:10px">'+w.emoji+'</div><div id="fw4v" style="display:none;font-size:32px;font-weight:800;margin-bottom:4px">'+w.word+'</div><div id="fp4v" style="display:none;font-size:12px;color:var(--br)">('+w.phonics+')</div><div id="fh4v" style="font-size:13px;color:var(--br)">탭해서 단어 확인!</div></div><div style="display:flex;gap:10px;margin-top:12px;justify-content:center;"><button onclick="pF4()" style="padding:9px 20px;border-radius:10px;background:var(--warm);color:var(--br);border:none;font-family:Nunito,sans-serif;font-size:13px;font-weight:700;cursor:pointer;">← 이전</button><span style="align-self:center;font-size:13px;font-weight:700;color:var(--br)">'+(fI+1)+' / '+W4.length+'</span><button onclick="nF4()" style="padding:9px 20px;border-radius:10px;background:#E8737A;color:#fff;border:none;font-family:Nunito,sans-serif;font-size:13px;font-weight:700;cursor:pointer;">다음 →</button></div>';spk4(w.word);}
function flipF4(){document.getElementById('fw4v').style.display='block';document.getElementById('fp4v').style.display='block';document.getElementById('fh4v').style.display='none';}
function nF4(){fI=(fI+1)%W4.length;sFlash4();}
function pF4(){fI=(fI-1+W4.length)%W4.length;sFlash4();}
var mW=W4.slice(0,6),mS=null,mD=0;
function bMatch4(){mS=null;mD=0;var g=document.getElementById('mM4');g.innerHTML='<div style="font-size:13px;font-weight:700;color:#E8737A;margin-bottom:10px;text-align:center" id="ms4v">단어와 그림을 연결해요!</div><div style="display:grid;grid-template-columns:1fr 40px 1fr;gap:0;align-items:start;"><div><div style="font-size:11px;font-weight:700;color:var(--br);text-align:center;margin-bottom:8px;text-transform:uppercase">단어</div><div id="mw4v"></div></div><div><svg id="msv4" style="position:relative;width:40px;overflow:visible;" height="320"></svg></div><div><div style="font-size:11px;font-weight:700;color:var(--br);text-align:center;margin-bottom:8px;text-transform:uppercase">그림</div><div id="mm4v"></div></div></div><button onclick="bMatch4()" style="display:block;margin:10px auto 0;padding:7px 18px;border-radius:10px;background:var(--warm);color:var(--br);border:none;font-family:Nunito,sans-serif;font-size:12px;font-weight:700;cursor:pointer;">🔄 다시</button>';var sh=[...mW].sort(function(){return Math.random()-.5;});var wc=document.getElementById('mw4v'),mc=document.getElementById('mm4v');mW.forEach(function(w,i){var d=document.createElement('div');d.style.cssText='padding:11px;border-radius:12px;border:2.5px solid #E8737A44;background:#fff;text-align:center;cursor:pointer;font-size:15px;font-weight:700;margin-bottom:10px;transition:all .2s;';d.dataset.id=String(i);d.dataset.side='left';d.textContent=w.word;d.onclick=function(){mCk(d);};wc.appendChild(d);});sh.forEach(function(w){var i=mW.indexOf(w);var d=document.createElement('div');d.style.cssText='padding:11px;border-radius:12px;border:2.5px solid #E8737A44;background:#fff;text-align:center;cursor:pointer;font-size:22px;margin-bottom:10px;transition:all .2s;';d.dataset.id=String(i);d.dataset.side='right';d.textContent=w.emoji;d.onclick=function(){mCk(d);};mc.appendChild(d);});}
function gCtr(el){var wr=document.getElementById('mM4').getBoundingClientRect();var er=el.getBoundingClientRect();return{x:el.dataset.side==='left'?38:2,y:(er.top-wr.top)+er.height/2};}
function drL(a,b,col){var svg=document.getElementById('msv4');var p1=gCtr(a),p2=gCtr(b);var l=document.createElementNS('http://www.w3.org/2000/svg','line');l.setAttribute('x1',p1.x);l.setAttribute('y1',p1.y);l.setAttribute('x2',p2.x);l.setAttribute('y2',p2.y);l.setAttribute('stroke',col);l.setAttribute('stroke-width','3');l.setAttribute('stroke-linecap','round');svg.appendChild(l);return l;}
function mCk(el){if(el.style.background.includes('E8F8'))return;if(mS){if(mS===el){mS.style.background='#fff';mS=null;return;}if(mS.dataset.side===el.dataset.side){mS.style.background='#fff';mS=el;el.style.background='#FFF0F0';return;}if(mS.dataset.id===el.dataset.id){[mS,el].forEach(function(e){e.style.background='var(--gl)';e.style.borderColor='var(--g)';e.style.pointerEvents='none';});drL(mS,el,'#E8737A');mD++;document.getElementById('ms4v').textContent=mD===mW.length?'🎉 모두 연결!':mD+' / '+mW.length+' 연결됨!';mS=null;}else{mS.style.background='#fff';el.style.background='#FCEBEB';el.style.borderColor='#E24B4A';var l=drL(mS,el,'#E24B4A');setTimeout(function(){el.style.background='#fff';el.style.borderColor='#E8737A44';l.remove();},600);mS=null;}}else{mS=el;el.style.background='#FFF0F0';}}
function sMode4(m,btn){['S','F','M'].forEach(function(n){var tb=document.getElementById('tab4'+n);tb.style.background=n.toLowerCase()===m?'#E8737A':'#fff';tb.style.color=n.toLowerCase()===m?'#fff':'var(--br)';tb.style.borderColor=n.toLowerCase()===m?'#E8737A':'var(--soft)';document.getElementById('m'+n+'4').style.display=n.toLowerCase()===m?'block':'none';});if(m==='f')bFlash4();if(m==='m')bMatch4();}
bStudy4();window.speechSynthesis.onvoiceschanged=function(){window.speechSynthesis.getVoices();};
</script>
<script>// ══════════════════════════════════════════
//  Unit LNB (Left Navigation Bar)
//  모든 Step 파일에서 공통으로 사용
// ══════════════════════════════════════════

const LNB_STEPS = [
  { num:1,  icon:'🔊', title:'Sound Intro',       short:'소리 만나기' },
  { num:2,  icon:'✍️', title:'Letter Formation',  short:'글자 쓰기' },
  { num:3,  icon:'👂', title:'Sound Discrimination', short:'소리 구별' },
  { num:4,  icon:'📖', title:'Word Cards',         short:'단어 카드' },
  { num:5,  icon:'🔤', title:'Blending',           short:'소리 합치기' },
  { num:6,  icon:'📚', title:'Decodable Story',    short:'스토리 읽기' },
  { num:7,  icon:'⭐', title:'Tricky Words',       short:'트리키 워드' },
  { num:8,  icon:'🎮', title:'Games',              short:'게임' },
  { num:9,  icon:'💬', title:'Talk Together',      short:'함께 대화' },
  { num:10, icon:'📔', title:'My Journal',         short:'나의 저널' },
];

const DONE_KEY = 'jp_g7_u5_done';

function getLNBDone() {
  return new Set(JSON.parse(localStorage.getItem(DONE_KEY) || '[]'));
}

// 현재 step 번호 파악
function getCurrentStep() {
  const path = window.location.pathname;
  const match = path.match(/step-(\d+)\.html/);
  return match ? parseInt(match[1]) : 0;
}

// LNB CSS 주입
function injectLNBStyle() {
  const style = document.createElement('style');
  style.textContent = `
    /* ── LNB 레이아웃 ── */
    body { overflow-x: hidden; }

    /* 기존 nav 조정 */
    nav { left: 0; z-index: 200; }

    /* LNB 사이드바 */
    #unitLNB {
      position: fixed;
      top: 56px; /* nav 높이 */
      left: 0;
      width: 220px;
      height: calc(100vh - 56px);
      background: #FEFCFF;
      border-right: 2px solid #E8737A66;
      overflow-y: auto;
      z-index: 150;
      padding: 16px 0 32px;
      transition: transform .3s ease;
    }

    /* LNB 헤더 */
    .lnb-header {
      padding: 0 16px 12px;
      border-bottom: 1px solid var(--soft);
      margin-bottom: 8px;
    }
    .lnb-unit-label {
      font-size: 10px; font-weight: 700; color: var(--br);
      text-transform: uppercase; letter-spacing: .08em; margin-bottom: 4px;
    }
    .lnb-unit-title {
      font-size: 16px; font-weight: 800; color: #9B2028;
    }
    .lnb-progress {
      margin-top: 8px;
    }
    .lnb-prog-track {
      background: #E0D0FF; border-radius: 6px; height: 6px; overflow: hidden;
    }
    .lnb-prog-fill {
      height: 100%; background: #9B2028; border-radius: 6px; transition: width .4s;
    }
    .lnb-prog-txt {
      font-size: 10px; color: var(--br); font-weight: 700; margin-top: 3px;
    }

    /* LNB 아이템 */
    .lnb-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 16px; cursor: pointer;
      text-decoration: none; color: var(--dark);
      border-left: 3px solid transparent;
      transition: all .15s;
      font-size: 13px; font-weight: 600;
      position: relative;
    }
    .lnb-item:hover {
      background: #FFF0F0dd; border-left-color: #E8737A88;
    }
    .lnb-item.active {
      background: #FFF0F0;
      border-left-color: #9B2028;
      color: #9B2028;
      font-weight: 800;
    }
    .lnb-item.done {
      color: var(--g);
    }
    .lnb-item.done .lnb-check {
      display: flex;
    }
    .lnb-num {
      width: 26px; height: 26px; border-radius: 8px;
      background: #FFF0F0; color: #9B2028;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 800; flex-shrink: 0;
      transition: all .15s;
    }
    .lnb-item.active .lnb-num {
      background: #9B2028; color: #fff;
    }
    .lnb-item.done .lnb-num {
      background: #2D9E68; color: #fff;
    }
    .lnb-icon { font-size: 14px; flex-shrink: 0; }
    .lnb-text { flex: 1; }
    .lnb-title { display: block; font-size: 12px; font-weight: 700; line-height: 1.2; }
    .lnb-short { display: block; font-size: 10px; opacity: .65; margin-top: 1px; }
    .lnb-check {
      display: none; width: 18px; height: 18px; border-radius: 50%;
      background: var(--g); color: #fff;
      align-items: center; justify-content: center; font-size: 10px; flex-shrink: 0;
    }

    /* 콘텐츠 영역 밀기 */
    #lnbContentShift {
      margin-left: 220px;
      transition: margin-left .3s;
    }

    /* 모바일 토글 버튼 */
    #lnbToggle {
      display: none;
      position: fixed;
      bottom: 20px; right: 20px;
      width: 52px; height: 52px;
      border-radius: 50%;
      background: var(--p); color: #fff;
      border: none; font-size: 20px;
      cursor: pointer; z-index: 300;
      box-shadow: 0 4px 16px rgba(155,114,207,.4);
    }

    /* 모바일 오버레이 */
    #lnbOverlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,.3);
      z-index: 140;
    }
    #lnbOverlay.show { display: block; }

    /* 모바일 */
    @media (max-width: 768px) {
      #unitLNB {
        transform: translateX(-100%);
        top: 0; height: 100vh;
        padding-top: 72px;
        box-shadow: 4px 0 24px rgba(0,0,0,.12);
      }
      #unitLNB.open { transform: translateX(0); }
      #lnbContentShift { margin-left: 0 !important; }
      #lnbToggle { display: flex; align-items: center; justify-content: center; }
    }
  `;
  document.head.appendChild(style);
}

// LNB HTML 생성
function buildLNB() {
  const currentStep = getCurrentStep();
  const done = getLNBDone();

  // LNB 사이드바
  const lnb = document.createElement('div');
  lnb.id = 'unitLNB';

  // 헤더
  const pct = Math.round(done.size / LNB_STEPS.length * 100);
  lnb.innerHTML = `
    <div class="lnb-header">
      <div class="lnb-unit-label">Group 7 · Unit 5</div>
      <div class="lnb-unit-title">Reading Strategies</div>
      <div class="lnb-progress">
        <div class="lnb-prog-track">
          <div class="lnb-prog-fill" style="width:${pct}%"></div>
        </div>
        <div class="lnb-prog-txt">${done.size} / ${LNB_STEPS.length} 완료</div>
      </div>
    </div>`;

  // Step 목록
  LNB_STEPS.forEach(s => {
    const isDone = done.has(s.num);
    const isActive = s.num === currentStep;
    const a = document.createElement('a');
    a.href = `step-${String(s.num).padStart(2,'0')}.html`;
    a.className = 'lnb-item' + (isActive ? ' active' : '') + (isDone ? ' done' : '');
    a.innerHTML = `
      <div class="lnb-num">${isDone ? '✓' : s.num}</div>
      <span class="lnb-icon">${s.icon}</span>
      <span class="lnb-text">
        <span class="lnb-title">${s.title}</span>
        <span class="lnb-short">${s.short}</span>
      </span>
      <div class="lnb-check">✓</div>`;
    lnb.appendChild(a);
  });

  document.body.appendChild(lnb);

  // 오버레이 (모바일)
  const overlay = document.createElement('div');
  overlay.id = 'lnbOverlay';
  overlay.onclick = closeLNB;
  document.body.appendChild(overlay);

  // 토글 버튼 (모바일)
  const toggle = document.createElement('button');
  toggle.id = 'lnbToggle';
  toggle.innerHTML = '☰';
  toggle.onclick = toggleLNB;
  document.body.appendChild(toggle);
}

// 기존 콘텐츠에 margin-left 적용
function shiftContent() {
  // nav는 이미 fixed라 영향 없음
  // wrap 또는 body의 직접 자식 div들에 margin 적용
  const wrap = document.querySelector('.wrap') || document.querySelector('main');
  if (wrap) {
    wrap.id = wrap.id || 'lnbContentShift';
    wrap.style.marginLeft = '220px';
    wrap.style.transition = 'margin-left .3s';
  }

  // 모바일에서는 margin 제거
  function applyMobile() {
    if (window.innerWidth <= 768) {
      if (wrap) wrap.style.marginLeft = '0';
    } else {
      if (wrap) wrap.style.marginLeft = '220px';
    }
  }
  applyMobile();
  window.addEventListener('resize', applyMobile);
}

function toggleLNB() {
  const lnb = document.getElementById('unitLNB');
  const overlay = document.getElementById('lnbOverlay');
  const toggle = document.getElementById('lnbToggle');
  const isOpen = lnb.classList.contains('open');
  lnb.classList.toggle('open', !isOpen);
  overlay.classList.toggle('show', !isOpen);
  toggle.innerHTML = isOpen ? '☰' : '✕';
}

function closeLNB() {
  document.getElementById('unitLNB')?.classList.remove('open');
  document.getElementById('lnbOverlay')?.classList.remove('show');
  document.getElementById('lnbToggle').innerHTML = '☰';
}

// 초기화
function initLNB() {
  injectLNBStyle();
  buildLNB();
  shiftContent();
}

// DOM 준비 후 실행
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', initLNB);
} else {
  initLNB();
}
</script>
</body></html>
