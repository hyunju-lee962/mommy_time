<!DOCTYPE html>
<html lang="en">
<head>
<script src="../../../../assets/js/auth.js"></script>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Step 6: 📚 Decodable Story — r, m, d | Mommy Time</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--g:#52B788;--gl:#E8F8EF;--y:#F9C74F;--yl:#FFFBEC;--o:#F4845F;--ol:#FFF0EB;--b:#5BA4CF;--bl:#EBF4FF;--p:#9B72CF;--pl:#F3EEFF;--cream:#FFFDF8;--warm:#F5EDE0;--dark:#2C2016;--br:#8B6F5E;--soft:#EAE0D5;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--cream);color:var(--dark);font-family:'Nunito',sans-serif;}
nav{position:fixed;top:0;width:100%;z-index:100;padding:13px 36px;display:flex;align-items:center;justify-content:space-between;background:rgba(255,253,248,.95);backdrop-filter:blur(14px);border-bottom:2px solid var(--soft);}
.logo{font-size:16px;font-weight:800;color:var(--dark);text-decoration:none;}.logo span{color:var(--o);}
.back{font-size:13px;color:var(--br);text-decoration:none;font-weight:700;padding:6px 14px;border:1.5px solid var(--soft);border-radius:10px;background:#fff;}
.wrap{max-width:720px;margin:0 auto;padding:82px 36px 80px;}
.card{background:#fff;border:2px solid #E0D8F0;border-radius:20px;padding:22px;margin-bottom:18px;box-shadow:0 2px 8px rgba(0,0,0,.05);}
.card-title{font-size:15px;font-weight:800;margin-bottom:12px;display:flex;align-items:center;gap:6px;padding-bottom:10px;border-bottom:1.5px solid var(--soft);}
.done-btn{width:100%;padding:15px;border-radius:16px;color:#fff;border:none;font-family:'Nunito',sans-serif;font-size:15px;font-weight:700;cursor:pointer;margin-top:4px;transition:all .2s;}
.done-msg{display:none;border-radius:14px;padding:14px;text-align:center;margin-top:10px;font-size:14px;font-weight:700;}
.done-msg.show{display:block;}
.nav-btns{display:flex;gap:10px;margin-top:14px;padding-top:14px;border-top:1.5px solid var(--soft);}
.nav-btn{flex:1;padding:11px;border-radius:12px;font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;cursor:pointer;text-align:center;text-decoration:none;}
.nav-btn.sec{border:1.5px solid var(--soft);background:#fff;color:var(--br);}
.nav-btn.pri{color:#fff;border:none;}
@media(max-width:680px){.wrap{padding-left:20px;padding-right:20px;}}
</style>
</head>
<body>
<script>MommyAuth.guard('G1');
MommyAuth.checkLock('G1-U4-S06');</script>
<nav><a href="../../../../index.html" class="logo">Mommy<span>Time</span></a>
<a href="jp-g1-u4-index.html" class="back">← Unit 4</a></nav>
<div class="wrap">
  <div style="display:inline-flex;align-items:center;gap:6px;background:#EBF4FF;color:#5BA4CF;border:1.5px solid #5BA4CF88;border-radius:20px;padding:6px 16px;font-size:13px;font-weight:700;margin-bottom:14px;">6 Step 6 / 10</div>
  <h1 style="font-size:24px;font-weight:800;margin-bottom:8px;">📚 Decodable Story</h1>
  <p style="font-size:14px;color:var(--br);margin-bottom:24px;line-height:1.7;">r·m·d 세 소리와 함께 더 많은 단어를!</p>

  <div style="background:linear-gradient(135deg,#5BA4CF,#1a4a7a);border-radius:14px;padding:14px 18px;margin-bottom:18px;color:#fff;">
    <div style="font-size:11px;font-weight:700;opacity:.8;text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px;">🎯 미션</div>
    <div style="font-size:13px;font-weight:700;line-height:1.6;">이야기에서 <strong>r · m · d</strong> 소리가 있는 단어를 모두 찾아요!</div>
  </div>

  <div style="display:flex;align-items:center;justify-content:space-between;background:#fff;border:2px solid #5BA4CF44;border-radius:12px;padding:10px 16px;margin-bottom:16px;">
    <span style="font-size:13px;font-weight:700;color:var(--br)">찾은 단어</span>
    <span style="font-size:20px;font-weight:800;color:#5BA4CF"><span id="fc6">0</span> / <span id="tc6">0</span></span>
  </div>

  <div style="background:#fff;border:2px solid #5BA4CF44;border-radius:18px;overflow:hidden;margin-bottom:16px;">
    <div style="background:#EBF4FF;padding:12px 18px;border-bottom:1.5px solid #5BA4CF44;text-align:center;font-size:13px;font-weight:700;color:#1a4a7a">📖 Mad Ram in the Mud</div>
    <div style="padding:18px;" id="story6"></div>
  </div>

  <div style="background:var(--yl);border:2px solid var(--y);border-radius:14px;padding:14px 16px;margin-bottom:16px;">
    <div style="font-size:11px;font-weight:800;color:#8B6F00;margin-bottom:8px;text-transform:uppercase;letter-spacing:.06em">🎯 찾아야 할 단어들</div>
    <div style="display:flex;flex-wrap:wrap;gap:6px;" id="chips6"></div>
  </div>

  <div id="cb6" style="display:none;background:#EBF4FF;border:2px solid #5BA4CF;border-radius:14px;padding:20px;text-align:center;margin-bottom:16px;">
    <div style="font-size:40px;margin-bottom:8px">🎉</div>
    <div style="font-size:17px;font-weight:800;color:#1a4a7a">모두 찾았어요!</div>
  </div>

  <script>
  var SL6=[{text:"A mad ram ran into the mud.",ko:"화난 숫양이 진흙 속으로 달려갔어요."},
{text:"The mud is red and dim.",ko:"진흙은 붉고 어두워요."},
{text:"A dog dips in the dam.",ko:"개가 둑에 뛰어들어요."},
{text:"The rim of the dam is red.",ko:"둑의 테두리가 빨개요."},
{text:"Mad ram! Go to the rod!",ko:"화난 숫양! 막대기로 가!"}];
  var TGT6=["mad", "ram", "mud", "red", "dim"];
  var TGT6SET=new Set(TGT6);
  var found6=new Set();
  document.getElementById('tc6').textContent=TGT6.length;
  var ch6=document.getElementById('chips6');
  TGT6.forEach(function(w){var c=document.createElement('div');c.style.cssText='padding:5px 14px;background:#fff;border-radius:10px;font-size:13px;font-weight:700;color:#8B6F00;border:2px solid var(--y);transition:all .3s;';c.id='ch6-'+w;c.textContent=w;ch6.appendChild(c);});
  var st6=document.getElementById('story6');
  SL6.forEach(function(line){
    var div=document.createElement('div');div.style.marginBottom='14px';
    var btn=document.createElement('button');
    btn.style.cssText='display:inline-flex;align-items:center;gap:4px;background:#5BA4CF;color:#fff;border:none;border-radius:8px;padding:5px 12px;font-family:Nunito,sans-serif;font-size:12px;font-weight:700;cursor:pointer;margin-bottom:6px;';
    btn.innerHTML='🔊 읽기';
    btn.onclick=(function(l){return function(){
      window.speechSynthesis.cancel();btn.style.background='var(--o)';
      var u=new SpeechSynthesisUtterance(l.text);u.lang='en-GB';u.rate=0.78;
      var vs=window.speechSynthesis.getVoices();var v=vs.find(function(v){return v.lang==='en-GB';})||vs.find(function(v){return v.lang.startsWith('en');})||null;if(v)u.voice=v;
      u.onend=function(){btn.style.background='#5BA4CF';};window.speechSynthesis.speak(u);
    };})( line);
    div.appendChild(btn);
    var sd=document.createElement('div');sd.style.cssText='font-size:17px;font-weight:700;line-height:2.2;';
    line.text.split(' ').forEach(function(w){
      var clean=w.replace(/[.,!?]/g,'');var punct=w.replace(/[a-zA-Z]/g,'');
      var isTgt=TGT6SET.has(clean.toLowerCase());
      var span=document.createElement('span');
      span.style.cssText='cursor:pointer;padding:1px 4px;border-radius:4px;transition:all .2s;'+(isTgt?'border-bottom:2px dashed #5BA4CF88;':'');
      span.textContent=clean+(punct||'');
      if(isTgt){span.onclick=function(){tapW6(span,clean.toLowerCase());};}
      else{span.onclick=function(){span.style.background='#FCEBEB';setTimeout(function(){span.style.background='';},350);};}
      sd.appendChild(span);sd.appendChild(document.createTextNode(' '));
    });
    div.appendChild(sd);
    var ko=document.createElement('div');ko.style.cssText='font-size:12px;color:var(--br);margin-top:2px;';ko.textContent=line.ko;
    div.appendChild(ko);st6.appendChild(div);
  });
  function tapW6(span,word){
    if(span.dataset.m)return;span.dataset.m='1';
    span.style.background='#5BA4CF';span.style.color='#fff';span.style.borderBottom='none';
    var chip=document.getElementById('ch6-'+word);
    if(chip&&!found6.has(word)){found6.add(word);chip.style.background='#5BA4CF';chip.style.color='#fff';chip.style.borderColor='#5BA4CF';}
    document.getElementById('fc6').textContent=found6.size;
    var u=new SpeechSynthesisUtterance(word);u.lang='en-GB';u.rate=0.8;
    var vs=window.speechSynthesis.getVoices();var v=vs.find(function(v){return v.lang==='en-GB';})||vs.find(function(v){return v.lang.startsWith('en');})||null;if(v)u.voice=v;window.speechSynthesis.speak(u);
    if(found6.size>=TGT6.length)document.getElementById('cb6').style.display='block';
  }
  window.speechSynthesis.onvoiceschanged=function(){window.speechSynthesis.getVoices();};
  </script>

  <button class="done-btn" onclick="markDone()" style="background:#5BA4CF">✅ Step 6 완료!</button>
  <div class="done-msg" id="doneMsg" style="background:#EBF4FF;color:#1a4a7a;border:1.5px solid #5BA4CF">🎉 완료! 다음 스텝으로 가요!</div>
  <div class="nav-btns">
    <a href="jp-g1-u4-step05.html" class="nav-btn sec">← 🔤 Blending</a>
    <a href="jp-g1-u4-step07.html" class="nav-btn pri" style="background:#5BA4CF">⭐ Tricky Words →</a>
  </div>
</div>
<script>
function markDone(){
  var done=new Set(JSON.parse(localStorage.getItem('jp_g1_u4_done')||'[]'));
  done.add(6);localStorage.setItem('jp_g1_u4_done',JSON.stringify([...done]));
  document.getElementById('doneMsg').classList.add('show');
  document.querySelector('.done-btn').disabled=true;document.querySelector('.done-btn').style.opacity='.6';
}
var _d=new Set(JSON.parse(localStorage.getItem('jp_g1_u4_done')||'[]'));
if(_d.has(6)){document.getElementById('doneMsg').classList.add('show');document.querySelector('.done-btn').disabled=true;document.querySelector('.done-btn').style.opacity='.6';}
</script>
<script>
// ══════════════════════════════════════════
//  Unit LNB (Left Navigation Bar)
//  모든 Step 파일에서 공통으로 사용
// ══════════════════════════════════════════

const LNB_STEPS = [
  { num:1,  icon:'🔊', title:'Sound Intro',       short:'소리 만나기' },
  { num:2,  icon:'✍️', title:'Letter Formation',  short:'글자 쓰기' },
  { num:3,  icon:'👂', title:'Sound Discrimination', short:'소리 구별' },
  { num:4,  icon:'📖', title:'Word Cards',         short:'단어 카드' },
  { num:5,  icon:'🔤', title:'Blending',           short:'소리 합치기' },
  { num:6,  icon:'📚', title:'Decodable Story',    short:'스토리 읽기' },
  { num:7,  icon:'⭐', title:'Tricky Words',       short:'트리키 워드' },
  { num:8,  icon:'🎮', title:'Games',              short:'게임' },
  { num:9,  icon:'💬', title:'Talk Together',      short:'함께 대화' },
  { num:10, icon:'📔', title:'My Journal',         short:'나의 저널' },
];

const DONE_KEY = 'jp_g1_u4_done';

function getLNBDone() {
  return new Set(JSON.parse(localStorage.getItem(DONE_KEY) || '[]'));
}

// 현재 step 번호 파악
function getCurrentStep() {
  const path = window.location.pathname;
  const match = path.match(/step-(\d+)\.html/);
  return match ? parseInt(match[1]) : 0;
}

// LNB CSS 주입
function injectLNBStyle() {
  const style = document.createElement('style');
  style.textContent = `
    /* ── LNB 레이아웃 ── */
    body { overflow-x: hidden; }

    /* 기존 nav 조정 */
    nav { left: 0; z-index: 200; }

    /* LNB 사이드바 */
    #unitLNB {
      position: fixed;
      top: 56px; /* nav 높이 */
      left: 0;
      width: 220px;
      height: calc(100vh - 56px);
      background: #FEFCFF;
      border-right: 2px solid #D8C8F0;
      overflow-y: auto;
      z-index: 150;
      padding: 16px 0 32px;
      transition: transform .3s ease;
    }

    /* LNB 헤더 */
    .lnb-header {
      padding: 0 16px 12px;
      border-bottom: 1px solid var(--soft);
      margin-bottom: 8px;
    }
    .lnb-unit-label {
      font-size: 10px; font-weight: 700; color: var(--br);
      text-transform: uppercase; letter-spacing: .08em; margin-bottom: 4px;
    }
    .lnb-unit-title {
      font-size: 16px; font-weight: 800; color: #7040B8;
    }
    .lnb-progress {
      margin-top: 8px;
    }
    .lnb-prog-track {
      background: #E0D0FF; border-radius: 6px; height: 6px; overflow: hidden;
    }
    .lnb-prog-fill {
      height: 100%; background: #7040B8; border-radius: 6px; transition: width .4s;
    }
    .lnb-prog-txt {
      font-size: 10px; color: var(--br); font-weight: 700; margin-top: 3px;
    }

    /* LNB 아이템 */
    .lnb-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 16px; cursor: pointer;
      text-decoration: none; color: var(--dark);
      border-left: 3px solid transparent;
      transition: all .15s;
      font-size: 13px; font-weight: 600;
      position: relative;
    }
    .lnb-item:hover {
      background: #F5EEFF; border-left-color: #C0A0EE;
    }
    .lnb-item.active {
      background: #E8D8FF;
      border-left-color: #7040B8;
      color: #5A28A0;
      font-weight: 800;
    }
    .lnb-item.done {
      color: var(--g);
    }
    .lnb-item.done .lnb-check {
      display: flex;
    }
    .lnb-num {
      width: 26px; height: 26px; border-radius: 8px;
      background: #EDE0FF; color: #7040B8;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 800; flex-shrink: 0;
      transition: all .15s;
    }
    .lnb-item.active .lnb-num {
      background: #7040B8; color: #fff;
    }
    .lnb-item.done .lnb-num {
      background: #2D9E68; color: #fff;
    }
    .lnb-icon { font-size: 14px; flex-shrink: 0; }
    .lnb-text { flex: 1; }
    .lnb-title { display: block; font-size: 12px; font-weight: 700; line-height: 1.2; }
    .lnb-short { display: block; font-size: 10px; opacity: .65; margin-top: 1px; }
    .lnb-check {
      display: none; width: 18px; height: 18px; border-radius: 50%;
      background: var(--g); color: #fff;
      align-items: center; justify-content: center; font-size: 10px; flex-shrink: 0;
    }

    /* 콘텐츠 영역 밀기 */
    #lnbContentShift {
      margin-left: 220px;
      transition: margin-left .3s;
    }

    /* 모바일 토글 버튼 */
    #lnbToggle {
      display: none;
      position: fixed;
      bottom: 20px; right: 20px;
      width: 52px; height: 52px;
      border-radius: 50%;
      background: var(--p); color: #fff;
      border: none; font-size: 20px;
      cursor: pointer; z-index: 300;
      box-shadow: 0 4px 16px rgba(155,114,207,.4);
    }

    /* 모바일 오버레이 */
    #lnbOverlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,.3);
      z-index: 140;
    }
    #lnbOverlay.show { display: block; }

    /* 모바일 */
    @media (max-width: 768px) {
      #unitLNB {
        transform: translateX(-100%);
        top: 0; height: 100vh;
        padding-top: 72px;
        box-shadow: 4px 0 24px rgba(0,0,0,.12);
      }
      #unitLNB.open { transform: translateX(0); }
      #lnbContentShift { margin-left: 0 !important; }
      #lnbToggle { display: flex; align-items: center; justify-content: center; }
    }
  `;
  document.head.appendChild(style);
}

// LNB HTML 생성
function buildLNB() {
  const currentStep = getCurrentStep();
  const done = getLNBDone();

  // LNB 사이드바
  const lnb = document.createElement('div');
  lnb.id = 'unitLNB';

  // 헤더
  const pct = Math.round(done.size / LNB_STEPS.length * 100);
  lnb.innerHTML = `
    <div class="lnb-header">
      <div class="lnb-unit-label">Group 1 · Unit 4</div>
      <div class="lnb-unit-title">r, m, d</div>
      <div class="lnb-progress">
        <div class="lnb-prog-track">
          <div class="lnb-prog-fill" style="width:${pct}%"></div>
        </div>
        <div class="lnb-prog-txt">${done.size} / ${LNB_STEPS.length} 완료</div>
      </div>
    </div>`;

  // Step 목록
  LNB_STEPS.forEach(s => {
    const isDone = done.has(s.num);
    const isActive = s.num === currentStep;
    const a = document.createElement('a');
    a.href = `step-${String(s.num).padStart(2,'0')}.html`;
    a.className = 'lnb-item' + (isActive ? ' active' : '') + (isDone ? ' done' : '');
    a.innerHTML = `
      <div class="lnb-num">${isDone ? '✓' : s.num}</div>
      <span class="lnb-icon">${s.icon}</span>
      <span class="lnb-text">
        <span class="lnb-title">${s.title}</span>
        <span class="lnb-short">${s.short}</span>
      </span>
      <div class="lnb-check">✓</div>`;
    lnb.appendChild(a);
  });

  document.body.appendChild(lnb);

  // 오버레이 (모바일)
  const overlay = document.createElement('div');
  overlay.id = 'lnbOverlay';
  overlay.onclick = closeLNB;
  document.body.appendChild(overlay);

  // 토글 버튼 (모바일)
  const toggle = document.createElement('button');
  toggle.id = 'lnbToggle';
  toggle.innerHTML = '☰';
  toggle.onclick = toggleLNB;
  document.body.appendChild(toggle);
}

// 기존 콘텐츠에 margin-left 적용
function shiftContent() {
  // nav는 이미 fixed라 영향 없음
  // wrap 또는 body의 직접 자식 div들에 margin 적용
  const wrap = document.querySelector('.wrap') || document.querySelector('main');
  if (wrap) {
    wrap.id = wrap.id || 'lnbContentShift';
    wrap.style.marginLeft = '220px';
    wrap.style.transition = 'margin-left .3s';
  }

  // 모바일에서는 margin 제거
  function applyMobile() {
    if (window.innerWidth <= 768) {
      if (wrap) wrap.style.marginLeft = '0';
    } else {
      if (wrap) wrap.style.marginLeft = '220px';
    }
  }
  applyMobile();
  window.addEventListener('resize', applyMobile);
}

function toggleLNB() {
  const lnb = document.getElementById('unitLNB');
  const overlay = document.getElementById('lnbOverlay');
  const toggle = document.getElementById('lnbToggle');
  const isOpen = lnb.classList.contains('open');
  lnb.classList.toggle('open', !isOpen);
  overlay.classList.toggle('show', !isOpen);
  toggle.innerHTML = isOpen ? '☰' : '✕';
}

function closeLNB() {
  document.getElementById('unitLNB')?.classList.remove('open');
  document.getElementById('lnbOverlay')?.classList.remove('show');
  document.getElementById('lnbToggle').innerHTML = '☰';
}

// 초기화
function initLNB() {
  injectLNBStyle();
  buildLNB();
  shiftContent();
}

// DOM 준비 후 실행
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', initLNB);
} else {
  initLNB();
}

</script>
</body></html>
