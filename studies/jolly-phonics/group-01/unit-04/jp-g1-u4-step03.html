<style>
:root{--g:#52B788;--gl:#E8F8EF;--y:#F9C74F;--yl:#FFFBEC;--o:#F4845F;--ol:#FFF0EB;--b:#5BA4CF;--bl:#EBF4FF;--p:#9B72CF;--pl:#F3EEFF;--cream:#FFFDF8;--warm:#F5EDE0;--dark:#2C2016;--br:#8B6F5E;--soft:#EAE0D5;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--cream);color:var(--dark);font-family:'Nunito',sans-serif;}
nav{position:fixed;top:0;width:100%;z-index:100;padding:13px 36px;display:flex;align-items:center;justify-content:space-between;background:rgba(255,253,248,.95);backdrop-filter:blur(14px);border-bottom:2px solid var(--soft);}
.logo{font-size:16px;font-weight:800;color:var(--dark);text-decoration:none;}.logo span{color:var(--o);}
.back{font-size:13px;color:var(--br);text-decoration:none;font-weight:700;padding:6px 14px;border:1.5px solid var(--soft);border-radius:10px;background:#fff;}
.wrap{max-width:720px;margin:0 auto;padding:82px 36px 80px;}
.card{background:#fff;border:2px solid #E0D8F0;border-radius:20px;padding:22px;margin-bottom:18px;box-shadow:0 2px 8px rgba(0,0,0,.05);}
.card-title{font-size:15px;font-weight:800;margin-bottom:12px;display:flex;align-items:center;gap:6px;padding-bottom:10px;border-bottom:1.5px solid var(--soft);}
.done-btn{width:100%;padding:15px;border-radius:16px;color:#fff;border:none;font-family:'Nunito',sans-serif;font-size:15px;font-weight:700;cursor:pointer;margin-top:4px;transition:all .2s;}
.done-msg{display:none;border-radius:14px;padding:14px;text-align:center;margin-top:10px;font-size:14px;font-weight:700;}
.done-msg.show{display:block;}
.nav-btns{display:flex;gap:10px;margin-top:14px;padding-top:14px;border-top:1.5px solid var(--soft);}
.nav-btn{flex:1;padding:11px;border-radius:12px;font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;cursor:pointer;text-align:center;text-decoration:none;}
.nav-btn.sec{border:1.5px solid var(--soft);background:#fff;color:var(--br);}
.nav-btn.pri{color:#fff;border:none;}
@media(max-width:680px){.wrap{padding-left:20px;padding-right:20px;}}
</style>
</head>
<body>
<script>MommyAuth.guard('G1');
MommyAuth.checkLock('G1-U4-S03');</script>
<nav><a href="../../../../index.html" class="logo">Mommy<span>Time</span></a>
<a href="jp-g1-u4-index.html" class="back">← Unit 4</a></nav>
<div class="wrap">
  <div style="display:inline-flex;align-items:center;gap:6px;background:#EBF4FF;color:#5BA4CF;border:1.5px solid #5BA4CF88;border-radius:20px;padding:6px 16px;font-size:13px;font-weight:700;margin-bottom:14px;">3 Step 3 / 10</div>
  <h1 style="font-size:24px;font-weight:800;margin-bottom:8px;">👂 Sound Discrimination</h1>
  <p style="font-size:14px;color:var(--br);margin-bottom:24px;line-height:1.7;">r·m·d 세 소리와 함께 더 많은 단어를!</p>

  <div class="card">
    <div class="card-title" style="color:#5BA4CF">🎯 Game 1 — 소리 보고 그림 고르기</div>
    <p style="font-size:13px;color:var(--br);margin-bottom:16px">같은 소리로 시작하는 단어를 골라요!</p>
    <div style="display:flex;align-items:center;justify-content:space-between;background:#EBF4FF;border-radius:12px;padding:10px 16px;margin-bottom:16px;">
      <span style="font-size:13px;font-weight:700;color:#1a4a7a">점수</span>
      <span style="font-size:18px;font-weight:800;color:#5BA4CF"><span id="g1s">0</span> / <span id="g1t">0</span></span>
    </div>
    <div style="display:flex;gap:6px;justify-content:center;margin-bottom:14px;" id="qDots"></div>
    <div style="text-align:center;margin-bottom:18px;">
      <div style="display:inline-flex;flex-direction:column;align-items:center;gap:5px;background:#EBF4FF;border-radius:18px;padding:14px 28px;">
        <div id="qLetter" style="font-size:52px;font-weight:800;color:#5BA4CF;line-height:1"></div>
        <div id="qKo" style="font-size:18px;font-weight:800;color:#5BA4CF"></div>
        <div style="font-size:11px;color:#5BA4CF;opacity:.7">이 소리로 시작하는 단어는?</div>
      </div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;" id="optGrid"></div>
    <div id="fb1" style="text-align:center;margin-top:12px;font-size:14px;font-weight:800;min-height:22px;"></div>
    <button id="nextQBtn" onclick="nextQ()" style="display:none;width:100%;margin-top:10px;padding:12px;border-radius:12px;background:#5BA4CF;color:#fff;border:none;font-family:Nunito,sans-serif;font-size:13px;font-weight:700;cursor:pointer;">다음 문제 →</button>
  </div>

  <div class="card">
    <div class="card-title" style="color:#5BA4CF">📍 Game 2 — 소리 위치 찾기</div>
    <p style="font-size:13px;color:var(--br);margin-bottom:14px">표시된 소리가 첫소리 / 중간 / 끝소리 어디에 있나요?</p>
    <div style="display:flex;flex-direction:column;gap:10px;" id="posGame"></div>
  </div>

  <script>
  var QS=[
  {letter:"r",ko:"르",opts:[{word:"red",emoji:"🔴",phonics:"r-e-d",correct:true},{word:"rod",emoji:"📝",phonics:"r-o-d",correct:true},{word:"mad",emoji:"😡",phonics:"m-a-d",correct:false},{word:"dim",emoji:"🔅",phonics:"d-i-m",correct:false}]},
  {letter:"m",ko:"므",opts:[{word:"mad",emoji:"😡",phonics:"m-a-d",correct:true},{word:"mud",emoji:"🟤",phonics:"m-u-d",correct:true},{word:"red",emoji:"🔴",phonics:"r-e-d",correct:false},{word:"dim",emoji:"🔅",phonics:"d-i-m",correct:false}]},
  {letter:"d",ko:"드",opts:[{word:"dim",emoji:"🔅",phonics:"d-i-m",correct:true},{word:"dam",emoji:"📝",phonics:"d-a-m",correct:true},{word:"red",emoji:"🔴",phonics:"r-e-d",correct:false},{word:"mad",emoji:"😡",phonics:"m-a-d",correct:false}]},
];
  var qIdx=0,g1s=0,g1t=0,g1ans=false;
  function buildDots(){
    document.getElementById('qDots').innerHTML=QS.map(function(_,i){
      return '<div style="width:10px;height:10px;border-radius:50%;background:'+(i<qIdx?'#5BA4CF':i===qIdx?'var(--o)':'var(--soft)')+';transition:all .3s'+(i===qIdx?';transform:scale(1.3)':'')+';"></div>';
    }).join('');
  }
  function buildQ(){
    g1ans=false;var q=QS[qIdx];
    document.getElementById('qLetter').textContent=q.letter;
    document.getElementById('qKo').textContent=q.ko;
    document.getElementById('fb1').textContent='';
    document.getElementById('nextQBtn').style.display='none';
    buildDots();
    var grid=document.getElementById('optGrid');grid.innerHTML='';
    q.opts.forEach(function(o){
      var c=document.createElement('div');
      c.style.cssText='background:var(--warm);border:3px solid var(--soft);border-radius:14px;padding:16px 10px;cursor:pointer;text-align:center;position:relative;transition:all .2s;user-select:none;';
      c.innerHTML='<div style="font-size:40px;margin-bottom:6px">'+o.emoji+'</div><div style="font-size:17px;font-weight:800">'+o.word+'</div><div style="font-size:12px;color:var(--br);margin-top:3px">('+o.phonics+')</div>';
      c.onclick=function(){checkAns(c,o,q);};grid.appendChild(c);
    });
  }
  function checkAns(card,opt,q){
    if(g1ans)return;g1ans=true;g1t++;
    if(opt.correct){card.style.background='var(--gl)';card.style.borderColor='var(--g)';card.innerHTML+='<div style="position:absolute;top:8px;right:8px;font-size:16px">✅</div>';g1s++;document.getElementById('fb1').style.color='var(--g)';document.getElementById('fb1').textContent='🎉 맞아요! '+opt.word+'!'}
    else{card.style.background='#FCEBEB';card.style.borderColor='#E24B4A';card.innerHTML+='<div style="position:absolute;top:8px;right:8px;font-size:16px">❌</div>';document.querySelectorAll('#optGrid > div').forEach(function(c,i){if(q.opts[i]&&q.opts[i].correct){c.style.background='var(--gl)';c.style.borderColor='var(--g)';}}); document.getElementById('fb1').style.color='#E24B4A';document.getElementById('fb1').textContent='🤔 아니에요! 초록색이 정답!'}
    document.getElementById('g1s').textContent=g1s;document.getElementById('g1t').textContent=g1t;
    document.getElementById('nextQBtn').style.display='block';
  }
  function nextQ(){qIdx=(qIdx+1)%QS.length;buildQ();}
  var PI=[
  {word:"red",hl:"r",hlPos:"first",display:"<span class=\"hl\">r</span>ed",phonics:"r-e-d"},
  {word:"mad",hl:"m",hlPos:"first",display:"<span class=\"hl\">m</span>ad",phonics:"m-a-d"},
  {word:"dim",hl:"d",hlPos:"first",display:"<span class=\"hl\">d</span>im",phonics:"d-i-m"},
  {word:"rod",hl:"r",hlPos:"first",display:"<span class=\"hl\">r</span>od",phonics:"r-o-d"},
  {word:"mud",hl:"m",hlPos:"first",display:"<span class=\"hl\">m</span>ud",phonics:"m-u-d"},
  {word:"dam",hl:"d",hlPos:"first",display:"<span class=\"hl\">d</span>am",phonics:"d-a-m"},
  {word:"rim",hl:"r",hlPos:"first",display:"<span class=\"hl\">r</span>im",phonics:"r-i-m"},
  {word:"dip",hl:"d",hlPos:"first",display:"<span class=\"hl\">d</span>ip",phonics:"d-i-p"},
];
  var PL={first:'첫소리',middle:'중간',last:'끝소리'};
  function buildPos(){
    var c=document.getElementById('posGame');c.innerHTML='';
    PI.forEach(function(item,i){
      var div=document.createElement('div');
      div.style.cssText='background:var(--warm);border-radius:14px;padding:14px 16px;';
      div.innerHTML='<div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;flex-wrap:wrap;"><div style="font-size:22px;font-weight:800">'+item.display.replace(/\\"/g,'"')+'</div><div style="font-size:12px;color:var(--br);font-weight:700">('+item.phonics+')</div></div>';
      var btns=document.createElement('div');btns.style.cssText='display:flex;gap:8px;';
      ['first','middle','last'].forEach(function(pos){
        var btn=document.createElement('button');
        btn.style.cssText='flex:1;padding:9px;border-radius:10px;border:2.5px solid var(--soft);background:#fff;font-family:Nunito,sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;';
        btn.textContent=PL[pos];
        btn.onclick=function(){
          btns.querySelectorAll('button').forEach(function(b){b.disabled=true;});
          if(pos===item.hlPos){btn.style.background='#5BA4CF';btn.style.color='#fff';btn.style.borderColor='#5BA4CF';}
          else{btn.style.background='#E24B4A';btn.style.color='#fff';btn.style.borderColor='#E24B4A';btns.querySelectorAll('button')[['first','middle','last'].indexOf(item.hlPos)].style.background='#5BA4CF';btns.querySelectorAll('button')[['first','middle','last'].indexOf(item.hlPos)].style.color='#fff';}
        };btns.appendChild(btn);
      });div.appendChild(btns);c.appendChild(div);
    });
  }
  buildQ();buildPos();
  </script>

  <button class="done-btn" onclick="markDone()" style="background:#5BA4CF">✅ Step 3 완료!</button>
  <div class="done-msg" id="doneMsg" style="background:#EBF4FF;color:#1a4a7a;border:1.5px solid #5BA4CF">🎉 완료! 다음 스텝으로 가요!</div>
  <div class="nav-btns">
    <a href="jp-g1-u4-step02.html" class="nav-btn sec">← ✍️ Letter Formation</a>
    <a href="jp-g1-u4-step04.html" class="nav-btn pri" style="background:#5BA4CF">📖 Word Cards →</a>
  </div>
</div>
<script>
function markDone(){
  var done=new Set(JSON.parse(localStorage.getItem('jp_g1_u4_done')||'[]'));
  done.add(3);localStorage.setItem('jp_g1_u4_done',JSON.stringify([...done]));
  document.getElementById('doneMsg').classList.add('show');
  document.querySelector('.done-btn').disabled=true;document.querySelector('.done-btn').style.opacity='.6';
}
var _d=new Set(JSON.parse(localStorage.getItem('jp_g1_u4_done')||'[]'));
if(_d.has(3)){document.getElementById('doneMsg').classList.add('show');document.querySelector('.done-btn').disabled=true;document.querySelector('.done-btn').style.opacity='.6';}
</script>
<script>
// ══════════════════════════════════════════
//  Unit LNB (Left Navigation Bar)
//  모든 Step 파일에서 공통으로 사용
// ══════════════════════════════════════════

const LNB_STEPS = [
  { num:1,  icon:'🔊', title:'Sound Intro',       short:'소리 만나기' },
  { num:2,  icon:'✍️', title:'Letter Formation',  short:'글자 쓰기' },
  { num:3,  icon:'👂', title:'Sound Discrimination', short:'소리 구별' },
  { num:4,  icon:'📖', title:'Word Cards',         short:'단어 카드' },
  { num:5,  icon:'🔤', title:'Blending',           short:'소리 합치기' },
  { num:6,  icon:'📚', title:'Decodable Story',    short:'스토리 읽기' },
  { num:7,  icon:'⭐', title:'Tricky Words',       short:'트리키 워드' },
  { num:8,  icon:'🎮', title:'Games',              short:'게임' },
  { num:9,  icon:'💬', title:'Talk Together',      short:'함께 대화' },
  { num:10, icon:'📔', title:'My Journal',         short:'나의 저널' },
];

const DONE_KEY = 'jp_g1_u4_done';

function getLNBDone() {
  return new Set(JSON.parse(localStorage.getItem(DONE_KEY) || '[]'));
}

// 현재 step 번호 파악
function getCurrentStep() {
  const path = window.location.pathname;
  const match = path.match(/step-(\d+)\.html/);
  return match ? parseInt(match[1]) : 0;
}

// LNB CSS 주입
function injectLNBStyle() {
  const style = document.createElement('style');
  style.textContent = `
    /* ── LNB 레이아웃 ── */
    body { overflow-x: hidden; }

    /* 기존 nav 조정 */
    nav { left: 0; z-index: 200; }

    /* LNB 사이드바 */
    #unitLNB {
      position: fixed;
      top: 56px; /* nav 높이 */
      left: 0;
      width: 220px;
      height: calc(100vh - 56px);
      background: #FEFCFF;
      border-right: 2px solid #D8C8F0;
      overflow-y: auto;
      z-index: 150;
      padding: 16px 0 32px;
      transition: transform .3s ease;
    }

    /* LNB 헤더 */
    .lnb-header {
      padding: 0 16px 12px;
      border-bottom: 1px solid var(--soft);
      margin-bottom: 8px;
    }
    .lnb-unit-label {
      font-size: 10px; font-weight: 700; color: var(--br);
      text-transform: uppercase; letter-spacing: .08em; margin-bottom: 4px;
    }
    .lnb-unit-title {
      font-size: 16px; font-weight: 800; color: #7040B8;
    }
    .lnb-progress {
      margin-top: 8px;
    }
    .lnb-prog-track {
      background: #E0D0FF; border-radius: 6px; height: 6px; overflow: hidden;
    }
    .lnb-prog-fill {
      height: 100%; background: #7040B8; border-radius: 6px; transition: width .4s;
    }
    .lnb-prog-txt {
      font-size: 10px; color: var(--br); font-weight: 700; margin-top: 3px;
    }

    /* LNB 아이템 */
    .lnb-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 16px; cursor: pointer;
      text-decoration: none; color: var(--dark);
      border-left: 3px solid transparent;
      transition: all .15s;
      font-size: 13px; font-weight: 600;
      position: relative;
    }
    .lnb-item:hover {
      background: #F5EEFF; border-left-color: #C0A0EE;
    }
    .lnb-item.active {
      background: #E8D8FF;
      border-left-color: #7040B8;
      color: #5A28A0;
      font-weight: 800;
    }
    .lnb-item.done {
      color: var(--g);
    }
    .lnb-item.done .lnb-check {
      display: flex;
    }
    .lnb-num {
      width: 26px; height: 26px; border-radius: 8px;
      background: #EDE0FF; color: #7040B8;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 800; flex-shrink: 0;
      transition: all .15s;
    }
    .lnb-item.active .lnb-num {
      background: #7040B8; color: #fff;
    }
    .lnb-item.done .lnb-num {
      background: #2D9E68; color: #fff;
    }
    .lnb-icon { font-size: 14px; flex-shrink: 0; }
    .lnb-text { flex: 1; }
    .lnb-title { display: block; font-size: 12px; font-weight: 700; line-height: 1.2; }
    .lnb-short { display: block; font-size: 10px; opacity: .65; margin-top: 1px; }
    .lnb-check {
      display: none; width: 18px; height: 18px; border-radius: 50%;
      background: var(--g); color: #fff;
      align-items: center; justify-content: center; font-size: 10px; flex-shrink: 0;
    }

    /* 콘텐츠 영역 밀기 */
    #lnbContentShift {
      margin-left: 220px;
      transition: margin-left .3s;
    }

    /* 모바일 토글 버튼 */
    #lnbToggle {
      display: none;
      position: fixed;
      bottom: 20px; right: 20px;
      width: 52px; height: 52px;
      border-radius: 50%;
      background: var(--p); color: #fff;
      border: none; font-size: 20px;
      cursor: pointer; z-index: 300;
      box-shadow: 0 4px 16px rgba(155,114,207,.4);
    }

    /* 모바일 오버레이 */
    #lnbOverlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,.3);
      z-index: 140;
    }
    #lnbOverlay.show { display: block; }

    /* 모바일 */
    @media (max-width: 768px) {
      #unitLNB {
        transform: translateX(-100%);
        top: 0; height: 100vh;
        padding-top: 72px;
        box-shadow: 4px 0 24px rgba(0,0,0,.12);
      }
      #unitLNB.open { transform: translateX(0); }
      #lnbContentShift { margin-left: 0 !important; }
      #lnbToggle { display: flex; align-items: center; justify-content: center; }
    }
  `;
  document.head.appendChild(style);
}

// LNB HTML 생성
function buildLNB() {
  const currentStep = getCurrentStep();
  const done = getLNBDone();

  // LNB 사이드바
  const lnb = document.createElement('div');
  lnb.id = 'unitLNB';

  // 헤더
  const pct = Math.round(done.size / LNB_STEPS.length * 100);
  lnb.innerHTML = `
    <div class="lnb-header">
      <div class="lnb-unit-label">Group 1 · Unit 4</div>
      <div class="lnb-unit-title">r, m, d</div>
      <div class="lnb-progress">
        <div class="lnb-prog-track">
          <div class="lnb-prog-fill" style="width:${pct}%"></div>
        </div>
        <div class="lnb-prog-txt">${done.size} / ${LNB_STEPS.length} 완료</div>
      </div>
    </div>`;

  // Step 목록
  LNB_STEPS.forEach(s => {
    const isDone = done.has(s.num);
    const isActive = s.num === currentStep;
    const a = document.createElement('a');
    a.href = `step-${String(s.num).padStart(2,'0')}.html`;
    a.className = 'lnb-item' + (isActive ? ' active' : '') + (isDone ? ' done' : '');
    a.innerHTML = `
      <div class="lnb-num">${isDone ? '✓' : s.num}</div>
      <span class="lnb-icon">${s.icon}</span>
      <span class="lnb-text">
        <span class="lnb-title">${s.title}</span>
        <span class="lnb-short">${s.short}</span>
      </span>
      <div class="lnb-check">✓</div>`;
    lnb.appendChild(a);
  });

  document.body.appendChild(lnb);

  // 오버레이 (모바일)
  const overlay = document.createElement('div');
  overlay.id = 'lnbOverlay';
  overlay.onclick = closeLNB;
  document.body.appendChild(overlay);

  // 토글 버튼 (모바일)
  const toggle = document.createElement('button');
  toggle.id = 'lnbToggle';
  toggle.innerHTML = '☰';
  toggle.onclick = toggleLNB;
  document.body.appendChild(toggle);
}

// 기존 콘텐츠에 margin-left 적용
function shiftContent() {
  // nav는 이미 fixed라 영향 없음
  // wrap 또는 body의 직접 자식 div들에 margin 적용
  const wrap = document.querySelector('.wrap') || document.querySelector('main');
  if (wrap) {
    wrap.id = wrap.id || 'lnbContentShift';
    wrap.style.marginLeft = '220px';
    wrap.style.transition = 'margin-left .3s';
  }

  // 모바일에서는 margin 제거
  function applyMobile() {
    if (window.innerWidth <= 768) {
      if (wrap) wrap.style.marginLeft = '0';
    } else {
      if (wrap) wrap.style.marginLeft = '220px';
    }
  }
  applyMobile();
  window.addEventListener('resize', applyMobile);
}

function toggleLNB() {
  const lnb = document.getElementById('unitLNB');
  const overlay = document.getElementById('lnbOverlay');
  const toggle = document.getElementById('lnbToggle');
  const isOpen = lnb.classList.contains('open');
  lnb.classList.toggle('open', !isOpen);
  overlay.classList.toggle('show', !isOpen);
  toggle.innerHTML = isOpen ? '☰' : '✕';
}

function closeLNB() {
  document.getElementById('unitLNB')?.classList.remove('open');
  document.getElementById('lnbOverlay')?.classList.remove('show');
  document.getElementById('lnbToggle').innerHTML = '☰';
}

// 초기화
function initLNB() {
  injectLNBStyle();
  buildLNB();
  shiftContent();
}

// DOM 준비 후 실행
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', initLNB);
} else {
  initLNB();
}

</script>
</body></html>
