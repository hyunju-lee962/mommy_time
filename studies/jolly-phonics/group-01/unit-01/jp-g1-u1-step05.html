<html lang="en">
<head>

<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Step 5: Blending Practice — s,a,t</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--g:#52B788;--gl:#E8F8EF;--y:#F9C74F;--yl:#FFFBEC;--o:#F4845F;--ol:#FFF0EB;--b:#5BA4CF;--bl:#EBF4FF;--p:#9B72CF;--pl:#F3EEFF;--cream:#FFFDF8;--warm:#F5EDE0;--dark:#2C2016;--br:#8B6F5E;--soft:#EAE0D5;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--cream);color:var(--dark);font-family:'Nunito',sans-serif;}
nav{position:fixed;top:0;width:100%;z-index:100;padding:13px 36px;display:flex;align-items:center;justify-content:space-between;background:rgba(255,253,248,.94);backdrop-filter:blur(14px);border-bottom:1px solid var(--soft);}
.logo{font-size:16px;font-weight:800;color:var(--dark);text-decoration:none;}.logo span{color:var(--o);}
.back{font-size:13px;color:var(--br);text-decoration:none;font-weight:600;}
.wrap{max-width:680px;margin:0 auto;padding:82px 36px 80px;}
.step-badge{display:inline-flex;align-items:center;gap:6px;background:var(--yl);color:#8B6F00;border-radius:20px;padding:5px 14px;font-size:12px;font-weight:700;margin-bottom:12px;}
h1{font-size:22px;font-weight:800;margin-bottom:6px;}
.sub{font-size:13px;color:var(--br);margin-bottom:24px;line-height:1.6;}

/* 블렌딩 게임 */
.blend-section{background:#fff;border:2px solid var(--soft);border-radius:20px;padding:20px;margin-bottom:16px;}
.bs-title{font-size:14px;font-weight:800;margin-bottom:4px;}
.bs-sub{font-size:12px;color:var(--br);margin-bottom:16px;}

/* 소리 블렌더 */
.blender-wrap{text-align:center;margin-bottom:16px;}
.phoneme-row{display:flex;gap:10px;justify-content:center;margin-bottom:16px;flex-wrap:wrap;}
.ph-btn{width:70px;height:80px;border-radius:16px;background:#fff;border:2.5px solid var(--p);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;cursor:pointer;transition:all .2s;font-family:'Nunito',sans-serif;}
.ph-btn:hover{transform:scale(1.08);background:var(--pl);}
.ph-btn.active{background:var(--y);border-color:#d4a030;animation:pop .2s ease;}
.ph-btn.done{background:var(--gl);border-color:var(--g);}
.ph-letter{font-size:28px;font-weight:800;color:var(--p);}
.ph-ko{font-size:11px;color:var(--br);font-weight:700;}
.arrow-txt{font-size:24px;color:var(--soft);align-self:center;}
.result-box{min-height:64px;border:2px dashed var(--soft);border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:800;color:var(--dark);margin:0 auto;max-width:200px;transition:all .3s;padding:10px 20px;}
.result-box.show{border-color:var(--g);background:var(--gl);animation:pop .3s ease;}
@keyframes pop{0%{transform:scale(.9)}60%{transform:scale(1.05)}100%{transform:scale(1)}}

.blend-words{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-bottom:10px;}
.bw{padding:8px 18px;border-radius:14px;border:2px solid var(--soft);background:#fff;font-size:15px;font-weight:700;cursor:pointer;color:var(--dark);transition:all .2s;}
.bw:hover{border-color:var(--p);}
.bw.active-word{border-color:var(--p);background:var(--pl);color:var(--p);}

/* 드래그 단어 조립 */
.builder-section{background:#fff;border:2px solid var(--soft);border-radius:20px;padding:20px;margin-bottom:16px;}
.letter-pool{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px;min-height:52px;padding:8px;background:var(--warm);border-radius:12px;}
.letter-tile{width:48px;height:52px;border-radius:12px;background:var(--p);color:#fff;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:800;cursor:pointer;user-select:none;transition:all .2s;flex-shrink:0;}
.letter-tile:hover{transform:scale(1.1);}
.letter-tile.used{opacity:.3;pointer-events:none;}
.drop-zone{display:flex;gap:8px;min-height:60px;padding:8px;background:var(--gl);border-radius:12px;border:2px dashed var(--g);margin-bottom:10px;flex-wrap:wrap;}
.drop-tile{width:48px;height:52px;border-radius:12px;background:var(--g);color:#fff;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:800;cursor:pointer;user-select:none;}
.drop-tile:hover{background:#d96a47;}
.builder-target{font-size:14px;font-weight:800;color:var(--br);margin-bottom:8px;}
.builder-target span{color:var(--o);}
.check-btn{padding:10px 24px;border-radius:12px;background:var(--b);color:#fff;border:none;font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;cursor:pointer;margin-right:8px;}
.clear-btn{padding:10px 18px;border-radius:12px;background:var(--soft);color:var(--br);border:none;font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;cursor:pointer;}
.builder-fb{font-size:13px;font-weight:700;margin-top:8px;min-height:20px;}
.builder-next{display:none;padding:10px 24px;border-radius:12px;background:var(--g);color:#fff;border:none;font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;cursor:pointer;margin-top:8px;}

.done-btn{width:100%;padding:15px;border-radius:16px;background:var(--g);color:#fff;border:none;font-family:'Nunito',sans-serif;font-size:15px;font-weight:700;cursor:pointer;margin-top:8px;}
.done-msg{display:none;background:var(--gl);border-radius:14px;padding:14px;text-align:center;margin-top:10px;font-size:13px;font-weight:700;color:#1a5c3a;}
.done-msg.show{display:block;}
.nav-btns{display:flex;gap:10px;margin-top:12px;}
.nav-btn{flex:1;padding:12px;border-radius:14px;font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;cursor:pointer;text-align:center;text-decoration:none;}
.nav-btn.sec{border:2px solid var(--soft);background:#fff;color:var(--br);}
.nav-btn.pri{background:var(--p);color:#fff;border:none;}
@media(max-width:680px){.wrap{padding-left:20px;padding-right:20px;}}
</style>
</head>
<body>
<script>MommyAuth.guard('G1');
MommyAuth.checkLock('G1-U1-S05');</script>
<nav><a href="../../jp-index.html" class="logo">Mommy<span>Time</span></a><a href="../../jp-index.html" class="back">← Unit 1</a></nav>
<div class="wrap">
  <div class="step-badge">🔤 Step 5 / 10</div>
  <h1>Blending Practice</h1>
  <p class="sub">소리를 하나씩 눌러서 합쳐봐요! s + a + t = sat 🎉</p>

  <!-- 소리 블렌더 -->
  <div class="blend-section">
    <div class="bs-title">🔊 소리 블렌더</div>
    <div class="bs-sub">단어를 선택하고 글자를 하나씩 탭해봐요. 다 누르면 전체 단어가 나와요!</div>
    <div class="blend-words" id="blendWords"></div>
    <div class="blender-wrap">
      <div class="phoneme-row" id="phonemeRow"></div>
      <div class="result-box" id="resultBox">?</div>
    </div>
  </div>

  <!-- 단어 조립 -->
  <div class="builder-section">
    <div class="bs-title">🧩 단어 조립</div>
    <div class="bs-sub">글자 타일을 눌러서 단어를 만들어봐요!</div>
    <div class="builder-target" id="builderTarget">목표: <span>sat</span></div>
    <div class="drop-zone" id="dropZone"></div>
    <div class="letter-pool" id="letterPool"></div>
    <div>
      <button class="check-btn" onclick="checkBuilder()">✅ 확인</button>
      <button class="clear-btn" onclick="clearBuilder()">🗑 지우기</button>
    </div>
    <div class="builder-fb" id="builderFb"></div>
    <button class="builder-next" id="builderNext" onclick="nextBuilder()">다음 단어 →</button>
  </div>

  <button class="done-btn" onclick="markDone()">✅ Step 5 완료!</button>
  <div class="done-msg" id="doneMsg">🎉 블렌딩 마스터! Step 6으로 가요!</div>
    <div class="nav-btns">
    <a href="../../group-02/unit-01/jp-g2-u1-step04.html" class="nav-btn sec">← 📖 Word Cards</a>
    <a href="../../group-02/unit-01/jp-g2-u1-step06.html" class="nav-btn pri">📚 Decodable Story →</a>
  </div>
</div>
<script>
const BLEND_WORDS=[
  {word:'sat',phonemes:['s','a','t'],ko:['스','아','트']},
  {word:'ant',phonemes:['a','n','t'],ko:['아','은','트']},
  {word:'tap',phonemes:['t','a','p'],ko:['트','아','프']},
  {word:'nap',phonemes:['n','a','p'],ko:['은','아','프']},
  {word:'tan',phonemes:['t','a','n'],ko:['트','아','은']},
  {word:'mat',phonemes:['m','a','t'],ko:['므','아','트']},
];

const BUILDER_WORDS=['sat','tap','tan','nap','mat','ant'];
let bIdx=0;

// 블렌더
let currentBlendWord=BLEND_WORDS[0], tappedPhonemes=new Set();

function buildBlendWords(){
  const row=document.getElementById('blendWords');
  row.innerHTML='';
  BLEND_WORDS.forEach((w,i)=>{
    const btn=document.createElement('button');
    btn.className='bw'+(i===0?' active-word':'');
    btn.textContent=w.word;
    btn.onclick=()=>selectBlendWord(i,btn);
    row.appendChild(btn);
  });
}

function selectBlendWord(i,btn){
  document.querySelectorAll('.bw').forEach(b=>b.classList.remove('active-word'));
  btn.classList.add('active-word');
  currentBlendWord=BLEND_WORDS[i];
  tappedPhonemes=new Set();
  buildPhonemeRow();
  document.getElementById('resultBox').textContent='?';
  document.getElementById('resultBox').classList.remove('show');
}

function buildPhonemeRow(){
  const row=document.getElementById('phonemeRow');
  row.innerHTML='';
  currentBlendWord.phonemes.forEach((ph,i)=>{
    const btn=document.createElement('button');
    btn.className='ph-btn';
    btn.id='phbtn'+i;
    btn.innerHTML=`<span class="ph-letter">${ph}</span><span class="ph-ko">${currentBlendWord.ko[i]}</span>`;
    btn.onclick=()=>tapPhoneme(i,btn);
    row.appendChild(btn);
    if(i<currentBlendWord.phonemes.length-1){
      const arr=document.createElement('div');arr.className='arrow-txt';arr.textContent='+';
      row.appendChild(arr);
    }
  });
}

function tapPhoneme(i,btn){
  if(tappedPhonemes.has(i))return;
  tappedPhonemes.add(i);
  btn.classList.add('active');
  // TTS
  const u=new SpeechSynthesisUtterance(currentBlendWord.ko[i]);
  u.lang='ko-KR';u.rate=0.6;
  const vs=window.speechSynthesis.getVoices();
  const v=vs.find(v=>v.lang.startsWith('ko'))||null;
  if(v)u.voice=v;
  u.onend=()=>{
    btn.classList.remove('active');btn.classList.add('done');
    if(tappedPhonemes.size===currentBlendWord.phonemes.length){
      setTimeout(()=>{
        const rb=document.getElementById('resultBox');
        rb.textContent=currentBlendWord.word;rb.classList.add('show');
        const wu=new SpeechSynthesisUtterance(currentBlendWord.word);
        wu.lang='en-GB';wu.rate=0.75;
        const wvs=window.speechSynthesis.getVoices();
        const wv=wvs.find(v=>v.lang==='en-GB'||v.lang.startsWith('en'))||null;
        if(wv)wu.voice=wv;
        window.speechSynthesis.speak(wu);
      },300);
    }
  };
  window.speechSynthesis.speak(u);
}

// 단어 조립
function buildBuilderWord(){
  const target=BUILDER_WORDS[bIdx];
  document.getElementById('builderTarget').innerHTML='목표: <span>'+target+'</span>';
  document.getElementById('dropZone').innerHTML='';
  document.getElementById('builderFb').textContent='';
  document.getElementById('builderNext').style.display='none';

  const pool=document.getElementById('letterPool');
  pool.innerHTML='';
  // 타일 섞기 (필요 글자 + 1~2개 방해 글자)
  const distractors=['x','z','q','v','w'];
  const letters=[...target,...distractors.slice(0,2)].sort(()=>Math.random()-.5);
  letters.forEach(l=>{
    const tile=document.createElement('div');
    tile.className='letter-tile';tile.dataset.letter=l;
    tile.textContent=l;
    tile.onclick=()=>addToZone(tile);
    pool.appendChild(tile);
  });
}

function addToZone(tile){
  if(tile.classList.contains('used'))return;
  tile.classList.add('used');
  const zone=document.getElementById('dropZone');
  const drop=document.createElement('div');
  drop.className='drop-tile';drop.dataset.letter=tile.dataset.letter;
  drop.dataset.srcId=tile.dataset.letter+Math.random();
  drop.textContent=tile.dataset.letter;
  drop.onclick=()=>{
    // 되돌리기
    tile.classList.remove('used');
    zone.removeChild(drop);
  };
  zone.appendChild(drop);
}

function checkBuilder(){
  const target=BUILDER_WORDS[bIdx];
  const zone=document.getElementById('dropZone');
  const built=[...zone.children].map(c=>c.dataset.letter).join('');
  const fb=document.getElementById('builderFb');
  if(built===target){
    fb.innerHTML='🎉 <strong style="color:var(--g)">'+target+'</strong> 완성! 잘했어요!';
    document.getElementById('builderNext').style.display='inline-block';
    // TTS
    const u=new SpeechSynthesisUtterance(target);u.lang='en-GB';u.rate=0.8;
    const vs=window.speechSynthesis.getVoices();const v=vs.find(v=>v.lang==='en-GB'||v.lang.startsWith('en'))||null;
    if(v)u.voice=v;window.speechSynthesis.speak(u);
  } else {
    fb.innerHTML='🤔 다시 해봐요! 목표: <strong>'+target+'</strong>';
  }
}

function clearBuilder(){
  const zone=document.getElementById('dropZone');
  [...zone.children].forEach(drop=>{
    // 풀에서 해당 타일 다시 활성화
    const tiles=document.querySelectorAll('.letter-tile');
    for(let t of tiles){
      if(t.dataset.letter===drop.dataset.letter&&t.classList.contains('used')){
        t.classList.remove('used');break;
      }
    }
  });
  zone.innerHTML='';
  document.getElementById('builderFb').textContent='';
  document.getElementById('builderNext').style.display='none';
}

function nextBuilder(){
  bIdx=(bIdx+1)%BUILDER_WORDS.length;
  buildBuilderWord();
}

buildBlendWords();buildPhonemeRow();buildBuilderWord();
window.speechSynthesis.onvoiceschanged=()=>window.speechSynthesis.getVoices();

function markDone(){
  const done=new Set(JSON.parse(localStorage.getItem('jp_g1_u1_done')||'[]'));
  done.add(5);localStorage.setItem('jp_g1_u1_done',JSON.stringify([...done]));
  MommyAuth.logProgress('G1-U1-S05');
  document.getElementById('doneMsg').classList.add('show');
  document.querySelector('.done-btn').disabled=true;document.querySelector('.done-btn').style.opacity='.6';
}
const d=new Set(JSON.parse(localStorage.getItem('jp_g1_u1_done')||'[]'));
if(d.has(5)){document.getElementById('doneMsg').classList.add('show');document.querySelector('.done-btn').disabled=true;document.querySelector('.done-btn').style.opacity='.6';}
</script>
<script>
// ══════════════════════════════════════════
//  Unit LNB (Left Navigation Bar)
//  모든 Step 파일에서 공통으로 사용
// ══════════════════════════════════════════

const LNB_STEPS = [
  { num:1,  icon:'🔊', title:'Sound Intro',       short:'소리 만나기' },
  { num:2,  icon:'✍️', title:'Letter Formation',  short:'글자 쓰기' },
  { num:3,  icon:'👂', title:'Sound Discrimination', short:'소리 구별' },
  { num:4,  icon:'📖', title:'Word Cards',         short:'단어 카드' },
  { num:5,  icon:'🔤', title:'Blending',           short:'소리 합치기' },
  { num:6,  icon:'📚', title:'Decodable Story',    short:'스토리 읽기' },
  { num:7,  icon:'⭐', title:'Tricky Words',       short:'트리키 워드' },
  { num:8,  icon:'🎮', title:'Games',              short:'게임' },
  { num:9,  icon:'💬', title:'Talk Together',      short:'함께 대화' },
  { num:10, icon:'📔', title:'My Journal',         short:'나의 저널' },
];

const DONE_KEY = 'jp_g1_u1_done';

function getLNBDone() {
  return new Set(JSON.parse(localStorage.getItem(DONE_KEY) || '[]'));
}

// 현재 step 번호 파악
function getCurrentStep() {
  const path = window.location.pathname;
  const match = path.match(/step-(\d+)\.html/);
  return match ? parseInt(match[1]) : 0;
}

// LNB CSS 주입
function injectLNBStyle() {
  const style = document.createElement('style');
  style.textContent = `
    /* ── LNB 레이아웃 ── */
    body { overflow-x: hidden; }

    /* 기존 nav 조정 */
    nav { left: 0; z-index: 200; }

    /* LNB 사이드바 */
    #unitLNB {
      position: fixed;
      top: 56px; /* nav 높이 */
      left: 0;
      width: 220px;
      height: calc(100vh - 56px);
      background: #FEFCFF;
      border-right: 2px solid #D8C8F0;
      overflow-y: auto;
      z-index: 150;
      padding: 16px 0 32px;
      transition: transform .3s ease;
    }

    /* LNB 헤더 */
    .lnb-header {
      padding: 0 16px 12px;
      border-bottom: 1px solid var(--soft);
      margin-bottom: 8px;
    }
    .lnb-unit-label {
      font-size: 10px; font-weight: 700; color: var(--br);
      text-transform: uppercase; letter-spacing: .08em; margin-bottom: 4px;
    }
    .lnb-unit-title {
      font-size: 16px; font-weight: 800; color: #7040B8;
    }
    .lnb-progress {
      margin-top: 8px;
    }
    .lnb-prog-track {
      background: #E0D0FF; border-radius: 6px; height: 6px; overflow: hidden;
    }
    .lnb-prog-fill {
      height: 100%; background: #7040B8; border-radius: 6px; transition: width .4s;
    }
    .lnb-prog-txt {
      font-size: 10px; color: var(--br); font-weight: 700; margin-top: 3px;
    }

    /* LNB 아이템 */
    .lnb-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 16px; cursor: pointer;
      text-decoration: none; color: var(--dark);
      border-left: 3px solid transparent;
      transition: all .15s;
      font-size: 13px; font-weight: 600;
      position: relative;
    }
    .lnb-item:hover {
      background: #F5EEFF; border-left-color: #C0A0EE;
    }
    .lnb-item.active {
      background: #E8D8FF;
      border-left-color: #7040B8;
      color: #5A28A0;
      font-weight: 800;
    }
    .lnb-item.done {
      color: var(--g);
    }
    .lnb-item.done .lnb-check {
      display: flex;
    }
    .lnb-num {
      width: 26px; height: 26px; border-radius: 8px;
      background: #EDE0FF; color: #7040B8;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 800; flex-shrink: 0;
      transition: all .15s;
    }
    .lnb-item.active .lnb-num {
      background: #7040B8; color: #fff;
    }
    .lnb-item.done .lnb-num {
      background: #2D9E68; color: #fff;
    }
    .lnb-icon { font-size: 14px; flex-shrink: 0; }
    .lnb-text { flex: 1; }
    .lnb-title { display: block; font-size: 12px; font-weight: 700; line-height: 1.2; }
    .lnb-short { display: block; font-size: 10px; opacity: .65; margin-top: 1px; }
    .lnb-check {
      display: none; width: 18px; height: 18px; border-radius: 50%;
      background: var(--g); color: #fff;
      align-items: center; justify-content: center; font-size: 10px; flex-shrink: 0;
    }

    /* 콘텐츠 영역 밀기 */
    #lnbContentShift {
      margin-left: 220px;
      transition: margin-left .3s;
    }

    /* 모바일 토글 버튼 */
    #lnbToggle {
      display: none;
      position: fixed;
      bottom: 20px; right: 20px;
      width: 52px; height: 52px;
      border-radius: 50%;
      background: var(--p); color: #fff;
      border: none; font-size: 20px;
      cursor: pointer; z-index: 300;
      box-shadow: 0 4px 16px rgba(155,114,207,.4);
    }

    /* 모바일 오버레이 */
    #lnbOverlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,.3);
      z-index: 140;
    }
    #lnbOverlay.show { display: block; }

    /* 모바일 */
    @media (max-width: 768px) {
      #unitLNB {
        transform: translateX(-100%);
        top: 0; height: 100vh;
        padding-top: 72px;
        box-shadow: 4px 0 24px rgba(0,0,0,.12);
      }
      #unitLNB.open { transform: translateX(0); }
      #lnbContentShift { margin-left: 0 !important; }
      #lnbToggle { display: flex; align-items: center; justify-content: center; }
    }
  `;
  document.head.appendChild(style);
}

// LNB HTML 생성
function buildLNB() {
  const currentStep = getCurrentStep();
  const done = getLNBDone();

  // LNB 사이드바
  const lnb = document.createElement('div');
  lnb.id = 'unitLNB';

  // 헤더
  const pct = Math.round(done.size / LNB_STEPS.length * 100);
  lnb.innerHTML = `
    <div class="lnb-header">
      <div class="lnb-unit-label">Group 1 · Unit 1</div>
      <div class="lnb-unit-title">s, a, t</div>
      <div class="lnb-progress">
        <div class="lnb-prog-track">
          <div class="lnb-prog-fill" style="width:${pct}%"></div>
        </div>
        <div class="lnb-prog-txt">${done.size} / ${LNB_STEPS.length} 완료</div>
      </div>
    </div>`;

  // Step 목록
  LNB_STEPS.forEach(s => {
    const isDone = done.has(s.num);
    const isActive = s.num === currentStep;
    const a = document.createElement('a');
    a.href = `step-${String(s.num).padStart(2,'0')}.html`;
    a.className = 'lnb-item' + (isActive ? ' active' : '') + (isDone ? ' done' : '');
    a.innerHTML = `
      <div class="lnb-num">${isDone ? '✓' : s.num}</div>
      <span class="lnb-icon">${s.icon}</span>
      <span class="lnb-text">
        <span class="lnb-title">${s.title}</span>
        <span class="lnb-short">${s.short}</span>
      </span>
      <div class="lnb-check">✓</div>`;
    lnb.appendChild(a);
  });

  document.body.appendChild(lnb);

  // 오버레이 (모바일)
  const overlay = document.createElement('div');
  overlay.id = 'lnbOverlay';
  overlay.onclick = closeLNB;
  document.body.appendChild(overlay);

  // 토글 버튼 (모바일)
  const toggle = document.createElement('button');
  toggle.id = 'lnbToggle';
  toggle.innerHTML = '☰';
  toggle.onclick = toggleLNB;
  document.body.appendChild(toggle);
}

// 기존 콘텐츠에 margin-left 적용
function shiftContent() {
  // nav는 이미 fixed라 영향 없음
  // wrap 또는 body의 직접 자식 div들에 margin 적용
  const wrap = document.querySelector('.wrap') || document.querySelector('main');
  if (wrap) {
    wrap.id = wrap.id || 'lnbContentShift';
    wrap.style.marginLeft = '220px';
    wrap.style.transition = 'margin-left .3s';
  }

  // 모바일에서는 margin 제거
  function applyMobile() {
    if (window.innerWidth <= 768) {
      if (wrap) wrap.style.marginLeft = '0';
    } else {
      if (wrap) wrap.style.marginLeft = '220px';
    }
  }
  applyMobile();
  window.addEventListener('resize', applyMobile);
}

function toggleLNB() {
  const lnb = document.getElementById('unitLNB');
  const overlay = document.getElementById('lnbOverlay');
  const toggle = document.getElementById('lnbToggle');
  const isOpen = lnb.classList.contains('open');
  lnb.classList.toggle('open', !isOpen);
  overlay.classList.toggle('show', !isOpen);
  toggle.innerHTML = isOpen ? '☰' : '✕';
}

function closeLNB() {
  document.getElementById('unitLNB')?.classList.remove('open');
  document.getElementById('lnbOverlay')?.classList.remove('show');
  document.getElementById('lnbToggle').innerHTML = '☰';
}

// 초기화
function initLNB() {
  injectLNBStyle();
  buildLNB();
  shiftContent();
}

// DOM 준비 후 실행
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', initLNB);
} else {
  initLNB();
}

</script>
</body>
</html>
