<script>
var ST=[
  {"title":"A Fox in a Box","lines":[{"text":"A fox sat in a big box.","ko":"여우가 큰 상자 안에 앉았어요."},{"text":"The fox had a pot of jam.","ko":"여우는 잼 한 통을 가졌어요."},{"text":"A van came to the fox.","ko":"밴이 여우에게 왔어요."},{"text":"The van had six big boxes.","ko":"밴에는 큰 상자 6개가 있었어요."},{"text":"The fox mixed all the jam!","ko":"여우가 잼을 모두 섞었어요!"}],"targets":["fox", "box", "jam", "van", "six"]},
  {"title":"Jet the Vet","lines":[{"text":"Jet is a vet.","ko":"젯은 수의사예요."},{"text":"Jet helps animals.","ko":"젯은 동물들을 도와요."},{"text":"A fox came to the vet.","ko":"여우가 수의사에게 왔어요."},{"text":"Jet gave the fox a jug of mix.","ko":"젯이 여우에게 믹스 한 통을 줬어요."},{"text":"The fox got better!","ko":"여우가 나아졌어요!"}],"targets":["jet", "vet", "fox", "jug", "mix"]},
  {"title":"Six Jars of Jam","lines":[{"text":"Mum had six jars of jam.","ko":"엄마는 잼 6통이 있어요."},{"text":"The jam was in the van.","ko":"잼은 밴 안에 있었어요."},{"text":"A fox ran to the van.","ko":"여우가 밴으로 달려갔어요."},{"text":"The fox got a jar of jam.","ko":"여우가 잼 한 통을 가져갔어요."},{"text":"Now mum has five jars!","ko":"이제 엄마는 5통만 남았어요!"}],"targets":["six", "jam", "van", "fox"]},
  {"title":"The Wax Fox","lines":[{"text":"A boy made a fox from wax.","ko":"한 남자아이가 밀랍으로 여우를 만들었어요."},{"text":"The wax fox was very big.","ko":"밀랍 여우는 아주 컸어요."},{"text":"He put the wax fox in a box.","ko":"상자에 밀랍 여우를 넣었어요."},{"text":"The box was on the van.","ko":"상자는 밴 위에 있었어요."},{"text":"What a wax fox in a box!","ko":"상자 안의 밀랍 여우야!"}],"targets":["wax", "fox", "box", "van"]},
  {"title":"Jump and Jog","lines":[{"text":"Jen can jump and jog.","ko":"젠은 점프하고 조깅할 수 있어요."},{"text":"Jen jogs to the vet.","ko":"젠이 수의사에게 조깅해서 갔어요."},{"text":"A fox jumps out of a box.","ko":"여우가 상자에서 뛰어나왔어요."},{"text":"Jen and the fox jog and jog.","ko":"젠과 여우가 함께 조깅했어요."},{"text":"They jog past the van.","ko":"그들은 밴을 지나쳐 달렸어요."}],"targets":["jump", "jog", "fox", "box", "van"]},
];
var cur=0,prog=JSON.parse(localStorage.getItem('jp_g1_u7_s6')||'[]');
function spk(t){window.speechSynthesis.cancel();var u=new SpeechSynthesisUtterance(t);u.lang='en-GB';u.rate=0.78;var vs=window.speechSynthesis.getVoices();var v=vs.find(function(v){return v.lang==='en-GB';})||vs.find(function(v){return v.lang.startsWith('en');})||null;if(v)u.voice=v;window.speechSynthesis.speak(u);}
function bTabs(){var t=document.getElementById('stabs');t.innerHTML='';ST.forEach(function(s,i){var b=document.createElement('button');b.className='stab'+(i===cur?' on':'')+(prog.indexOf(i)>=0?' dn':'');b.textContent=(prog.indexOf(i)>=0?'✓ ':'')+'Story '+(i+1);b.onclick=(function(n){return function(){loadS(n);};})(i);t.appendChild(b);});}
function loadS(idx){
  cur=idx;var s=ST[idx];var found=new Set();var tgts=new Set(s.targets.map(function(w){return w.toLowerCase();}));
  document.getElementById('sHdr').textContent='📖 Story '+(idx+1)+': '+s.title;
  document.getElementById('mTxt').innerHTML='<strong>'+s.targets.join(' · ')+'</strong> 를 모두 찾아요!';
  document.getElementById('tc').textContent=s.targets.length;
  document.getElementById('fc').textContent='0';
  var ch=document.getElementById('chips');ch.innerHTML='';
  s.targets.forEach(function(w){var c=document.createElement('div');c.style.cssText='padding:5px 14px;background:#fff;border-radius:10px;font-size:13px;font-weight:700;color:#8B6F00;border:2px solid var(--y);transition:all .3s;';c.id='c-'+idx+'-'+w;c.textContent=w;ch.appendChild(c);});
  document.getElementById('cBanner').style.display='none';
  document.getElementById('nxtBtn').style.display='none';
  var body=document.getElementById('sBody');body.innerHTML='';
  s.lines.forEach(function(line){
    var div=document.createElement('div');div.style.marginBottom='14px';
    var btn=document.createElement('button');
    btn.style.cssText='display:inline-flex;align-items:center;gap:4px;background:#F4845F;color:#fff;border:none;border-radius:8px;padding:5px 12px;font-family:Nunito,sans-serif;font-size:12px;font-weight:700;cursor:pointer;margin-bottom:6px;';
    btn.textContent='🔊 읽기';
    (function(txt,b){
      b.onclick=function(){
        b.style.background='var(--o)';spk(txt);
        setTimeout(function(){b.style.background='#F4845F';},2000);
      };
    })(line.text,btn);
    div.appendChild(btn);
    var sd=document.createElement('div');sd.style.cssText='font-size:17px;font-weight:700;line-height:2.4;';
    line.text.split(' ').forEach(function(word){
      var clean=word.replace(/[.,!?']/g,'').toLowerCase();
      var isTgt=tgts.has(clean);
      var sp=document.createElement('span');
      sp.style.cssText='cursor:pointer;padding:1px 4px;border-radius:4px;transition:all .2s;display:inline-block;'+(isTgt?'border-bottom:2px dashed #F4845F88;':'');
      sp.textContent=word;
      if(isTgt){
        (function(span,w){
          span.onclick=function(){
            if(span.dataset.m)return;span.dataset.m='1';
            span.style.background='#F4845F';span.style.color='#fff';span.style.borderBottom='none';
            spk(w);found.add(w);
            var chip=document.getElementById('c-'+idx+'-'+w);
            if(chip){chip.style.background='#F4845F';chip.style.color='#fff';chip.style.borderColor='#F4845F';}
            document.getElementById('fc').textContent=found.size;
            if(found.size>=s.targets.length){
              document.getElementById('cBanner').style.display='block';
              var msg='🎉 Story '+(idx+1)+' 완료! ';
              if(idx<ST.length-1){msg+='다음 스토리로!';document.getElementById('nxtBtn').style.display='inline-block';}
              else{msg+='5편 모두 읽었어요! 🏆';document.getElementById('allDone').style.display='block';}
              document.getElementById('cMsg').textContent=msg;
              if(prog.indexOf(idx)<0){prog.push(idx);localStorage.setItem('jp_g1_u7_s6',JSON.stringify(prog));}
              bTabs();
            }
          };
        })(sp,clean);
      }else{
        sp.onclick=function(){sp.style.background='#FCEBEB';setTimeout(function(){sp.style.background='';},350);};
      }
      sd.appendChild(sp);sd.appendChild(document.createTextNode(' '));
    });
    div.appendChild(sd);
    var ko=document.createElement('div');ko.style.cssText='font-size:12px;color:var(--br);margin-top:2px;';ko.textContent=line.ko;div.appendChild(ko);body.appendChild(div);
  });
  bTabs();
}
function nxtStory(){if(cur<ST.length-1)loadS(cur+1);}
function markDone(){
  var done=new Set(JSON.parse(localStorage.getItem('jp_g1_u7_done')||'[]'));
  done.add(6);localStorage.setItem('jp_g1_u7_done',JSON.stringify([...done]));
  document.getElementById('doneMsg').classList.add('show');
  document.querySelector('.done-btn').disabled=true;document.querySelector('.done-btn').style.opacity='.6';
  MommyAuth.logProgress('G1-U7-S06');
}
var _d=new Set(JSON.parse(localStorage.getItem('jp_g1_u7_done')||'[]'));
if(_d.has(6)){document.getElementById('doneMsg').classList.add('show');document.querySelector('.done-btn').disabled=true;document.querySelector('.done-btn').style.opacity='.6';}
loadS(0);
window.speechSynthesis.onvoiceschanged=function(){window.speechSynthesis.getVoices();};
</script>
<script>// ══════════════════════════════════════════
//  Unit LNB (Left Navigation Bar)
//  모든 Step 파일에서 공통으로 사용
// ══════════════════════════════════════════

const LNB_STEPS = [
  { num:1,  icon:'🔊', title:'Sound Intro',       short:'소리 만나기' },
  { num:2,  icon:'✍️', title:'Letter Formation',  short:'글자 쓰기' },
  { num:3,  icon:'👂', title:'Sound Discrimination', short:'소리 구별' },
  { num:4,  icon:'📖', title:'Word Cards',         short:'단어 카드' },
  { num:5,  icon:'🔤', title:'Blending',           short:'소리 합치기' },
  { num:6,  icon:'📚', title:'Decodable Story',    short:'스토리 읽기' },
  { num:7,  icon:'⭐', title:'Tricky Words',       short:'트리키 워드' },
  { num:8,  icon:'🎮', title:'Games',              short:'게임' },
  { num:9,  icon:'💬', title:'Talk Together',      short:'함께 대화' },
  { num:10, icon:'📔', title:'My Journal',         short:'나의 저널' },
];

const DONE_KEY = 'jp_g1_u7_done';

function getLNBDone() {
  return new Set(JSON.parse(localStorage.getItem(DONE_KEY) || '[]'));
}

// 현재 step 번호 파악
function getCurrentStep() {
  const path = window.location.pathname;
  const match = path.match(/step-(\d+)\.html/);
  return match ? parseInt(match[1]) : 0;
}

// LNB CSS 주입
function injectLNBStyle() {
  const style = document.createElement('style');
  style.textContent = `
    /* ── LNB 레이아웃 ── */
    body { overflow-x: hidden; }

    /* 기존 nav 조정 */
    nav { left: 0; z-index: 200; }

    /* LNB 사이드바 */
    #unitLNB {
      position: fixed;
      top: 56px; /* nav 높이 */
      left: 0;
      width: 220px;
      height: calc(100vh - 56px);
      background: #FEFCFF;
      border-right: 2px solid #D8C8F0;
      overflow-y: auto;
      z-index: 150;
      padding: 16px 0 32px;
      transition: transform .3s ease;
    }

    /* LNB 헤더 */
    .lnb-header {
      padding: 0 16px 12px;
      border-bottom: 1px solid var(--soft);
      margin-bottom: 8px;
    }
    .lnb-unit-label {
      font-size: 10px; font-weight: 700; color: var(--br);
      text-transform: uppercase; letter-spacing: .08em; margin-bottom: 4px;
    }
    .lnb-unit-title {
      font-size: 16px; font-weight: 800; color: #7040B8;
    }
    .lnb-progress {
      margin-top: 8px;
    }
    .lnb-prog-track {
      background: #E0D0FF; border-radius: 6px; height: 6px; overflow: hidden;
    }
    .lnb-prog-fill {
      height: 100%; background: #7040B8; border-radius: 6px; transition: width .4s;
    }
    .lnb-prog-txt {
      font-size: 10px; color: var(--br); font-weight: 700; margin-top: 3px;
    }

    /* LNB 아이템 */
    .lnb-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 16px; cursor: pointer;
      text-decoration: none; color: var(--dark);
      border-left: 3px solid transparent;
      transition: all .15s;
      font-size: 13px; font-weight: 600;
      position: relative;
    }
    .lnb-item:hover {
      background: #F5EEFF; border-left-color: #C0A0EE;
    }
    .lnb-item.active {
      background: #E8D8FF;
      border-left-color: #7040B8;
      color: #5A28A0;
      font-weight: 800;
    }
    .lnb-item.done {
      color: var(--g);
    }
    .lnb-item.done .lnb-check {
      display: flex;
    }
    .lnb-num {
      width: 26px; height: 26px; border-radius: 8px;
      background: #EDE0FF; color: #7040B8;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 800; flex-shrink: 0;
      transition: all .15s;
    }
    .lnb-item.active .lnb-num {
      background: #7040B8; color: #fff;
    }
    .lnb-item.done .lnb-num {
      background: #2D9E68; color: #fff;
    }
    .lnb-icon { font-size: 14px; flex-shrink: 0; }
    .lnb-text { flex: 1; }
    .lnb-title { display: block; font-size: 12px; font-weight: 700; line-height: 1.2; }
    .lnb-short { display: block; font-size: 10px; opacity: .65; margin-top: 1px; }
    .lnb-check {
      display: none; width: 18px; height: 18px; border-radius: 50%;
      background: var(--g); color: #fff;
      align-items: center; justify-content: center; font-size: 10px; flex-shrink: 0;
    }

    /* 콘텐츠 영역 밀기 */
    #lnbContentShift {
      margin-left: 220px;
      transition: margin-left .3s;
    }

    /* 모바일 토글 버튼 */
    #lnbToggle {
      display: none;
      position: fixed;
      bottom: 20px; right: 20px;
      width: 52px; height: 52px;
      border-radius: 50%;
      background: var(--p); color: #fff;
      border: none; font-size: 20px;
      cursor: pointer; z-index: 300;
      box-shadow: 0 4px 16px rgba(155,114,207,.4);
    }

    /* 모바일 오버레이 */
    #lnbOverlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,.3);
      z-index: 140;
    }
    #lnbOverlay.show { display: block; }

    /* 모바일 */
    @media (max-width: 768px) {
      #unitLNB {
        transform: translateX(-100%);
        top: 0; height: 100vh;
        padding-top: 72px;
        box-shadow: 4px 0 24px rgba(0,0,0,.12);
      }
      #unitLNB.open { transform: translateX(0); }
      #lnbContentShift { margin-left: 0 !important; }
      #lnbToggle { display: flex; align-items: center; justify-content: center; }
    }
  `;
  document.head.appendChild(style);
}

// LNB HTML 생성
function buildLNB() {
  const currentStep = getCurrentStep();
  const done = getLNBDone();

  // LNB 사이드바
  const lnb = document.createElement('div');
  lnb.id = 'unitLNB';

  // 헤더
  const pct = Math.round(done.size / LNB_STEPS.length * 100);
  lnb.innerHTML = `
    <div class="lnb-header">
      <div class="lnb-unit-label">Group 1 · Unit 7</div>
      <div class="lnb-unit-title">j, v, x</div>
      <div class="lnb-progress">
        <div class="lnb-prog-track">
          <div class="lnb-prog-fill" style="width:${pct}%"></div>
        </div>
        <div class="lnb-prog-txt">${done.size} / ${LNB_STEPS.length} 완료</div>
      </div>
    </div>`;

  // Step 목록
  LNB_STEPS.forEach(s => {
    const isDone = done.has(s.num);
    const isActive = s.num === currentStep;
    const a = document.createElement('a');
    a.href = `step-${String(s.num).padStart(2,'0')}.html`;
    a.className = 'lnb-item' + (isActive ? ' active' : '') + (isDone ? ' done' : '');
    a.innerHTML = `
      <div class="lnb-num">${isDone ? '✓' : s.num}</div>
      <span class="lnb-icon">${s.icon}</span>
      <span class="lnb-text">
        <span class="lnb-title">${s.title}</span>
        <span class="lnb-short">${s.short}</span>
      </span>
      <div class="lnb-check">✓</div>`;
    lnb.appendChild(a);
  });

  document.body.appendChild(lnb);

  // 오버레이 (모바일)
  const overlay = document.createElement('div');
  overlay.id = 'lnbOverlay';
  overlay.onclick = closeLNB;
  document.body.appendChild(overlay);

  // 토글 버튼 (모바일)
  const toggle = document.createElement('button');
  toggle.id = 'lnbToggle';
  toggle.innerHTML = '☰';
  toggle.onclick = toggleLNB;
  document.body.appendChild(toggle);
}

// 기존 콘텐츠에 margin-left 적용
function shiftContent() {
  // nav는 이미 fixed라 영향 없음
  // wrap 또는 body의 직접 자식 div들에 margin 적용
  const wrap = document.querySelector('.wrap') || document.querySelector('main');
  if (wrap) {
    wrap.id = wrap.id || 'lnbContentShift';
    wrap.style.marginLeft = '220px';
    wrap.style.transition = 'margin-left .3s';
  }

  // 모바일에서는 margin 제거
  function applyMobile() {
    if (window.innerWidth <= 768) {
      if (wrap) wrap.style.marginLeft = '0';
    } else {
      if (wrap) wrap.style.marginLeft = '220px';
    }
  }
  applyMobile();
  window.addEventListener('resize', applyMobile);
}

function toggleLNB() {
  const lnb = document.getElementById('unitLNB');
  const overlay = document.getElementById('lnbOverlay');
  const toggle = document.getElementById('lnbToggle');
  const isOpen = lnb.classList.contains('open');
  lnb.classList.toggle('open', !isOpen);
  overlay.classList.toggle('show', !isOpen);
  toggle.innerHTML = isOpen ? '☰' : '✕';
}

function closeLNB() {
  document.getElementById('unitLNB')?.classList.remove('open');
  document.getElementById('lnbOverlay')?.classList.remove('show');
  document.getElementById('lnbToggle').innerHTML = '☰';
}

// 초기화
function initLNB() {
  injectLNBStyle();
  buildLNB();
  shiftContent();
}

// DOM 준비 후 실행
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', initLNB);
} else {
  initLNB();
}
</script>
</body></html>
