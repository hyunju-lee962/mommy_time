<!DOCTYPE html>
<html lang="en">
<head>
<script src="../../../../assets/js/auth.js"></script>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Step 7 Tricky Words — j,v,x | G1 U7 | Mommy Time</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{{--g:#52B788;--gl:#E8F8EF;--y:#F9C74F;--yl:#FFFBEC;--o:#F4845F;--ol:#FFF0EB;--b:#5BA4CF;--bl:#EBF4FF;--p:#9B72CF;--pl:#F3EEFF;--cream:#FFFDF8;--dark:#2C2016;--br:#8B6F5E;--soft:#EAE0D5;}}
*{{margin:0;padding:0;box-sizing:border-box;}}
body{{background:var(--cream);color:var(--dark);font-family:'Nunito',sans-serif;}}
nav{{position:fixed;top:0;width:100%;z-index:100;padding:13px 36px;display:flex;align-items:center;justify-content:space-between;background:rgba(255,253,248,.95);backdrop-filter:blur(14px);border-bottom:2px solid var(--soft);}}
.logo{{font-size:16px;font-weight:800;color:var(--dark);text-decoration:none;}}.logo span{{color:var(--o);}}
.back{{font-size:13px;color:var(--br);text-decoration:none;font-weight:700;padding:6px 14px;border:1.5px solid var(--soft);border-radius:10px;background:#fff;}}
.wrap{{max-width:720px;margin:0 auto;padding:82px 36px 80px;}}
.card{{background:#fff;border:2px solid #F4845F44;border-radius:20px;padding:22px;margin-bottom:18px;box-shadow:0 2px 8px rgba(0,0,0,.05);}}
.card-title{{font-size:15px;font-weight:800;color:#F4845F;margin-bottom:12px;display:flex;align-items:center;gap:6px;padding-bottom:10px;border-bottom:1.5px solid var(--soft);}}
.tw-card{{background:#fff;border:2px solid #F4845F22;border-radius:14px;padding:16px;margin-bottom:12px;}}
.step-row{{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px;}}
.step-btn{{padding:9px 14px;border-radius:10px;border:1.5px solid var(--soft);background:#fff;font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;}}
.step-btn:hover{{background:#FFF0EB;}}
.write-inp{{border:2px solid #F4845F44;border-radius:10px;padding:9px 14px;font-family:'Nunito',sans-serif;font-size:16px;font-weight:700;width:150px;outline:none;text-align:center;}}
.write-inp:focus{{border-color:#F4845F;}}
.result{{font-size:13px;font-weight:700;min-height:20px;margin-top:6px;}}
.done-btn{{width:100%;padding:15px;border-radius:16px;color:#fff;border:none;font-family:'Nunito',sans-serif;font-size:15px;font-weight:700;cursor:pointer;background:#F4845F;margin-top:4px;}}
.done-msg{{display:none;background:#FFF0EB;border:1.5px solid #F4845F88;border-radius:14px;padding:14px;text-align:center;margin-top:10px;font-size:14px;font-weight:700;color:#8B3000;}}
.done-msg.show{{display:block;}}
.nav-btns{{display:flex;gap:10px;margin-top:14px;padding-top:14px;border-top:1.5px solid var(--soft);}}
.nav-btn{{flex:1;padding:11px;border-radius:12px;font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;cursor:pointer;text-align:center;text-decoration:none;}}
.nav-btn.sec{{border:1.5px solid var(--soft);background:#fff;color:var(--br);}}
.nav-btn.pri{{color:#fff;border:none;background:#F4845F;}}
@media(max-width:680px){{.wrap{{padding-left:20px;padding-right:20px;}}}}
</style>
</head>
<body>
<script>MommyAuth.guard('G1');
MommyAuth.checkLock('G1-U7-S07');</script>
<nav><a href="../../../../index.html" class="logo">Mommy<span>Time</span></a>
<a href="jp-g1-u7-index.html" class="back">← Unit 7</a></nav>

<div class="wrap">
  <div style="display:inline-flex;align-items:center;gap:6px;background:#FFF0EB;color:#F4845F;border:1.5px solid #F4845F88;border-radius:20px;padding:6px 16px;font-size:13px;font-weight:700;margin-bottom:14px;">⭐ Step 7 / 10</div>
  <h1 style="font-size:24px;font-weight:800;margin-bottom:8px;">Tricky Words</h1>
  <p style="font-size:14px;color:var(--br);margin-bottom:22px;line-height:1.7;">파닉스 규칙이 잘 안 맞는 특별한 단어들이에요.<br>Look · Say · Cover · Write · Check! 🌟</p>

  <div class="card">
    <div class="card-title">⭐ Look · Say · Cover · Write · Check</div>
    <div id="twCards"></div>
  </div>

  <div class="card">
    <div class="card-title">🔍 문장에서 찾기</div>
    <p style="font-size:13px;color:var(--br);margin-bottom:14px;">문장에서 Tricky Word를 탭해봐요!</p>
    <div id="sentArea"></div>
  </div>

  <button class="done-btn" onclick="markDone()">✅ Step 7 완료!</button>
  <div class="done-msg" id="doneMsg">🎉 완료! 🎮 Games로 가요!</div>
  <div class="nav-btns">
    <a href="jp-g1-u7-step06.html" class="nav-btn sec">← 📚 Stories</a>
    <a href="jp-g1-u7-step08.html" class="nav-btn pri">🎮 Games →</a>
  </div>
</div>

<script>
var TW7=[
  {word:"Mr",ko:"Mr (남성 존칭)",sentence:"Mr Kim came here.",exp:"Mr → 미스터! 줄임말이에요"},
  {word:"Mrs",ko:"Mrs (여성 기혼)",sentence:"Mrs Kim is my teacher.",exp:"Mrs → 미세스! 줄임말이에요"},
  {word:"I\'m",ko:"나는 ~이다",sentence:"I'm a big fox.",exp:"I'm → 아임! I+am 줄임"},
  {word:"don\'t",ko:"하지 않다",sentence:"I don't have a van.",exp:"don't → 돈트! do+not 줄임"},
  {word:"jam",ko:"잼",sentence:"I like jam on my bread.",exp:"jam → 잼! j 소리로 시작"},
  {word:"van",ko:"밴/승합차",sentence:"The van is big.",exp:"van → 밴! v 소리로 시작"},
  {word:"fox",ko:"여우",sentence:"A fox ran into the box.",exp:"fox → 팍스! x로 끝나는 소리"},
  {word:"box",ko:"상자",sentence:"Put it in the box.",exp:"box → 박스! x로 끝나요"},
  {word:"six",ko:"여섯",sentence:"I have six jars.",exp:"six → 식스! x로 끝나요"},
  {word:"jet",ko:"제트기",sentence:"A jet went fast.",exp:"jet → 젯! j 소리로 시작"},
];

function spk(t){
  window.speechSynthesis.cancel();
  var u=new SpeechSynthesisUtterance(t);u.lang='en-GB';u.rate=0.8;
  var vs=window.speechSynthesis.getVoices();
  var v=vs.find(function(v){return v.lang==='en-GB';})||vs.find(function(v){return v.lang.startsWith('en');})||null;
  if(v)u.voice=v;
  window.speechSynthesis.speak(u);
}

// LSCWC 카드
var tcEl=document.getElementById('twCards');
TW7.forEach(function(tw,i){
  var div=document.createElement('div');div.className='tw-card';
  var top=document.createElement('div');top.style.cssText='display:flex;align-items:center;gap:12px;margin-bottom:10px;';
  var wdiv=document.createElement('div');wdiv.id='tw7-'+i;wdiv.style.cssText='font-size:44px;font-weight:800;color:#F4845F;transition:opacity .3s;';wdiv.textContent=tw.word;
  var info=document.createElement('div');
  var koDiv=document.createElement('div');koDiv.style.cssText='font-size:14px;font-weight:800;';koDiv.textContent=tw.ko;
  var expDiv=document.createElement('div');expDiv.style.cssText='font-size:12px;color:var(--br);margin-top:2px;';expDiv.textContent=tw.exp;
  info.appendChild(koDiv);info.appendChild(expDiv);
  top.appendChild(wdiv);top.appendChild(info);div.appendChild(top);
  var sent=document.createElement('div');sent.style.cssText='font-size:13px;color:var(--br);font-style:italic;margin-bottom:10px;';sent.textContent=tw.sentence;div.appendChild(sent);
  var row=document.createElement('div');row.className='step-row';
  var btnL=document.createElement('button');btnL.className='step-btn';btnL.textContent='👀 Look';
  (function(idx){btnL.addEventListener('click',function(){document.getElementById('tw7-'+idx).style.opacity='1';});})(i);
  var btnS=document.createElement('button');btnS.className='step-btn';btnS.textContent='🔊 Say';
  (function(w){btnS.addEventListener('click',function(){spk(w);});})(tw.word);
  var btnC=document.createElement('button');btnC.className='step-btn';btnC.textContent='🙈 Cover';
  (function(idx){btnC.addEventListener('click',function(){document.getElementById('tw7-'+idx).style.opacity='0';document.getElementById('twi7-'+idx).focus();});})(i);
  row.appendChild(btnL);row.appendChild(btnS);row.appendChild(btnC);div.appendChild(row);
  var writeRow=document.createElement('div');writeRow.style.cssText='display:flex;align-items:center;gap:10px;margin-top:6px;';
  var inp=document.createElement('input');inp.id='twi7-'+i;inp.className='write-inp';inp.placeholder='써봐요...';inp.autocomplete='off';inp.spellcheck=false;
  var btnChk=document.createElement('button');btnChk.className='step-btn';btnChk.textContent='✅ Check';
  (function(idx){btnChk.addEventListener('click',function(){
    var inp2=document.getElementById('twi7-'+idx);
    var res=document.getElementById('twr7-'+idx);
    var correct=TW7[idx].word.toLowerCase().replace(/'/g,"'");
    var typed=inp2.value.trim().toLowerCase().replace(/'/g,"'");
    if(typed===correct){res.style.color='var(--g)';res.textContent='🎉 정답! 잘했어요!';inp2.style.borderColor='var(--g)';}
    else{res.style.color='#E24B4A';res.textContent='다시! 정답: '+TW7[idx].word;inp2.style.borderColor='#E24B4A';}
    inp2.value='';
    setTimeout(function(){inp2.style.borderColor='#F4845F44';res.textContent='';},2000);
  });})(i);
  writeRow.appendChild(inp);writeRow.appendChild(btnChk);div.appendChild(writeRow);
  var res=document.createElement('div');res.className='result';res.id='twr7-'+i;div.appendChild(res);
  tcEl.appendChild(div);
});

// 문장 찾기
var saEl=document.getElementById('sentArea');
TW7.forEach(function(tw){
  var div=document.createElement('div');
  div.style.cssText='margin-bottom:14px;padding:12px 14px;background:#FFFDF8;border:1.5px solid var(--soft);border-radius:12px;';
  var title=document.createElement('div');title.style.cssText='font-size:13px;font-weight:800;color:#F4845F;margin-bottom:6px;';title.textContent=tw.word+' 찾기';div.appendChild(title);
  var sline=document.createElement('div');sline.style.cssText='font-size:15px;font-weight:700;line-height:2.2;';
  tw.sentence.split(' ').forEach(function(word){
    var clean=word.replace(/[.,!?]/g,'').toLowerCase();
    var twClean=tw.word.replace(/[.,!?']/g,'').toLowerCase();
    var sp=document.createElement('span');
    if(clean===twClean){
      sp.style.cssText='cursor:pointer;padding:2px 6px;border-radius:6px;background:#FFF0EB;color:#F4845F;font-weight:800;border:1.5px dashed #F4845F;margin:0 2px;display:inline-block;transition:all .2s;';
      sp.textContent=word;
      (function(s,w){s.addEventListener('click',function(){s.style.background='#F4845F';s.style.color='#fff';s.style.borderStyle='solid';spk(w);});})(sp,clean);
    } else {
      sp.style.cssText='padding:2px 4px;margin:0 1px;display:inline-block;';sp.textContent=word;
    }
    sline.appendChild(sp);sline.appendChild(document.createTextNode(' '));
  });
  div.appendChild(sline);saEl.appendChild(div);
});

function markDone(){
  var done=new Set(JSON.parse(localStorage.getItem('jp_g1_u7_done')||'[]'));
  done.add(7);localStorage.setItem('jp_g1_u7_done',JSON.stringify([...done]));
  document.getElementById('doneMsg').classList.add('show');
  document.querySelector('.done-btn').disabled=true;document.querySelector('.done-btn').style.opacity='.6';
  MommyAuth.logProgress('G1-U7-S07');
}
var _d=new Set(JSON.parse(localStorage.getItem('jp_g1_u7_done')||'[]'));
if(_d.has(7)){document.getElementById('doneMsg').classList.add('show');document.querySelector('.done-btn').disabled=true;document.querySelector('.done-btn').style.opacity='.6';}
window.speechSynthesis.onvoiceschanged=function(){window.speechSynthesis.getVoices();};
</script>
<script>// ══════════════════════════════════════════
//  Unit LNB (Left Navigation Bar)
//  모든 Step 파일에서 공통으로 사용
// ══════════════════════════════════════════

const LNB_STEPS = [
  { num:1,  icon:'🔊', title:'Sound Intro',       short:'소리 만나기' },
  { num:2,  icon:'✍️', title:'Letter Formation',  short:'글자 쓰기' },
  { num:3,  icon:'👂', title:'Sound Discrimination', short:'소리 구별' },
  { num:4,  icon:'📖', title:'Word Cards',         short:'단어 카드' },
  { num:5,  icon:'🔤', title:'Blending',           short:'소리 합치기' },
  { num:6,  icon:'📚', title:'Decodable Story',    short:'스토리 읽기' },
  { num:7,  icon:'⭐', title:'Tricky Words',       short:'트리키 워드' },
  { num:8,  icon:'🎮', title:'Games',              short:'게임' },
  { num:9,  icon:'💬', title:'Talk Together',      short:'함께 대화' },
  { num:10, icon:'📔', title:'My Journal',         short:'나의 저널' },
];

const DONE_KEY = 'jp_g1_u7_done';

function getLNBDone() {
  return new Set(JSON.parse(localStorage.getItem(DONE_KEY) || '[]'));
}

// 현재 step 번호 파악
function getCurrentStep() {
  const path = window.location.pathname;
  const match = path.match(/step-(\d+)\.html/);
  return match ? parseInt(match[1]) : 0;
}

// LNB CSS 주입
function injectLNBStyle() {
  const style = document.createElement('style');
  style.textContent = `
    /* ── LNB 레이아웃 ── */
    body { overflow-x: hidden; }

    /* 기존 nav 조정 */
    nav { left: 0; z-index: 200; }

    /* LNB 사이드바 */
    #unitLNB {
      position: fixed;
      top: 56px; /* nav 높이 */
      left: 0;
      width: 220px;
      height: calc(100vh - 56px);
      background: #FEFCFF;
      border-right: 2px solid #D8C8F0;
      overflow-y: auto;
      z-index: 150;
      padding: 16px 0 32px;
      transition: transform .3s ease;
    }

    /* LNB 헤더 */
    .lnb-header {
      padding: 0 16px 12px;
      border-bottom: 1px solid var(--soft);
      margin-bottom: 8px;
    }
    .lnb-unit-label {
      font-size: 10px; font-weight: 700; color: var(--br);
      text-transform: uppercase; letter-spacing: .08em; margin-bottom: 4px;
    }
    .lnb-unit-title {
      font-size: 16px; font-weight: 800; color: #7040B8;
    }
    .lnb-progress {
      margin-top: 8px;
    }
    .lnb-prog-track {
      background: #E0D0FF; border-radius: 6px; height: 6px; overflow: hidden;
    }
    .lnb-prog-fill {
      height: 100%; background: #7040B8; border-radius: 6px; transition: width .4s;
    }
    .lnb-prog-txt {
      font-size: 10px; color: var(--br); font-weight: 700; margin-top: 3px;
    }

    /* LNB 아이템 */
    .lnb-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 16px; cursor: pointer;
      text-decoration: none; color: var(--dark);
      border-left: 3px solid transparent;
      transition: all .15s;
      font-size: 13px; font-weight: 600;
      position: relative;
    }
    .lnb-item:hover {
      background: #F5EEFF; border-left-color: #C0A0EE;
    }
    .lnb-item.active {
      background: #E8D8FF;
      border-left-color: #7040B8;
      color: #5A28A0;
      font-weight: 800;
    }
    .lnb-item.done {
      color: var(--g);
    }
    .lnb-item.done .lnb-check {
      display: flex;
    }
    .lnb-num {
      width: 26px; height: 26px; border-radius: 8px;
      background: #EDE0FF; color: #7040B8;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 800; flex-shrink: 0;
      transition: all .15s;
    }
    .lnb-item.active .lnb-num {
      background: #7040B8; color: #fff;
    }
    .lnb-item.done .lnb-num {
      background: #2D9E68; color: #fff;
    }
    .lnb-icon { font-size: 14px; flex-shrink: 0; }
    .lnb-text { flex: 1; }
    .lnb-title { display: block; font-size: 12px; font-weight: 700; line-height: 1.2; }
    .lnb-short { display: block; font-size: 10px; opacity: .65; margin-top: 1px; }
    .lnb-check {
      display: none; width: 18px; height: 18px; border-radius: 50%;
      background: var(--g); color: #fff;
      align-items: center; justify-content: center; font-size: 10px; flex-shrink: 0;
    }

    /* 콘텐츠 영역 밀기 */
    #lnbContentShift {
      margin-left: 220px;
      transition: margin-left .3s;
    }

    /* 모바일 토글 버튼 */
    #lnbToggle {
      display: none;
      position: fixed;
      bottom: 20px; right: 20px;
      width: 52px; height: 52px;
      border-radius: 50%;
      background: var(--p); color: #fff;
      border: none; font-size: 20px;
      cursor: pointer; z-index: 300;
      box-shadow: 0 4px 16px rgba(155,114,207,.4);
    }

    /* 모바일 오버레이 */
    #lnbOverlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,.3);
      z-index: 140;
    }
    #lnbOverlay.show { display: block; }

    /* 모바일 */
    @media (max-width: 768px) {
      #unitLNB {
        transform: translateX(-100%);
        top: 0; height: 100vh;
        padding-top: 72px;
        box-shadow: 4px 0 24px rgba(0,0,0,.12);
      }
      #unitLNB.open { transform: translateX(0); }
      #lnbContentShift { margin-left: 0 !important; }
      #lnbToggle { display: flex; align-items: center; justify-content: center; }
    }
  `;
  document.head.appendChild(style);
}

// LNB HTML 생성
function buildLNB() {
  const currentStep = getCurrentStep();
  const done = getLNBDone();

  // LNB 사이드바
  const lnb = document.createElement('div');
  lnb.id = 'unitLNB';

  // 헤더
  const pct = Math.round(done.size / LNB_STEPS.length * 100);
  lnb.innerHTML = `
    <div class="lnb-header">
      <div class="lnb-unit-label">Group 1 · Unit 7</div>
      <div class="lnb-unit-title">j, v, x</div>
      <div class="lnb-progress">
        <div class="lnb-prog-track">
          <div class="lnb-prog-fill" style="width:${pct}%"></div>
        </div>
        <div class="lnb-prog-txt">${done.size} / ${LNB_STEPS.length} 완료</div>
      </div>
    </div>`;

  // Step 목록
  LNB_STEPS.forEach(s => {
    const isDone = done.has(s.num);
    const isActive = s.num === currentStep;
    const a = document.createElement('a');
    a.href = `step-${String(s.num).padStart(2,'0')}.html`;
    a.className = 'lnb-item' + (isActive ? ' active' : '') + (isDone ? ' done' : '');
    a.innerHTML = `
      <div class="lnb-num">${isDone ? '✓' : s.num}</div>
      <span class="lnb-icon">${s.icon}</span>
      <span class="lnb-text">
        <span class="lnb-title">${s.title}</span>
        <span class="lnb-short">${s.short}</span>
      </span>
      <div class="lnb-check">✓</div>`;
    lnb.appendChild(a);
  });

  document.body.appendChild(lnb);

  // 오버레이 (모바일)
  const overlay = document.createElement('div');
  overlay.id = 'lnbOverlay';
  overlay.onclick = closeLNB;
  document.body.appendChild(overlay);

  // 토글 버튼 (모바일)
  const toggle = document.createElement('button');
  toggle.id = 'lnbToggle';
  toggle.innerHTML = '☰';
  toggle.onclick = toggleLNB;
  document.body.appendChild(toggle);
}

// 기존 콘텐츠에 margin-left 적용
function shiftContent() {
  // nav는 이미 fixed라 영향 없음
  // wrap 또는 body의 직접 자식 div들에 margin 적용
  const wrap = document.querySelector('.wrap') || document.querySelector('main');
  if (wrap) {
    wrap.id = wrap.id || 'lnbContentShift';
    wrap.style.marginLeft = '220px';
    wrap.style.transition = 'margin-left .3s';
  }

  // 모바일에서는 margin 제거
  function applyMobile() {
    if (window.innerWidth <= 768) {
      if (wrap) wrap.style.marginLeft = '0';
    } else {
      if (wrap) wrap.style.marginLeft = '220px';
    }
  }
  applyMobile();
  window.addEventListener('resize', applyMobile);
}

function toggleLNB() {
  const lnb = document.getElementById('unitLNB');
  const overlay = document.getElementById('lnbOverlay');
  const toggle = document.getElementById('lnbToggle');
  const isOpen = lnb.classList.contains('open');
  lnb.classList.toggle('open', !isOpen);
  overlay.classList.toggle('show', !isOpen);
  toggle.innerHTML = isOpen ? '☰' : '✕';
}

function closeLNB() {
  document.getElementById('unitLNB')?.classList.remove('open');
  document.getElementById('lnbOverlay')?.classList.remove('show');
  document.getElementById('lnbToggle').innerHTML = '☰';
}

// 초기화
function initLNB() {
  injectLNBStyle();
  buildLNB();
  shiftContent();
}

// DOM 준비 후 실행
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', initLNB);
} else {
  initLNB();
}
</script>
</body></html>
