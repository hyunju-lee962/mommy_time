<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>따라 쓰기 — 태양계로 날아라</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;600&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../../assets/css/main.css">
<style>
.page-header { padding:110px 40px 32px;text-align:center; }
.back-link { display:inline-flex;align-items:center;gap:4px;color:var(--brown);text-decoration:none;font-size:14px;margin-bottom:16px; }
.page-title { font-family:'Noto Serif KR',serif;font-size:30px;font-weight:300;margin-bottom:6px; }
.lang-bar { display:flex;justify-content:center;gap:12px;padding:16px 40px;background:var(--warm);border-bottom:1px solid var(--soft);align-items:center; }
.content { max-width:720px;margin:0 auto;padding:32px 40px 80px; }

.tabs { display:flex;gap:8px;margin-bottom:28px;background:var(--warm);border-radius:16px;padding:4px; }
.tab-btn { flex:1;padding:10px;border:none;background:transparent;border-radius:12px;font-size:14px;font-weight:500;cursor:pointer;font-family:inherit;color:var(--brown);transition:all .2s; }
.tab-btn.active { background:var(--white);color:var(--dark);box-shadow:0 2px 8px rgba(0,0,0,.08); }

.write-card {
  background:var(--white);border:1.5px solid var(--soft);border-radius:20px;
  padding:28px;margin-bottom:16px;box-shadow:var(--shadow);
}
.write-card.done-card { border-color:var(--green); }
.wc-label { font-size:12px;color:var(--accent);letter-spacing:.08em;text-transform:uppercase;margin-bottom:10px; }
.wc-word { font-size:26px;font-weight:500;color:var(--dark);margin-bottom:4px; }
.wc-phonetic { font-size:13px;color:var(--brown);margin-bottom:4px; }
.wc-ko { font-size:15px;color:var(--brown);margin-bottom:16px; }
.wc-lines { display:flex;flex-direction:column;gap:8px;margin-bottom:14px; }
.write-input {
  width:100%;border:none;border-bottom:2px solid var(--soft);
  padding:8px 4px;font-size:18px;font-family:inherit;
  background:transparent;outline:none;color:var(--dark);
  transition:border-color .2s;
}
.write-input:focus { border-color:var(--accent); }
.write-input.correct { border-color:var(--green);color:#27500A; }
.write-input.wrong { border-color:#E24B4A;color:#501313; }
.wc-actions { display:flex;gap:8px;flex-wrap:wrap;align-items:center; }
.wc-hint { font-size:12px;color:var(--soft);margin-top:8px; }
.wc-hint.show { color:var(--accent); }

.sentences-tab { display:none; }
.sentences-tab.active { display:block; }
.words-tab { display:none; }
.words-tab.active { display:block; }

@media(max-width:768px){ .content{padding:24px 24px 60px;} .page-header{padding:100px 24px 28px;} }
</style>
</head>
<body>

<nav class="nav">
  <a href="../../../index.html" class="nav-logo">엄마<span>시간</span></a>
  <a href="index.html" class="nav-back">← 1주차로</a>
</nav>

<div class="page-header">
  <a href="index.html" class="back-link">← 1주차로 돌아가기</a>
  <h1 class="page-title">✏️ <span data-ko="따라 쓰기" data-en="Writing Practice">따라 쓰기</span></h1>
  <p style="font-size:14px;color:var(--brown)" data-ko="단어와 문장을 직접 써봐요. 3번씩 쓰면 기억에 오래 남아요!" data-en="Write words and sentences by hand. Writing 3 times helps you remember!">단어와 문장을 직접 써봐요. 3번씩 쓰면 기억에 오래 남아요!</p>
</div>

<div class="lang-bar">
  <div class="lang-toggle">
    <button class="lang-btn active" data-lang="ko" onclick="setLang('ko')">한국어</button>
    <button class="lang-btn" data-lang="en" onclick="setLang('en')">English</button>
  </div>
</div>

<div class="content">
  <div class="together-box reveal" style="margin-bottom:24px">
    <div class="together-icon">✍️</div>
    <div>
      <div class="together-title" data-ko="엄마랑 같이 써봐요!" data-en="Write together with Mom!">엄마랑 같이 써봐요!</div>
      <div class="together-text" data-ko="아이가 쓰는 동안 엄마도 같이 써봐요. 누가 더 예쁘게 쓰나 비교해봐도 재미있어요 ✏️ 3번씩 쓰면 단어가 손에 기억돼요!" data-en="While the child writes, Mom writes too! Compare who writes more neatly ✏️ Writing 3 times helps the word stick in your memory!">아이가 쓰는 동안 엄마도 같이 써봐요. 누가 더 예쁘게 쓰나 비교해봐도 재미있어요 ✏️ 3번씩 쓰면 단어가 손에 기억돼요!</div>
    </div>
  </div>

  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('words', this)" data-ko="단어 쓰기" data-en="Word Writing">단어 쓰기</button>
    <button class="tab-btn" onclick="switchTab('sentences', this)" data-ko="문장 쓰기" data-en="Sentence Writing">문장 쓰기</button>
  </div>

  <!-- 단어 탭 -->
  <div class="words-tab active" id="wordsTab">
    <div id="wordsList"></div>
  </div>

  <!-- 문장 탭 -->
  <div class="sentences-tab" id="sentencesTab">
    <div id="sentencesList"></div>
  </div>

  <div style="display:flex;gap:10px;justify-content:center;margin-top:32px;flex-wrap:wrap">
    <a href="quiz.html" class="btn btn-primary">🏆 <span data-ko="퀴즈 대결로 →" data-en="Quiz Battle →">퀴즈 대결로 →</span></a>
    <a href="index.html" class="btn btn-secondary" data-ko="← 1주차로" data-en="← Back">← 1주차로</a>
  </div>
</div>

<script src="../../../assets/js/main.js"></script>
<script>
const words = [
  { en:'solar system', phonetic:'/ˈsoʊlər ˈsɪstəm/', ko:'태양계' },
  { en:'planet', phonetic:'/ˈplænɪt/', ko:'행성' },
  { en:'orbit', phonetic:'/ˈɔːrbɪt/', ko:'궤도, 공전하다' },
  { en:'gravity', phonetic:'/ˈɡrævɪti/', ko:'중력' },
  { en:'astronaut', phonetic:'/ˈæstrənɔːt/', ko:'우주비행사' },
];

const sentences = [
  { en:'Our solar system has eight planets.', ko:'우리 태양계에는 8개의 행성이 있어요.' },
  { en:'Gravity pulls everything toward the ground.', ko:'중력은 모든 것을 땅으로 당겨요.' },
  { en:'The Earth orbits the Sun every year.', ko:'지구는 매년 태양 주위를 공전해요.' },
];

const wl = document.getElementById('wordsList');
words.forEach((w, i) => {
  const div = document.createElement('div');
  div.className = 'write-card reveal';
  div.innerHTML = `
    <div class="wc-label">단어 ${i+1} / ${words.length}</div>
    <div class="wc-word">${w.en}</div>
    <div class="wc-phonetic">${w.phonetic}</div>
    <div class="wc-ko" data-ko="${w.ko}" data-en="${w.en}">${w.ko}</div>
    <button class="tts-btn" style="margin-bottom:14px" onclick="speakBtn(this,'${w.en}')">🔊 발음 듣기</button>
    <div class="wc-lines">
      ${[1,2,3].map(n => `<input type="text" class="write-input" placeholder="${n}번째 써봐요..." data-answer="${w.en}" oninput="checkWord(this)" autocomplete="off" spellcheck="false">`).join('')}
    </div>
    <div class="wc-actions">
      <button class="btn btn-secondary btn-sm" onclick="showHint(this,'${w.en}')">힌트 보기</button>
    </div>
    <div class="wc-hint"></div>`;
  wl.appendChild(div);
});

const sl = document.getElementById('sentencesList');
sentences.forEach((s, i) => {
  const div = document.createElement('div');
  div.className = 'write-card reveal';
  div.innerHTML = `
    <div class="wc-label">문장 ${i+1} / ${sentences.length}</div>
    <div class="wc-word" style="font-size:17px">${s.en}</div>
    <div class="wc-ko" style="margin-bottom:12px" data-ko="${s.ko}" data-en="${s.en}">${s.ko}</div>
    <button class="tts-btn" style="margin-bottom:14px" onclick="speakBtn(this,'${s.en}')">🔊 문장 듣기</button>
    <div class="wc-lines">
      ${[1,2].map(n => `<input type="text" class="write-input" placeholder="${n}번째 써봐요..." style="font-size:15px" autocomplete="off" spellcheck="false">`).join('')}
    </div>`;
  sl.appendChild(div);
});

function checkWord(el) {
  const answer = el.dataset.answer.toLowerCase();
  const val = el.value.trim().toLowerCase();
  if (!val) { el.classList.remove('correct','wrong'); return; }
  if (answer.startsWith(val) || val === answer) {
    el.classList.add('correct'); el.classList.remove('wrong');
  } else {
    el.classList.remove('correct'); el.classList.add('wrong');
  }
}

function showHint(btn, word) {
  const hint = btn.closest('.write-card').querySelector('.wc-hint');
  hint.textContent = '✏️ ' + word;
  hint.classList.add('show');
}

function switchTab(tab, btn) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('wordsTab').classList.toggle('active', tab==='words');
  document.getElementById('sentencesTab').classList.toggle('active', tab==='sentences');
}
</script>
</body>
</html>
