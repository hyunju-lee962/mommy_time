<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Explore the Flower! — Plant Seeds | Mommy Time</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --g:#52B788;--gl:#E8F8EF;
  --y:#F9C74F;--yl:#FFFBEC;
  --o:#F4845F;--ol:#FFF0EB;
  --b:#5BA4CF;--bl:#EBF4FF;
  --p:#9B72CF;--pl:#F3EEFF;
  --cream:#FFFDF8;--warm:#F5EDE0;
  --dark:#2C2016;--br:#8B6F5E;--soft:#EAE0D5;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--cream);color:var(--dark);font-family:'Nunito',sans-serif;overflow-x:hidden;}

nav{position:fixed;top:0;width:100%;z-index:100;padding:13px 36px;display:flex;align-items:center;justify-content:space-between;background:rgba(255,253,248,.94);backdrop-filter:blur(14px);border-bottom:1px solid var(--soft);}
.logo{font-size:16px;font-weight:800;color:var(--dark);text-decoration:none;}
.logo span{color:var(--o);}
.back{font-size:13px;color:var(--br);text-decoration:none;font-weight:600;}

.hd{padding:82px 36px 16px;text-align:center;}
.hd h1{font-size:24px;font-weight:800;margin-bottom:6px;}
.hd p{font-size:13px;color:var(--br);line-height:1.7;}

/* 모드 탭 */
.tabs{display:flex;gap:8px;justify-content:center;padding:0 36px 20px;flex-wrap:wrap;}
.tab{padding:9px 20px;border-radius:28px;border:2px solid var(--soft);background:#fff;font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;cursor:pointer;color:var(--br);transition:all .18s;}
.tab.on{background:var(--o);color:#fff;border-color:var(--o);}

.wrap{max-width:720px;margin:0 auto;padding:0 36px 80px;}

/* ── MODE 1: 꽃 탐험 ── */
#mExplore{}
.explore-guide{background:var(--yl);border-radius:14px;padding:14px 18px;margin-bottom:20px;display:flex;gap:10px;align-items:center;}
.explore-guide-icon{font-size:24px;}
.explore-guide-text{font-size:13px;color:#5a4a00;font-weight:600;line-height:1.6;}

.flower-stage{position:relative;width:100%;max-width:500px;margin:0 auto 20px;}
.flower-stage svg{width:100%;height:auto;cursor:default;}

/* 클릭 가능한 부위 */
.fp{cursor:pointer;transition:all .2s;}
.fp:hover{opacity:.7;transform-origin:center;}

/* 선택된 부위 — 펄스 글로우 애니메이션 */
.fp.active{
  animation:partGlow 1.2s ease-in-out infinite;
}
@keyframes partGlow{
  0%,100%{filter:drop-shadow(0 0 0px rgba(255,255,255,0)) drop-shadow(0 0 6px rgba(244,132,95,.6));}
  50%{filter:drop-shadow(0 0 0px rgba(255,255,255,.9)) drop-shadow(0 0 14px rgba(244,132,95,1)) drop-shadow(0 0 4px #fff);}
}

/* 꽃 + 패널 나란히 배치 */
.flower-explore-wrap{display:grid;grid-template-columns:1fr 1fr;gap:16px;align-items:start;margin-bottom:20px;}
@media(max-width:580px){.flower-explore-wrap{grid-template-columns:1fr;}}

.flower-stage{position:relative;width:100%;max-width:500px;margin:0 auto;}
.flower-stage svg{width:100%;height:auto;cursor:default;}

/* 오른쪽 정보 패널 — 항상 보임 */
.info-panel{
  background:#fff;border:2.5px solid var(--soft);border-radius:20px;
  padding:20px;min-height:220px;
  display:flex;flex-direction:column;justify-content:center;
  transition:border-color .3s;
}
.info-panel.show{border-color:var(--o);animation:slideUp .3s ease;}

/* 빈 상태 */
.info-empty{text-align:center;color:var(--soft);}
.info-empty-icon{font-size:40px;margin-bottom:8px;}
.info-empty-text{font-size:13px;font-weight:600;}

/* 내용 */
.info-content{display:none;}
.info-content.show{display:block;animation:slideUp .3s ease;}
.info-header{display:flex;align-items:center;gap:12px;margin-bottom:12px;}
.info-icon{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;}
.info-name-en{font-size:18px;font-weight:800;}
.info-name-ko{font-size:13px;color:var(--br);font-weight:600;}
.info-def{font-size:13px;line-height:1.7;margin-bottom:8px;}
.info-fun{background:var(--yl);border-radius:10px;padding:9px 12px;font-size:12px;color:#5a4a00;line-height:1.6;font-weight:600;margin-bottom:10px;}
.tts{display:inline-flex;align-items:center;gap:4px;background:var(--b);color:#fff;border:none;border-radius:10px;padding:5px 12px;font-size:11px;font-family:'Nunito',sans-serif;font-weight:700;cursor:pointer;}
.tts.speaking{background:var(--o);}

/* 부위 체크리스트 */
.parts-bar{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:20px;}
.part-chip{padding:5px 12px;border-radius:20px;border:2px solid var(--soft);background:#fff;font-size:11px;font-weight:700;color:var(--br);cursor:pointer;transition:all .2s;}
.part-chip.visited{background:var(--g);color:#fff;border-color:var(--g);}

/* ── MODE 2: 수분 여정 드래그 게임 ── */
#mJourney{display:none;}
.journey-intro{background:var(--gl);border-radius:14px;padding:14px 18px;margin-bottom:20px;font-size:13px;color:#1a5c3a;font-weight:600;line-height:1.7;}

/* 게임 씬 캔버스 */
.pj-scene{
  position:relative;width:100%;height:320px;
  border-radius:20px;overflow:hidden;
  background:linear-gradient(180deg,#C8E6FF 0%,#E8F4FF 55%,#A8D8A8 55%,#7CC47C 100%);
  margin-bottom:14px;touch-action:none;user-select:none;
}
/* 구름 */
.cloud{position:absolute;background:rgba(255,255,255,.85);border-radius:50px;pointer-events:none;}

/* 꽃 */
.pj-flower{
  position:absolute;bottom:0;display:flex;flex-direction:column;align-items:center;
  cursor:default;transition:transform .2s;
}
.pj-flower-head{font-size:52px;line-height:1;position:relative;}
.pj-flower-stem{width:8px;height:50px;background:#52B788;border-radius:4px;}
/* 수분된 꽃 */
.pj-flower.pollinated .pj-flower-head::after{
  content:'✨';position:absolute;top:-10px;right:-10px;font-size:18px;
  animation:sparkle .6s ease infinite alternate;
}
@keyframes sparkle{from{transform:scale(.8);opacity:.7;}to{transform:scale(1.2);opacity:1;}}

/* 꽃가루 반짝임 */
.pj-flower.has-pollen .pj-flower-head::before{
  content:'';position:absolute;inset:-4px;border-radius:50%;
  border:3px solid var(--y);animation:pollenRing 1s ease infinite;
}
@keyframes pollenRing{
  0%,100%{box-shadow:0 0 0 0 rgba(249,199,79,.7);}
  50%{box-shadow:0 0 0 8px rgba(249,199,79,0);}
}

/* 씨방 열매 변화 */
.pj-flower.seeded .pj-flower-head{filter:hue-rotate(20deg);}
.pj-flower.seeded::after{
  content:'🍅';position:absolute;bottom:48px;font-size:28px;
  animation:growFruit .5s ease;
}
@keyframes growFruit{from{transform:scale(0);opacity:0;}to{transform:scale(1);opacity:1;}}

/* 벌 (드래그 대상) */
.pj-bee{
  position:absolute;font-size:40px;cursor:grab;z-index:20;
  transition:filter .2s;user-select:none;
  filter:drop-shadow(0 2px 4px rgba(0,0,0,.2));
}
.pj-bee:active{cursor:grabbing;}
.pj-bee.has-pollen::after{
  content:'💛';position:absolute;top:-8px;right:-8px;font-size:14px;
  animation:bounce2 .5s ease infinite alternate;
}
@keyframes bounce2{from{transform:translateY(0);}to{transform:translateY(-4px);}}
.pj-bee.flying{animation:beeFly .4s ease infinite alternate;}
@keyframes beeFly{from{transform:rotate(-5deg)translateY(0);}to{transform:rotate(5deg)translateY(-4px);}}

/* 가이드 말풍선 */
.pj-guide{
  position:absolute;top:10px;left:50%;transform:translateX(-50%);
  background:rgba(255,253,248,.96);border-radius:20px;
  padding:8px 16px;font-size:12px;font-weight:700;color:var(--dark);
  box-shadow:0 2px 12px rgba(0,0,0,.12);z-index:30;
  text-align:center;max-width:88%;white-space:normal;
  transition:all .3s;
}

/* 힌트 */
.pj-hint-btn{
  display:block;margin:0 auto;background:none;
  border:1.5px dashed var(--y);color:#8B6F00;
  padding:7px 18px;border-radius:12px;
  font-family:'Nunito',sans-serif;font-size:12px;font-weight:700;
  cursor:pointer;transition:all .2s;
}
.pj-hint-btn:hover{background:var(--yl);}
.pj-hint{background:var(--yl);border-radius:12px;padding:12px 16px;margin-top:10px;
  display:none;font-size:13px;color:#5a4a00;font-weight:600;line-height:1.7;}
.pj-hint.show{display:block;animation:slideUp .3s ease;}

/* 단계 완료 오버레이 */
.pj-overlay{
  position:absolute;inset:0;background:rgba(255,253,248,.93);
  display:none;flex-direction:column;align-items:center;justify-content:center;
  text-align:center;padding:24px;z-index:40;border-radius:20px;
}
.pj-overlay.show{display:flex;animation:fadeIn .4s ease;}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
.pj-overlay-emoji{font-size:52px;margin-bottom:10px;}
.pj-overlay-title{font-size:17px;font-weight:800;margin-bottom:6px;}
.pj-overlay-desc{font-size:13px;color:var(--br);line-height:1.7;margin-bottom:16px;}
.pj-next-btn{padding:11px 26px;border-radius:26px;background:var(--g);color:#fff;border:none;font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;cursor:pointer;}

/* 진행 도트 */
.pj-dots{display:flex;gap:6px;justify-content:center;margin-bottom:12px;}
.pj-dot{width:10px;height:10px;border-radius:50%;background:var(--soft);transition:all .3s;}
.pj-dot.done{background:var(--g);}
.pj-dot.cur{background:var(--o);transform:scale(1.3);}

/* 파티클 */
.pj-particle{position:absolute;pointer-events:none;z-index:25;font-size:14px;
  animation:pflyUp .8s ease forwards;}
@keyframes pflyUp{from{opacity:1;transform:translate(0,0)scale(1);}
  to{opacity:0;transform:translate(var(--pdx),var(--pdy))scale(.3);}}

/* ── MODE 3: 퀴즈 게임 ── */
#mGame{display:none;}
.game-score{display:flex;gap:12px;justify-content:center;margin-bottom:20px;}
.score-card{background:#fff;border:.5px solid var(--soft);border-radius:12px;padding:12px 20px;text-align:center;min-width:80px;}
.score-num{font-size:22px;font-weight:800;}
.score-label{font-size:10px;color:var(--br);font-weight:600;}
.game-q-card{background:#fff;border:2px solid var(--soft);border-radius:20px;padding:24px;margin-bottom:14px;}
.game-q-num{font-size:11px;font-weight:700;color:var(--o);margin-bottom:8px;}
.game-q-text{font-size:17px;font-weight:800;line-height:1.5;margin-bottom:18px;}
.game-opts{display:grid;grid-template-columns:1fr 1fr;gap:9px;}
.game-opt{padding:13px 16px;border:2px solid var(--soft);border-radius:14px;background:#fff;font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .18s;text-align:center;line-height:1.4;}
.game-opt:hover{border-color:var(--b);}
.game-opt.selected{border-color:var(--b);background:var(--bl);color:#0a3d6b;}
.game-opt.correct{background:var(--gl);border-color:var(--g);color:#1a5c3a;}
.game-opt.wrong{background:#FCEBEB;border-color:#E24B4A;color:#501313;}
.game-exp{background:var(--yl);border-radius:12px;padding:12px 16px;margin-top:12px;font-size:13px;color:#5a4a00;line-height:1.7;font-weight:600;display:none;}
.game-exp.show{display:block;}
.game-result{text-align:center;padding:32px;background:#fff;border-radius:20px;border:2px solid var(--soft);}

@keyframes slideUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
@keyframes pop{0%{transform:scale(.9);opacity:0}60%{transform:scale(1.03)}100%{transform:scale(1);opacity:1}}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
.bounce{animation:bounce 1s infinite;}

@media(max-width:680px){
  nav,.hd,.tabs,.wrap{padding-left:20px;padding-right:20px;}
  .game-opts{grid-template-columns:1fr;}
}
</style>
</head>
<body>

<nav>
  <a href="../../../index.html" class="logo">Mommy<span>Time</span></a>
  <a href="index.html" class="back">← Week 1</a>
</nav>

<div class="hd">
  <h1>🎮 Explore the Flower!</h1>
  <p>Tap · Discover · Learn how a flower makes seeds<br>Play together with Mom! 🌸</p>
</div>

<div class="tabs">
  <button class="tab on" onclick="goMode('Explore',this)">🌸 Flower Explorer</button>
  <button class="tab" onclick="goMode('Journey',this)">🐝 Pollination Journey</button>
  <button class="tab" onclick="goMode('Game',this)">🏆 Quiz Game</button>
</div>

<div class="wrap">

<!-- ── MODE 1: 꽃 탐험 ── -->
<div id="mExplore">
  <div class="explore-guide">
    <div class="explore-guide-icon">👆</div>
    <div class="explore-guide-text">
      Tap each part of the flower to learn what it does!<br>
      <span style="font-size:11px;opacity:.8">꽃의 각 부분을 눌러서 어떤 일을 하는지 알아봐요!</span>
    </div>
  </div>

  <!-- 부위 체크 칩 -->
  <div class="parts-bar" id="partsBar"></div>

  <!-- 꽃 + 설명 나란히 -->
  <div class="flower-explore-wrap">

  <!-- 왼쪽: 꽃 단면도 SVG -->
  <div class="flower-stage">
    <svg id="flowerSvg" viewBox="0 0 260 340" xmlns="http://www.w3.org/2000/svg">

      <!-- ── 줄기 ── -->
      <rect x="122" y="290" width="16" height="48" rx="8" fill="#ccc" stroke="#aaa" stroke-width="1.5"/>

      <!-- ── 꽃받침 (sepal) ── -->
      <g id="g-sepal" class="fp" onclick="showPart('sepal')" cursor="pointer">
        <path d="M100 290 Q80 270 72 245 Q90 255 108 270 Z" fill="#ddd" stroke="#aaa" stroke-width="1.5"/>
        <path d="M160 290 Q180 270 188 245 Q170 255 152 270 Z" fill="#ddd" stroke="#aaa" stroke-width="1.5"/>
        <path d="M108 290 Q100 272 96 255 Q112 262 124 275 Z" fill="#ddd" stroke="#aaa" stroke-width="1.2"/>
        <path d="M152 290 Q160 272 164 255 Q148 262 136 275 Z" fill="#ddd" stroke="#aaa" stroke-width="1.2"/>
      </g>

      <!-- ── 꽃잎 왼쪽 (petal) ── -->
      <g id="g-petal" class="fp" onclick="showPart('petal')" cursor="pointer">
        <!-- 왼쪽 꽃잎 단면 -->
        <path d="M60 200 Q30 170 28 130 Q28 90 50 70 Q65 55 80 65 Q90 72 88 90 Q85 120 90 155 Q92 175 88 200 Z"
          fill="#ddd" stroke="#aaa" stroke-width="1.5"/>

      <!-- ── 밑씨 (ovule) ── -->
      <g id="g-ovule" class="fp" onclick="showPart('ovule')" cursor="pointer">
        <ellipse cx="118" cy="242" rx="9" ry="8" fill="#eee" stroke="#bbb" stroke-width="1.5"/>
        <ellipse cx="140" cy="246" rx="9" ry="8" fill="#eee" stroke="#bbb" stroke-width="1.5"/>

        <circle cx="118" cy="242" r="3" fill="#ccc"/>
        <circle cx="140" cy="246" r="3" fill="#ccc"/>
      </g>

      <!-- ── 꽃꿀 (nectar) ── -->
      <g id="g-nectar" class="fp" onclick="showPart('nectar')" cursor="pointer">
        <ellipse cx="130" cy="272" rx="18" ry="7" fill="#eee" stroke="#bbb" stroke-width="1.2" stroke-dasharray="3,2"/>
        <!-- 꿀방울 -->
        <circle cx="120" cy="271" r="3" fill="#eee" stroke="#bbb" stroke-width="1"/>
        <circle cx="130" cy="274" r="3.5" fill="#eee" stroke="#bbb" stroke-width="1"/>
        <circle cx="140" cy="271" r="3" fill="#eee" stroke="#bbb" stroke-width="1"/>
      </g>

      <!-- ── 암술대 (style/pistil) ── -->
      <g id="g-pistil" class="fp" onclick="showPart('pistil')" cursor="pointer">
        <rect x="123" y="130" width="14" height="100" rx="7" fill="#ddd" stroke="#aaa" stroke-width="1.5"/>
      </g>

      <!-- ── 수술대 (stamen/filament) ── -->
      <g id="g-stamen" class="fp" onclick="showPart('stamen')" cursor="pointer">
        <!-- 왼쪽 수술대 -->
        <rect x="96"  y="148" width="5" height="58" rx="2.5" fill="#ddd" stroke="#aaa" stroke-width="1.2"/>
        <rect x="108" y="138" width="5" height="68" rx="2.5" fill="#ddd" stroke="#aaa" stroke-width="1.2"/>

        <rect x="149" y="138" width="5" height="68" rx="2.5" fill="#ddd" stroke="#aaa" stroke-width="1.2"/>
        <rect x="159" y="148" width="5" height="58" rx="2.5" fill="#ddd" stroke="#aaa" stroke-width="1.2"/>

      <!-- ── 꽃밥 (anther) ── -->

        <ellipse cx="98"  cy="145" rx="9" ry="6" fill="#eee" stroke="#bbb" stroke-width="1.5"/>

        <circle cx="150" cy="128" r="2" fill="#ccc"/>
        <circle cx="162" cy="138" r="2" fill="#ccc"/>
      </g>

      <!-- ── 암술머리 (stigma) ── -->
      <g id="g-stigma" class="fp" onclick="showPart('stigma')" cursor="pointer">

        <ellipse cx="118" cy="126" rx="10" ry="6" fill="#eee" stroke="#bbb" stroke-width="1.5"/>
        <ellipse cx="130" cy="120" rx="10" ry="6" fill="#eee" stroke="#bbb" stroke-width="1.5"/>

      <line x1="162" y1="140" x2="210" y2="130" stroke="#ddd" stroke-width="1"/>
      <text x="212" y="134" font-size="9" fill="#ccc" font-family="Nunito,sans-serif" font-weight="700">anther</text>
      <!-- pistil 라벨선 -->
      <line x1="137" y1="170" x2="210" y2="165" stroke="#ddd" stroke-width="1"/>

      <!-- ovary 라벨선 -->
      <line x1="162" y1="240" x2="210" y2="230" stroke="#ddd" stroke-width="1"/>
      <text x="212" y="234" font-size="9" fill="#ccc" font-family="Nunito,sans-serif" font-weight="700">ovary</text>
      <!-- ovule 라벨선 -->
      <line x1="150" y1="248" x2="210" y2="260" stroke="#ddd" stroke-width="1"/>
      <text x="212" y="264" font-size="9" fill="#ccc" font-family="Nunito,sans-serif" font-weight="700">ovule</text>

const PART_COLORS = {

  ovule:  {fill:'#F9C74F', stroke:'#d4a030'},
  nectar: {fill:'#F9C74F', stroke:'#d4a030'},
};

function showPart(key){
  const p = PARTS[key];
  if(!p) return;
  visitedParts.add(key);
  updatePartsBar();

  // 1) 모든 부위 선 그림으로 리셋
  document.querySelectorAll('.fp').forEach(function(el){
    el.classList.remove('active');
    el.querySelectorAll('ellipse, rect, circle, path').forEach(function(shape){
      shape.style.fill    = shape.dataset.origFill   || '#ddd';
      shape.style.stroke  = shape.dataset.origStroke || '#aaa';
    });
  });

  // 2) 선택된 부위 채색
  const group = document.getElementById('g-'+key);
  if(group){
    group.classList.add('active');

    // 꽃잎은 특별 처리 — 각 꽃잎마다 다른 화려한 색
    if(key === 'petal'){
      const petalColors = [
        {fill:'#FF6B9D', stroke:'#e0447a'}, // 핑크
        {fill:'#FF8C42', stroke:'#d96a20'}, // 주황
        {fill:'#FFCA3A', stroke:'#d4a030'}, // 노랑
        {fill:'#9B72CF', stroke:'#7a52b0'}, // 보라
        {fill:'#FF6B9D', stroke:'#e0447a'}, // 핑크
        {fill:'#52B788', stroke:'#3d9e6a'}, // 초록
        {fill:'#FF8C42', stroke:'#d96a20'}, // 주황
        {fill:'#FFCA3A', stroke:'#d4a030'}, // 노랑
      ];
      const shapes = group.querySelectorAll('path, ellipse, rect');
      shapes.forEach(function(shape, i){
        if(!shape.dataset.origFill) shape.dataset.origFill = '#ddd';
        if(!shape.dataset.origStroke) shape.dataset.origStroke = '#aaa';
        const col = petalColors[i % petalColors.length];
        shape.style.fill   = col.fill;
        shape.style.stroke = col.stroke;
        shape.style.transition = 'fill .3s, stroke .3s';
      });
    } else {
      const col = PART_COLORS[key];
      if(col){
        group.querySelectorAll('ellipse, rect, path').forEach(function(shape){
          if(!shape.dataset.origFill) shape.dataset.origFill = '#ddd';
          if(!shape.dataset.origStroke) shape.dataset.origStroke = '#aaa';
          shape.style.fill   = col.fill;
          shape.style.stroke = col.stroke;
          shape.style.transition = 'fill .3s, stroke .3s';
        });
      }
    }
  }

  // 3) 오른쪽 패널 업데이트
  document.getElementById('infoEmpty').style.display = 'none';
  const content = document.getElementById('infoContent');
  content.className = 'info-content show';
  content.innerHTML = `
    <div class="info-header">
      <div class="info-icon" style="background:${p.bg}">${p.icon}</div>
      <div>
        <div class="info-name-en" style="color:${p.color}">${p.name}</div>
        <div class="info-name-ko">${p.ko}</div>
      </div>
    </div>
    <div class="info-def">${p.def}<br><span style="font-size:12px;color:var(--br)">${p.defKo}</span></div>
    <div class="info-fun">💡 ${p.fun}</div>
    <button class="tts" onclick="speak(this,\`${p.def} ${p.fun}\`)">🔊 Listen</button>`;

  document.getElementById('infoPanel').style.borderColor = p.color;
}

function buildPartsBar(){
  const bar = document.getElementById('partsBar');
  const keys = Object.keys(PARTS);
  bar.innerHTML = keys.map(k=>`
    <div class="part-chip${visitedParts.has(k)?' visited':''}" id="chip-${k}" onclick="showPart('${k}')">
      ${PARTS[k].icon} ${PARTS[k].name}
    </div>`).join('');
}

function updatePartsBar(){
  Object.keys(PARTS).forEach(k=>{
    const chip = document.getElementById('chip-'+k);
    if(chip) chip.classList.toggle('visited', visitedParts.has(k));
  });
}

function buildJourney(){
  jStep = 0; jDone = false;
  showJFrame();
}

function showJFrame(){
  const f = J[jStep];
  const total = J.length;

  document.getElementById('jProgBar').style.width = (jStep/total*100)+'%';
  document.getElementById('jProgTxt').textContent = `Step ${jStep+1} / ${total}`;
  document.getElementById('jHintBox').style.display = 'none';
  document.getElementById('jHintBox').textContent = f.hint;
  document.getElementById('jNextBtn').style.display = 'none';
  jDone = false;

  // 힌트 타이머 (15초 후 자동)
  if(jHintTimer) clearTimeout(jHintTimer);
  jHintTimer = setTimeout(()=>{
    if(!jDone){
      document.getElementById('jHintBox').style.display = 'block';
    }
  }, 15000);

  // 헤더
  document.getElementById('jFrame').innerHTML = `
    <div style="background:${f.bg};padding:13px 20px;border-bottom:1.5px solid ${f.color}22;display:flex;align-items:center;gap:12px;">
      <div style="background:${f.color};color:#fff;border-radius:50%;width:32px;height:32px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;flex-shrink:0;">${jStep+1}</div>
      <div>
        <div style="font-size:20px;font-weight:800;color:${f.color};line-height:1.2;">${f.keyword}</div>
        <div style="font-size:12px;color:${f.color};opacity:.75;font-weight:700;">${f.keyword_ko}</div>
      </div>
    </div>
    <div id="jInteract" style="padding:14px 16px;"></div>`;

  f.build(document.getElementById('jInteract'));
}

function jStepDone(){
  jDone = true;
  if(jHintTimer) clearTimeout(jHintTimer);
  document.getElementById('jNextBtn').style.display = 'block';
  document.getElementById('jNextBtn').textContent = jStep >= J.length-1 ? '🔄 Play Again!' : 'Next →';
}

function jNext(){
  if(jStep >= J.length-1){ jStep=0; }
  else { jStep++; }
  showJFrame();
  document.getElementById('jFrame').scrollIntoView({behavior:'smooth',block:'nearest'});
}

function toggleJHint(){
  const h = document.getElementById('jHintBox');
  h.style.display = h.style.display==='none'?'block':'none';
}

function tapAnther(id, x, y){
  if(window._tapped.has(id)) return;
  window._tapped.add(id);
  const el = document.getElementById(id);
  if(el){ el.style.fill='#52B788'; el.style.stroke='#3d9e6a'; }
  // 파티클
  const g = document.getElementById('jParticles1');
  if(g){
    for(let i=0;i<5;i++){
      const c = document.createElementNS('http://www.w3.org/2000/svg','circle');
      c.setAttribute('cx', x+(Math.random()-0.5)*30);
      c.setAttribute('cy', y+(Math.random()-0.5)*20);
      c.setAttribute('r','3');
      c.setAttribute('fill','#F9C74F');
      c.style.animation='pflyUp .6s ease forwards';
      c.style.setProperty('--pdx',(Math.random()-0.5)*40+'px');
      c.style.setProperty('--pdy',-(Math.random()*30+10)+'px');
      g.appendChild(c);
      setTimeout(()=>c.remove(),700);
    }
  }
  // 진행 표시
  const jpEl = document.getElementById('jp'+window._tapped.size);
  if(jpEl){ jpEl.style.background='#F9C74F'; jpEl.style.color='#fff'; jpEl.textContent='✓'; }
  if(window._tapped.size===3){
    document.getElementById('j1done').style.display='block';
    jStepDone();
  }
}

// ── STEP 2: 벌 드래그 ──
let _bee2={x:20,y:20,dragging:false,ox:0,oy:0};
function initBeeDrag(){ _bee2={x:20,y:20,dragging:false,ox:0,oy:0}; }
function startBeeDrag(e){
  e.preventDefault();
  _bee2.dragging=true;
  const b=document.getElementById('jBee2');
  const rect=b.parentElement.getBoundingClientRect();
  const cx=e.touches?e.touches[0].clientX:e.clientX;
  const cy=e.touches?e.touches[0].clientY:e.clientY;
  _bee2.ox=cx-rect.left-_bee2.x;
  _bee2.oy=cy-rect.top-_bee2.y;
  b.style.cursor='grabbing';
  document.addEventListener('mousemove',moveBeeDrag);
  document.addEventListener('mouseup',endBeeDrag);
  document.addEventListener('touchmove',moveBeeDrag,{passive:false});
  document.addEventListener('touchend',endBeeDrag);
}
function moveBeeDrag(e){
  if(!_bee2.dragging)return;
  e.preventDefault();
  const b=document.getElementById('jBee2');
  if(!b)return;
  const rect=b.parentElement.getBoundingClientRect();
  const cx=e.touches?e.touches[0].clientX:e.clientX;
  const cy=e.touches?e.touches[0].clientY:e.clientY;
  _bee2.x=Math.max(0,Math.min(rect.width-40,cx-rect.left-_bee2.ox));
  _bee2.y=Math.max(0,Math.min(rect.height-40,cy-rect.top-_bee2.oy));
  b.style.left=_bee2.x+'px'; b.style.top=_bee2.y+'px';
  // 꽃 위에 올라가면 완료
  const fw=rect.width/2; const fh=rect.height-60;
  if(Math.abs(_bee2.x+18-fw)<50 && Math.abs(_bee2.y+18-fh)<50){
    endBeeDrag(); completeStep2();
  }
}
function endBeeDrag(){
  _bee2.dragging=false;
  const b=document.getElementById('jBee2');
  if(b) b.style.cursor='grab';
  document.removeEventListener('mousemove',moveBeeDrag);
  document.removeEventListener('mouseup',endBeeDrag);
  document.removeEventListener('touchmove',moveBeeDrag);
  document.removeEventListener('touchend',endBeeDrag);
}
function completeStep2(){
  if(jDone)return;
  const d=document.getElementById('j2done');
  if(d){d.style.display='flex';}
  jStepDone();
}

let _tubeInterval=null, _tubeProgress=0;

  if(_tubeInterval)return;
  const btn=document.getElementById('jTubeBtn');
  if(btn) btn.style.transform='scale(.92)';
  _tubeInterval=setInterval(()=>{
    _tubeProgress=Math.min(100,_tubeProgress+2);
    const y2=44+(_tubeProgress/100)*100;
    const line=document.getElementById('jTubeLine');
    if(line) line.setAttribute('y2',y2);
    if(_tubeProgress>=100){
      clearInterval(_tubeInterval); _tubeInterval=null;
      const star=document.getElementById('jTubeStar');
      if(star) star.style.opacity='1';
      const d=document.getElementById('j4done');
      if(d) d.style.display='block';
      const msg=document.getElementById('jTubeMsg');
      if(msg){msg.textContent='✅ Reached the ovary!'; msg.style.color='var(--g)';}
      jStepDone();
    }
  },40);
}
function stopTube(){
  if(_tubeInterval){clearInterval(_tubeInterval);_tubeInterval=null;}
  const btn=document.getElementById('jTubeBtn');
  if(btn) btn.style.transform='scale(1)';
}

function tapFert(what){
  if(window._fertStep===0 && what==='pollen'){
    window._fertStep=1;
    var p=document.getElementById('jPollenDot');
    if(p){ p.style.fill='#52B788'; p.style.stroke='#3d9e6a'; p.setAttribute('r','18'); }
    var s=document.getElementById('j5status');
    if(s){ s.innerHTML='✅ Good! Now tap the <strong style="color:#9B72CF">purple egg cell</strong>!<br>이제 보라색 난세포를 탭해요!'; }
  } else if(window._fertStep===1 && what==='egg'){
    window._fertStep=2;
    var egg=document.getElementById('jEggCell');
    if(egg){ egg.style.fill='#F9C74F'; egg.style.stroke='#d4a030'; }
    var star=document.getElementById('jFertStar');
    if(star){ star.style.opacity='1'; }
    var txt=document.getElementById('jSeedText');
    if(txt){ txt.style.opacity='1'; }
    var d=document.getElementById('j5done');
    if(d){ d.style.display='block'; }
    var s=document.getElementById('j5status');
    if(s){ s.style.display='none'; }
    jStepDone();
  }
}

// ── STEP 6: 씨앗 드래그해서 심기 ──
let _seed={x:0,y:16,dragging:false,ox:0,oy:0};
function initSeedDrag(){
  const b=document.getElementById('jSeed6');
  if(b){
    const rect=b.parentElement.getBoundingClientRect();
    _seed.x=(rect.width||300)/2-16;
    b.style.left=_seed.x+'px';
  }
}
function startSeedDrag(e){
  e.preventDefault();
  _seed.dragging=true;
  const b=document.getElementById('jSeed6');
  const rect=b.parentElement.getBoundingClientRect();
  const cx=e.touches?e.touches[0].clientX:e.clientX;
  const cy=e.touches?e.touches[0].clientY:e.clientY;
  _seed.ox=cx-rect.left-_seed.x;
  _seed.oy=cy-rect.top-_seed.y;
  document.addEventListener('mousemove',moveSeed);
  document.addEventListener('mouseup',endSeed);
  document.addEventListener('touchmove',moveSeed,{passive:false});
  document.addEventListener('touchend',endSeed);
}
function moveSeed(e){
  if(!_seed.dragging)return;
  e.preventDefault();
  const b=document.getElementById('jSeed6');
  if(!b)return;
  const rect=b.parentElement.getBoundingClientRect();
  const cx=e.touches?e.touches[0].clientX:e.clientX;
  const cy=e.touches?e.touches[0].clientY:e.clientY;
  _seed.x=Math.max(0,Math.min(rect.width-36,cx-rect.left-_seed.ox));
  _seed.y=Math.max(0,Math.min(rect.height-36,cy-rect.top-_seed.oy));
  b.style.left=_seed.x+'px'; b.style.top=_seed.y+'px';
  // 흙 영역 (아래 60%)
  if(_seed.y > rect.height*0.55){
    endSeed(); completeStep6();
  }
}
function endSeed(){
  _seed.dragging=false;
  document.removeEventListener('mousemove',moveSeed);
  document.removeEventListener('mouseup',endSeed);
  document.removeEventListener('touchmove',moveSeed);
  document.removeEventListener('touchend',endSeed);
}
function completeStep6(){
  if(jDone)return;
  const s=document.getElementById('jSeed6');
  if(s) s.style.display='none';
  const d=document.getElementById('j6done');
  if(d){
    d.style.display='flex';
    const p=document.getElementById('j6plant');
    const msg=document.getElementById('j6msg');
    if(p){
      // 단계별 자라는 애니메이션
      const stages=[
        {emoji:'🌱', size:'28px', label:''},
        {emoji:'🌿', size:'40px', label:''},
        {emoji:'🪴', size:'56px', label:''},
        {emoji:'🌸', size:'72px', label:''},
        {emoji:'🌸', size:'80px', label:'show'},
      ];
      let i=0;
      p.textContent=stages[0].emoji;
      p.style.fontSize=stages[0].size;
      const grow=setInterval(function(){
        i++;
        if(i<stages.length){
          p.textContent=stages[i].emoji;
          p.style.fontSize=stages[i].size;
          if(stages[i].label==='show' && msg){
            msg.style.opacity='1';
          }
        } else {
          clearInterval(grow);
        }
      },700);
    }
  }
  jStepDone();
}
// ── 퀴즈 게임 ──
const QUIZ = [
  {q:'What is the job of a flower\'s petals?',opts:['To make pollen','To attract insects with color','To hold the egg cells','To produce nectar only'],ans:1,exp:'Petals use bright colors and sweet smells to attract bees, butterflies, and birds to the flower!'},
  {q:'Where does pollen first land on a flower?',opts:['The ovary','The petal','The stigma','The sepal'],ans:2,exp:'The stigma is sticky on purpose — it catches pollen when a bee visits!'},
  {q:'What is POLLINATION?',opts:['When a seed grows into a plant','When pollen moves from one flower to another','When a fruit becomes ripe','When a flower opens'],ans:1,exp:'Pollination happens when pollen travels — usually on a bee — from the anther of one flower to the stigma of another!'},
  {q:'What grows from pollen on the stigma?',opts:['A new petal','A fruit','A pollen tube','A sepal'],ans:2,exp:'The pollen grows a tiny tube called the pollen tube, all the way down to reach the egg cells in the ovary!'},
  {q:'What does the ovary become after fertilization?',opts:['A seed','A petal','A fruit','A new flower'],ans:2,exp:'The ovary swells and becomes a fruit — like a tomato, apple, or strawberry — with seeds inside!'},
  {q:'What does a seed need to germinate (sprout)?',opts:['Sunlight only','Soil, water, sunlight and time','Just water','Pollen and nectar'],ans:1,exp:'A seed needs FOUR things: soil to root in, water to drink, sunlight for energy, and time to grow!'},
  {q:'Which part of the flower MAKES pollen?',opts:['Stigma','Pistil','Ovary','Anther'],ans:3,exp:'The anther is the pollen factory! It makes thousands of tiny pollen grains.'},
  {q:'What is FERTILIZATION?',opts:['When pollen lands on the stigma','When pollen joins with the egg cell','When a seed travels by wind','When a flower makes nectar'],ans:1,exp:'Fertilization happens when pollen travels down the pollen tube and joins with the ovule (egg cell) — that\'s when a seed begins!'},
  {q:'How do seeds travel to new places?',opts:['Only by wind','Only by water','Only by animals','By wind, water, or animals'],ans:3,exp:'Seeds travel in many ways — dandelion seeds float on wind, coconuts float in water, and some seeds stick to animal fur!'},
  {q:'What is nectar?',opts:['A type of pollen','A sweet liquid that attracts insects','The female part of a flower','A seed coat'],ans:1,exp:'Nectar is the flower\'s sweet reward for insects. Bees drink nectar and accidentally carry pollen — a perfect deal for both!'},
];

let gScore=0, gCurrent=0, gShuffled=[];

function buildGame(){
  gScore=0; gCurrent=0;
  gShuffled = [...QUIZ].sort(()=>Math.random()-.5);
  document.getElementById('gTotal').textContent = gShuffled.length;
  showQ();
}

function showQ(){
  if(gCurrent >= gShuffled.length){ showGameResult(); return; }
  const q = gShuffled[gCurrent];
  document.getElementById('gQ').textContent = gCurrent+1;
  document.getElementById('gScore').textContent = gScore;
  window._selectedOpt = null;
  const expSafe = q.exp.replace(/\\/g,'\\\\').replace(/`/g,'\\`');
  document.getElementById('gameArea').innerHTML = `
    <div class="game-q-card">
      <div class="game-q-num">Question ${gCurrent+1} of ${gShuffled.length}</div>
      <div class="game-q-text">${q.q}</div>
      <div class="game-opts" id="gOpts">
        ${q.opts.map((o,i)=>`<button class="game-opt" id="gOpt${i}" onclick="selectOpt(${i})">${o}</button>`).join('')}
      </div>
      <div class="game-exp" id="gExp"></div>
      <div id="gBtnRow" style="margin-top:12px;">
        <button id="gCheckBtn" onclick="checkAns()"
          style="width:100%;padding:12px;border-radius:12px;background:var(--b);color:#fff;border:none;font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;cursor:pointer;">
          ✅ Check Answer
        </button>
      </div>
    </div>`;
  // 정답/설명 클로저로 저장
  window._curAns = q.ans;
  window._curExp = q.exp;
}

function selectOpt(i){
  document.querySelectorAll('.game-opt').forEach(b=>b.classList.remove('selected'));
  const btn = document.getElementById('gOpt'+i);
  if(btn) btn.classList.add('selected');
  window._selectedOpt = i;
}

function checkAns(){
  if(window._selectedOpt === null){
    const opts = document.getElementById('gOpts');
    if(opts){ opts.style.outline='2px solid var(--o)'; setTimeout(function(){ opts.style.outline=''; },500); }
    return;
  }
  const idx = window._selectedOpt;
  const ans = window._curAns;
  const exp = window._curExp;
  document.querySelectorAll('.game-opt').forEach(function(b){ b.disabled=true; b.classList.remove('selected'); });
  if(idx===ans){ document.getElementById('gOpt'+idx).classList.add('correct'); gScore++; }
  else { document.getElementById('gOpt'+idx).classList.add('wrong'); document.getElementById('gOpt'+ans).classList.add('correct'); }
  const expEl = document.getElementById('gExp');
  expEl.textContent = (idx===ans?'✅ ':'💡 ') + exp;
  expEl.classList.add('show');
  document.getElementById('gScore').textContent = gScore;
  const isLast = gCurrent >= gShuffled.length - 1;
  document.getElementById('gBtnRow').innerHTML = isLast
    ? `<button onclick="showGameResult()"
        style="width:100%;padding:12px;border-radius:12px;background:var(--g);color:#fff;border:none;font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;cursor:pointer;">
        🏆 See Results!
      </button>`
    : `<button onclick="gCurrent++;showQ()"
        style="width:100%;padding:12px;border-radius:12px;background:var(--o);color:#fff;border:none;font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;cursor:pointer;">
        Next Question →
      </button>`;
}

function answerQ(){}


function showGameResult(){
  const pct = gScore/gShuffled.length;
  const msg = pct===1?'🏆 Perfect! You\'re a plant scientist!' : pct>=.7?'⭐ Great job! Almost perfect!' : '💪 Keep practicing! You\'re getting there!';
  document.getElementById('gameArea').innerHTML = `
    <div class="game-result">
      <div style="font-size:52px;margin-bottom:12px">${pct===1?'🏆':pct>=.7?'⭐':'🌱'}</div>
      <div style="font-size:22px;font-weight:800;margin-bottom:6px">${gScore} / ${gShuffled.length}</div>
      <div style="font-size:14px;color:var(--br);margin-bottom:20px;line-height:1.7">${msg}</div>
      <button onclick="buildGame()" style="padding:12px 32px;border-radius:26px;background:var(--o);color:#fff;border:none;font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;cursor:pointer;">
        🔄 Try Again!
      </button>
    </div>`;
}

// ── TTS ──
let spk=false;
function speak(btn,txt){
  if(!window.speechSynthesis) return;
  if(spk){window.speechSynthesis.cancel();spk=false;document.querySelectorAll('.tts.speaking').forEach(b=>b.classList.remove('speaking'));return;}
  const u=new SpeechSynthesisUtterance(txt);
  u.lang='en-US';u.rate=0.85;u.pitch=1.05;
  const vs=window.speechSynthesis.getVoices();
  const v=vs.find(v=>v.lang.startsWith('en'))||null;
  if(v)u.voice=v;
  u.onstart=()=>{spk=true;if(btn)btn.classList.add('speaking');};
  u.onend=u.onerror=()=>{spk=false;if(btn)btn.classList.remove('speaking');};
  window.speechSynthesis.speak(u);
}
window.speechSynthesis.onvoiceschanged=()=>window.speechSynthesis.getVoices();

// ── 모드 전환 ──
function goMode(mode, btn){
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  document.getElementById('mExplore').style.display = mode==='Explore'?'block':'none';
  document.getElementById('mJourney').style.display = mode==='Journey'?'block':'none';
  document.getElementById('mGame').style.display = mode==='Game'?'block':'none';
  if(mode==='Journey') buildJourney();
  if(mode==='Game') buildGame();
}
