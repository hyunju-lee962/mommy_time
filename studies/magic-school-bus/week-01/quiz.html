<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>엄마 vs 아이 퀴즈! — 태양계로 날아라</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;600&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../../assets/css/main.css">
<style>
.page-header { padding:110px 40px 32px;text-align:center; }
.back-link { display:inline-flex;align-items:center;gap:4px;color:var(--brown);text-decoration:none;font-size:14px;margin-bottom:16px; }
.page-title { font-family:'Noto Serif KR',serif;font-size:30px;font-weight:300;margin-bottom:6px; }
.lang-bar { display:flex;justify-content:center;gap:12px;padding:16px 40px;background:var(--warm);border-bottom:1px solid var(--soft);align-items:center; }

/* 점수판 */
.scoreboard { max-width:560px;margin:0 auto;padding:32px 40px 0; }
.score-cards { display:grid;grid-template-columns:1fr auto 1fr;gap:12px;align-items:center; }
.score-card { background:var(--white);border:2px solid var(--soft);border-radius:20px;padding:20px;text-align:center;transition:border-color .3s; }
.score-card.turn { border-color:var(--accent);box-shadow:0 0 0 4px rgba(212,132,90,.12); }
.score-avatar { font-size:36px;margin-bottom:6px; }
.score-name { font-size:14px;font-weight:500;margin-bottom:8px; }
.score-num { font-family:'Noto Serif KR',serif;font-size:36px;font-weight:600;color:var(--accent); }
.vs-badge { background:var(--dark);color:#fff;width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:500;margin:0 auto; }
.turn-indicator { text-align:center;font-size:14px;color:var(--brown);margin-top:14px; }
.turn-indicator span { font-weight:500;color:var(--accent); }

/* 퀴즈 영역 */
.quiz-wrap { max-width:600px;margin:0 auto;padding:28px 40px 80px; }
.progress { background:var(--soft);border-radius:8px;height:6px;margin-bottom:28px;overflow:hidden; }
.prog-bar { height:100%;background:var(--accent);border-radius:8px;transition:width .4s; }

.q-card { background:var(--white);border:1px solid var(--soft);border-radius:20px;padding:28px;margin-bottom:20px;box-shadow:var(--shadow); }
.q-num { font-size:12px;color:var(--accent);letter-spacing:.08em;margin-bottom:10px; }
.q-text { font-size:19px;font-weight:500;line-height:1.5;margin-bottom:8px; }
.q-en { font-size:14px;color:var(--brown);font-style:italic;margin-bottom:4px; }
.q-tts { margin-top:8px; }

.options { display:flex;flex-direction:column;gap:10px; }
.opt-btn { background:var(--white);border:1.5px solid var(--soft);border-radius:14px;padding:16px 20px;font-size:15px;font-family:inherit;cursor:pointer;text-align:left;transition:border-color .2s,background .2s; display:flex;align-items:center;gap:10px; }
.opt-btn:hover:not(:disabled) { border-color:var(--accent);background:#FFFAF6; }
.opt-btn.correct { background:#EAF3DE;border-color:#7BA67E;color:#27500A; }
.opt-btn.wrong { background:#FCEBEB;border-color:#E24B4A;color:#501313; }
.opt-btn .opt-en { font-size:12px;color:inherit;opacity:.7;margin-left:auto; }

/* 결과 */
.result-card { background:var(--white);border-radius:24px;padding:40px;text-align:center;border:1px solid var(--soft);box-shadow:var(--shadow); }
.result-winner { font-size:56px;margin-bottom:12px; }
.result-title { font-family:'Noto Serif KR',serif;font-size:24px;font-weight:400;margin-bottom:8px; }
.result-sub { font-size:15px;color:var(--brown);line-height:1.7;margin-bottom:28px; }
.result-scores { display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:28px; }
.rs-card { background:var(--warm);border-radius:14px;padding:16px; }
.rs-name { font-size:13px;color:var(--brown);margin-bottom:4px; }
.rs-score { font-family:'Noto Serif KR',serif;font-size:28px;font-weight:600;color:var(--accent); }
.result-btns { display:flex;gap:10px;justify-content:center;flex-wrap:wrap; }

@media(max-width:768px){ .quiz-wrap,.scoreboard{padding-left:24px;padding-right:24px;} .page-header{padding:100px 24px 28px;} }
</style>
</head>
<body>

<nav class="nav">
  <a href="../../../index.html" class="nav-logo">엄마<span>시간</span></a>
  <a href="index.html" class="nav-back">← 1주차로</a>
</nav>

<div class="page-header">
  <a href="index.html" class="back-link">← 1주차로 돌아가기</a>
  <h1 class="page-title">🏆 <span data-ko="엄마 vs 아이 퀴즈!" data-en="Mom vs Kid Quiz!">엄마 vs 아이 퀴즈!</span></h1>
  <p style="font-size:14px;color:var(--brown)" data-ko="번갈아가며 문제를 풀어요. 누가 더 많이 맞힐까요?" data-en="Take turns answering. Who knows more?">번갈아가며 문제를 풀어요. 누가 더 많이 맞힐까요?</p>
</div>

<div class="lang-bar">
  <div class="lang-toggle">
    <button class="lang-btn active" data-lang="ko" onclick="setLang('ko')">한국어</button>
    <button class="lang-btn" data-lang="en" onclick="setLang('en')">English</button>
  </div>
</div>

<div class="scoreboard">
  <div class="score-cards">
    <div class="score-card turn" id="kidCard">
      <div class="score-avatar">👧</div>
      <div class="score-name" data-ko="아이" data-en="Child">아이</div>
      <div class="score-num" id="kidScore">0</div>
    </div>
    <div><div class="vs-badge">VS</div></div>
    <div class="score-card" id="momCard">
      <div class="score-avatar">👩</div>
      <div class="score-name" data-ko="엄마" data-en="Mom">엄마</div>
      <div class="score-num" id="momScore">0</div>
    </div>
  </div>
  <p class="turn-indicator" id="turnIndicator" data-ko="아이 차례예요! 문제를 읽어봐요 📖" data-en="Child's turn! Read the question 📖">아이 차례예요! 문제를 읽어봐요 📖</p>
</div>

<div class="quiz-wrap">
  <div class="progress"><div class="prog-bar" id="progBar" style="width:0%"></div></div>
  <div id="quizArea"></div>
  <div id="resultArea" style="display:none"></div>
</div>

<script src="../../../assets/js/main.js"></script>
<script>
const quizData = [
  {
    qKo:'태양계에 행성이 몇 개 있나요?', qEn:'How many planets are in our solar system?',
    opts:[{ko:'6개',en:'6'},{ko:'7개',en:'7'},{ko:'8개',en:'8'},{ko:'9개',en:'9'}], answer:2,
    expKo:'태양계에는 수성, 금성, 지구, 화성, 목성, 토성, 천왕성, 해왕성 — 총 8개의 행성이 있어요!',
    expEn:'Our solar system has 8 planets: Mercury, Venus, Earth, Mars, Jupiter, Saturn, Uranus, Neptune!'
  },
  {
    qKo:'"Gravity"는 무슨 뜻인가요?', qEn:'What does "gravity" mean?',
    opts:[{ko:'빛의 속도',en:'Speed of light'},{ko:'중력',en:'Gravity / pulling force'},{ko:'행성의 크기',en:'Planet size'},{ko:'우주의 온도',en:'Space temperature'}], answer:1,
    expKo:'중력(gravity)은 물체를 서로 당기는 힘이에요. 지구의 중력이 우리를 땅에 붙잡아줘요!',
    expEn:'Gravity is the force that pulls objects toward each other. Earth\'s gravity keeps us on the ground!'
  },
  {
    qKo:'지구는 태양에서 몇 번째 행성인가요?', qEn:'Which planet is Earth from the Sun?',
    opts:[{ko:'첫 번째',en:'1st'},{ko:'두 번째',en:'2nd'},{ko:'세 번째',en:'3rd'},{ko:'네 번째',en:'4th'}], answer:2,
    expKo:'수성(1), 금성(2), 지구(3)! 지구는 태양에서 세 번째 행성이에요.',
    expEn:'Mercury(1), Venus(2), Earth(3)! Earth is the third planet from the Sun.'
  },
  {
    qKo:'"Astronaut"은 무슨 뜻인가요?', qEn:'What is an "astronaut"?',
    opts:[{ko:'망원경',en:'Telescope'},{ko:'혜성',en:'Comet'},{ko:'우주비행사',en:'Space traveler'},{ko:'행성',en:'Planet'}], answer:2,
    expKo:'Astronaut(우주비행사)는 우주를 탐험하는 사람이에요! NASA의 우주비행사들이 달에 갔어요.',
    expEn:'An astronaut is a person who travels to space! NASA astronauts have walked on the Moon.'
  },
  {
    qKo:'달 표면의 움푹 파인 구멍을 영어로?', qEn:'What are the bowl-shaped holes on the Moon called?',
    opts:[{ko:'orbit',en:'orbit'},{ko:'crater',en:'crater'},{ko:'comet',en:'comet'},{ko:'galaxy',en:'galaxy'}], answer:1,
    expKo:'Crater(크레이터)! 운석이 달에 부딪히면서 생긴 구멍이에요.',
    expEn:'Crater! They are formed when meteorites crash into the Moon\'s surface.'
  },
  {
    qKo:'태양계가 속한 은하 이름은?', qEn:'What is the name of our galaxy?',
    opts:[{ko:'안드로메다',en:'Andromeda'},{ko:'삼각형자리',en:'Triangulum'},{ko:'은하수 (밀키웨이)',en:'Milky Way'},{ko:'소마젤란',en:'Small Magellanic'}], answer:2,
    expKo:'우리 은하는 Milky Way(은하수)예요! 밤하늘에 하얀 띠처럼 보여요.',
    expEn:'Our galaxy is called the Milky Way! It looks like a white band across the night sky.'
  },
];

let cur = 0, kidScore = 0, momScore = 0;
let currentTurn = 'kid'; // kid or mom

function getCurrentTurnKo() { return currentTurn === 'kid' ? '아이' : '엄마'; }
function getCurrentTurnEn() { return currentTurn === 'kid' ? 'Child' : 'Mom'; }

function updateTurnUI() {
  document.getElementById('kidCard').classList.toggle('turn', currentTurn==='kid');
  document.getElementById('momCard').classList.toggle('turn', currentTurn==='mom');
  const ind = document.getElementById('turnIndicator');
  const lang = document.querySelector('.lang-btn.active')?.dataset.lang || 'ko';
  if (lang==='ko') ind.textContent = `${getCurrentTurnKo()} 차례예요! 문제를 읽어봐요 📖`;
  else ind.textContent = `${getCurrentTurnEn()}'s turn! Read the question 📖`;
}

function renderQ() {
  if (cur >= quizData.length) { showResult(); return; }
  const q = quizData[cur];
  const lang = document.querySelector('.lang-btn.active')?.dataset.lang || 'ko';
  document.getElementById('progBar').style.width = (cur / quizData.length * 100) + '%';

  const html = `
    <div class="q-card reveal visible">
      <div class="q-num">${cur+1} / ${quizData.length}</div>
      <div class="q-text" data-ko="${q.qKo}" data-en="${q.qEn}">${lang==='ko'?q.qKo:q.qEn}</div>
      <div class="q-tts"><button class="tts-btn" onclick="speakBtn(this,'${q.qEn}')">🔊 영어로 듣기</button></div>
    </div>
    <div class="options" id="opts">
      ${q.opts.map((o,i) => `<button class="opt-btn" onclick="answer(${i})">
        <span data-ko="${o.ko}" data-en="${o.en}">${lang==='ko'?o.ko:o.en}</span>
        ${lang==='ko' ? `<span class="opt-en">${o.en}</span>` : ''}
      </button>`).join('')}
    </div>`;
  document.getElementById('quizArea').innerHTML = html;
}

function answer(idx) {
  const q = quizData[cur];
  const lang = document.querySelector('.lang-btn.active')?.dataset.lang || 'ko';
  const btns = document.querySelectorAll('.opt-btn');
  btns.forEach((b,i) => {
    b.disabled = true;
    if (i===q.answer) b.classList.add('correct');
    else if (i===idx) b.classList.add('wrong');
  });

  if (idx===q.answer) {
    if (currentTurn==='kid') kidScore++;
    else momScore++;
    document.getElementById('kidScore').textContent = kidScore;
    document.getElementById('momScore').textContent = momScore;
  }

  const expBox = document.createElement('div');
  expBox.className = 'together-box';
  expBox.style.marginTop = '16px';
  expBox.innerHTML = `<div class="together-icon">${idx===q.answer?'🌟':'💡'}</div>
    <div><div class="together-title">${idx===q.answer?'정답이에요!':'아쉬워요!'}</div>
    <div class="together-text" data-ko="${q.expKo}" data-en="${q.expEn}">${lang==='ko'?q.expKo:q.expEn}</div>
    <div style="margin-top:8px"><button class="tts-btn" onclick="speakBtn(this,'${q.expEn}')">🔊 영어로 듣기</button></div></div>`;
  document.getElementById('quizArea').appendChild(expBox);

  setTimeout(() => {
    cur++;
    currentTurn = currentTurn==='kid' ? 'mom' : 'kid';
    updateTurnUI();
    renderQ();
  }, 2200);
}

function showResult() {
  document.getElementById('quizArea').style.display = 'none';
  const winner = kidScore > momScore ? '아이' : kidScore < momScore ? '엄마' : null;
  const winnerEn = kidScore > momScore ? 'Child' : kidScore < momScore ? 'Mom' : null;
  const lang = document.querySelector('.lang-btn.active')?.dataset.lang || 'ko';
  document.getElementById('resultArea').style.display = 'block';
  document.getElementById('resultArea').innerHTML = `
    <div class="result-card">
      <div class="result-winner">${kidScore===momScore?'🤝':kidScore>momScore?'👧':'👩'}</div>
      <h2 class="result-title" data-ko="${winner?winner+'가 이겼어요! 🎉':'비겼어요! 대단해요! 🤝'}" data-en="${winnerEn?winnerEn+' wins! 🎉':'It\'s a tie! Amazing! 🤝'}">${lang==='ko'?(winner?winner+'가 이겼어요! 🎉':'비겼어요! 대단해요! 🤝'):(winnerEn?winnerEn+' wins! 🎉':"It's a tie! Amazing! 🤝")}</h2>
      <p class="result-sub" data-ko="오늘 같이 공부해서 정말 즐거웠죠? 엄마랑 아이가 함께한 시간이 가장 소중한 거예요 💛" data-en="Wasn't it fun learning together? The time you spent with Mom is the most precious thing 💛">${lang==='ko'?'오늘 같이 공부해서 정말 즐거웠죠? 엄마랑 아이가 함께한 시간이 가장 소중한 거예요 💛':'Wasn\'t it fun learning together? The time you spent with Mom is the most precious thing 💛'}</p>
      <div class="result-scores">
        <div class="rs-card"><div class="rs-name" data-ko="👧 아이" data-en="👧 Child">${lang==='ko'?'👧 아이':'👧 Child'}</div><div class="rs-score">${kidScore}점</div></div>
        <div class="rs-card"><div class="rs-name" data-ko="👩 엄마" data-en="👩 Mom">${lang==='ko'?'👩 엄마':'👩 Mom'}</div><div class="rs-score">${momScore}점</div></div>
      </div>
      <div class="result-btns">
        <button class="btn btn-secondary btn-sm" onclick="restart()" data-ko="다시 대결!" data-en="Play Again!">${lang==='ko'?'다시 대결!':'Play Again!'}</button>
        <a href="knowledge.html" class="btn btn-primary btn-sm" data-ko="🔬 과학 탐구로 →" data-en="🔬 Science Discovery →">${lang==='ko'?'🔬 과학 탐구로 →':'🔬 Science Discovery →'}</a>
        <a href="index.html" class="btn btn-secondary btn-sm" data-ko="← 1주차로" data-en="← Back">← 1주차로</a>
      </div>
    </div>`;
  document.getElementById('progBar').style.width='100%';
}

function restart() {
  cur=0; kidScore=0; momScore=0; currentTurn='kid';
  document.getElementById('kidScore').textContent='0';
  document.getElementById('momScore').textContent='0';
  document.getElementById('resultArea').style.display='none';
  document.getElementById('quizArea').style.display='block';
  updateTurnUI(); renderQ();
}

updateTurnUI();
renderQ();
</script>
</body>
</html>
