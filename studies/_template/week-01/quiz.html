<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>퀴즈 — 태양계로 날아라</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;600&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../../assets/css/main.css">
<link rel="stylesheet" href="../../../assets/css/components.css">
<style>
.page-header { padding: 110px 48px 40px; text-align: center; }
.back-link { display: inline-block; color: var(--brown); text-decoration: none; font-size: 14px; margin-bottom: 16px; }
.page-title { font-family: 'Noto Serif KR', serif; font-size: 32px; font-weight: 300; margin-bottom: 8px; }
.quiz-wrap { max-width: 640px; margin: 0 auto; padding: 0 48px 80px; }
.progress { background: var(--soft); border-radius: 8px; height: 6px; margin-bottom: 32px; overflow: hidden; }
.progress-bar { height: 100%; background: var(--accent); border-radius: 8px; transition: width .4s; }
.q-num { font-size: 13px; color: var(--brown); margin-bottom: 8px; }
.q-text { font-size: 20px; font-weight: 500; line-height: 1.5; margin-bottom: 24px; }
.options { display: flex; flex-direction: column; gap: 10px; }
.option-btn { background: #fff; border: 1.5px solid var(--soft); border-radius: 12px; padding: 16px 20px; font-size: 15px; font-family: inherit; cursor: pointer; text-align: left; transition: border-color .2s, background .2s; }
.option-btn:hover:not(:disabled) { border-color: var(--accent); }
.option-btn.correct { background: #EAF3DE; border-color: #7A9E7E; color: #27500A; }
.option-btn.wrong { background: #FCEBEB; border-color: #E24B4A; color: #501313; }
.result { text-align: center; padding: 40px 0; }
.result-score { font-family: 'Noto Serif KR', serif; font-size: 56px; font-weight: 600; color: var(--accent); }
.result-msg { font-size: 18px; color: var(--brown); margin-top: 12px; margin-bottom: 32px; }
@media (max-width: 768px) { .quiz-wrap { padding: 0 24px 60px; } }
</style>
</head>
<body>
<nav><a href="../../../index.html" class="nav-logo">엄마<span>시간</span></a></nav>
<div class="page-header">
  <a href="index.html" class="back-link">← 1주차로 돌아가기</a>
  <h1 class="page-title">❓ 이해력 퀴즈</h1>
</div>
<div class="quiz-wrap">
  <div class="progress"><div class="progress-bar" id="progressBar" style="width:0%"></div></div>
  <div id="quizArea"></div>
  <div class="result" id="result" style="display:none">
    <div class="result-score" id="scoreText"></div>
    <div class="result-msg" id="resultMsg"></div>
    <a href="index.html" class="btn-primary">← 1주차로 돌아가기</a>
  </div>
</div>
<script>
const quizData = [
  { q: "태양계에는 행성이 몇 개 있나요?", options: ["6개", "7개", "8개", "9개"], answer: 2 },
  { q: "지구는 태양으로부터 몇 번째 행성인가요?", options: ["첫 번째", "두 번째", "세 번째", "네 번째"], answer: 2 },
  { q: "지구가 태양 주위를 한 바퀴 도는 데 걸리는 시간은?", options: ["30일", "100일", "265일", "365일"], answer: 3 },
  { q: "'gravity(중력)'이란 무엇인가요?", options: ["빛의 속도", "물체를 당기는 힘", "행성의 크기", "우주의 온도"], answer: 1 },
  { q: "달 표면의 움푹 패인 구멍을 영어로 무엇이라고 하나요?", options: ["crater", "orbit", "comet", "galaxy"], answer: 0 }
];
let cur = 0, score = 0;
function renderQ() {
  if (cur >= quizData.length) { showResult(); return; }
  const q = quizData[cur];
  document.getElementById('progressBar').style.width = (cur / quizData.length * 100) + '%';
  document.getElementById('quizArea').innerHTML = `<div class="q-num">${cur + 1} / ${quizData.length}</div>
    <div class="q-text">${q.q}</div>
    <div class="options">${q.options.map((o,i) => `<button class="option-btn" onclick="answer(${i})">${o}</button>`).join('')}</div>`;
}
function answer(idx) {
  const q = quizData[cur];
  document.querySelectorAll('.option-btn').forEach((b,i) => {
    b.disabled = true;
    if (i === q.answer) b.classList.add('correct');
    else if (i === idx) b.classList.add('wrong');
  });
  if (idx === q.answer) score++;
  setTimeout(() => { cur++; renderQ(); }, 900);
}
function showResult() {
  document.getElementById('quizArea').style.display = 'none';
  document.getElementById('result').style.display = 'block';
  document.getElementById('scoreText').textContent = score + ' / ' + quizData.length;
  const msgs = ['다시 한번 읽어봐요! 📖', '잘 했어요! 조금만 더! 💪', '훌륭해요! 거의 다 맞혔어요! 🌟', '완벽해요! 최고예요! 🏆'];
  document.getElementById('resultMsg').textContent = msgs[Math.min(Math.floor(score / quizData.length * 4), 3)];
  document.getElementById('progressBar').style.width = '100%';
}
renderQ();
</script>
</body>
</html>
