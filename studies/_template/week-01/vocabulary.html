<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>단어 카드 — 태양계</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;600&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../../assets/css/main.css">
<link rel="stylesheet" href="../../../assets/css/components.css">
<style>
.page-header { padding: 110px 48px 40px; text-align: center; }
.back-link { display: inline-block; color: var(--brown); text-decoration: none; font-size: 14px; margin-bottom: 16px; }
.page-title { font-family: 'Noto Serif KR', serif; font-size: 32px; font-weight: 300; margin-bottom: 8px; }
.cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 16px; max-width: 900px; margin: 0 auto; padding: 0 48px 80px; }
.vocab-card { background: #fff; border: 1px solid var(--soft); border-radius: 16px; padding: 24px; cursor: pointer; transition: transform .2s; min-height: 130px; display: flex; flex-direction: column; justify-content: center; }
.vocab-card:hover { transform: translateY(-3px); }
.vocab-card.flipped .front { display: none; }
.vocab-card.flipped .back { display: flex; }
.front, .back { flex-direction: column; }
.back { display: none; }
.word-en { font-size: 22px; font-weight: 500; color: var(--accent); margin-bottom: 8px; }
.word-ko { font-size: 18px; color: var(--dark); margin-bottom: 8px; }
.word-ex { font-size: 13px; color: var(--brown); line-height: 1.6; font-style: italic; }
.flip-hint { font-size: 12px; color: var(--soft); margin-top: 10px; }
@media (max-width: 768px) { .cards-grid { padding: 0 24px 60px; } .page-header { padding: 100px 24px 32px; } }
</style>
</head>
<body>
<nav>
  <a href="../../../index.html" class="nav-logo">엄마<span>시간</span></a>
</nav>
<div class="page-header">
  <a href="index.html" class="back-link">← 1주차로 돌아가기</a>
  <h1 class="page-title">📖 이번 주 단어 카드</h1>
  <p style="color:var(--brown);font-size:14px">카드를 눌러서 한국어 뜻을 확인하세요!</p>
</div>
<div class="cards-grid" id="vocabGrid"></div>
<script>
const words = [
  { en: "solar system", ko: "태양계", ex: "Our solar system has eight planets." },
  { en: "planet", ko: "행성", ex: "Earth is the third planet from the Sun." },
  { en: "orbit", ko: "궤도, 공전하다", ex: "The Earth orbits the Sun every 365 days." },
  { en: "gravity", ko: "중력", ex: "Gravity keeps us on the ground." },
  { en: "astronaut", ko: "우주비행사", ex: "The astronaut floated in the spaceship." },
  { en: "telescope", ko: "망원경", ex: "We used a telescope to see the stars." },
  { en: "crater", ko: "분화구, 크레이터", ex: "The Moon has many craters on its surface." },
  { en: "atmosphere", ko: "대기, 대기권", ex: "Earth has a protective atmosphere." },
  { en: "comet", ko: "혜성", ex: "A comet has a bright tail of ice and dust." },
  { en: "galaxy", ko: "은하", ex: "Our galaxy is called the Milky Way." }
];
const grid = document.getElementById('vocabGrid');
words.forEach(w => {
  const card = document.createElement('div');
  card.className = 'vocab-card';
  card.innerHTML = `<div class="front"><div class="word-en">${w.en}</div><div class="flip-hint">눌러서 뜻 보기 👆</div></div>
    <div class="back"><div class="word-en">${w.en}</div><div class="word-ko">🇰🇷 ${w.ko}</div><div class="word-ex">"${w.ex}"</div></div>`;
  card.onclick = () => card.classList.toggle('flipped');
  grid.appendChild(card);
});
</script>
</body>
</html>
